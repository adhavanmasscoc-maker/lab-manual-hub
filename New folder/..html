<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ ECE Lab — All 52 Experiments</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e28;
  --border: #252836;
  --accent-a: #ff416c;
  --accent-b: #38ef7d;
  --accent-c: #6a78fc;
  --accent-k: #f59e0b;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --code-bg: #0a0c10;
  --green: #10b981;
  --red: #ef4444;
  --sidebar-w: 290px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ─── TOP BAR ─── */
#topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 18px;height:56px;
}
#topbar h1{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:.5px}
#topbar h1 span{color:var(--accent-c)}
#menu-btn{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;display:none}
#search-wrap{flex:1;max-width:420px;position:relative}
#search{
  width:100%;padding:7px 14px 7px 36px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border .2s;
}
#search:focus{border-color:var(--accent-c)}
#search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.filter-btns{display:flex;gap:6px;flex-shrink:0}
.flt{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
.flt:hover,.flt.active{border-color:var(--accent-c);color:var(--accent-c);background:rgba(106,120,252,.1)}
.flt[data-set="A"].active{border-color:var(--accent-a);color:var(--accent-a);background:rgba(255,65,108,.1)}
.flt[data-set="B"].active{border-color:var(--accent-b);color:var(--accent-b);background:rgba(56,239,125,.1)}
.flt[data-set="C"].active{border-color:var(--accent-c);color:var(--accent-c);background:rgba(106,120,252,.1)}

/* ─── LAYOUT ─── */
#layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px)}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-inner{overflow-y:auto;flex:1}
#sidebar-inner::-webkit-scrollbar{width:4px}
#sidebar-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.set-label{
  padding:10px 14px 6px;font-size:10px;font-weight:600;letter-spacing:1.5px;
  color:var(--text-muted);text-transform:uppercase;position:sticky;top:0;
  background:var(--surface);z-index:2;border-bottom:1px solid var(--border);
}
.set-label[data-sl="A"]{color:var(--accent-a)}
.set-label[data-sl="B"]{color:var(--accent-b)}
.set-label[data-sl="C"]{color:var(--accent-c)}
.nav-item{
  display:block;padding:9px 14px;font-size:12px;color:var(--text-dim);
  cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);
  transition:.15s;text-decoration:none;border-left:3px solid transparent;
}
.nav-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--accent-c)}
.nav-item.active{background:rgba(106,120,252,.12);color:var(--accent-c);border-left-color:var(--accent-c)}
.nav-item[data-set="A"]:hover,.nav-item[data-set="A"].active{border-left-color:var(--accent-a);color:var(--accent-a);background:rgba(255,65,108,.07)}
.nav-item[data-set="B"]:hover,.nav-item[data-set="B"].active{border-left-color:var(--accent-b);color:var(--accent-b);background:rgba(56,239,125,.07)}
.nav-item.hidden{display:none}

/* ─── MAIN ─── */
#main{flex:1;overflow-y:auto;padding:24px 28px}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ─── CARDS ─── */
.exp-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:28px;margin-bottom:32px;
  scroll-margin-top:24px;transition:.2s;
}
.exp-card:hover{border-color:var(--border)}
.exp-card.hidden{display:none}
.exp-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.exp-num{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;
  padding:4px 10px;border-radius:6px;white-space:nowrap;flex-shrink:0;
}
.set-A .exp-num{background:rgba(255,65,108,.15);color:var(--accent-a)}
.set-B .exp-num{background:rgba(56,239,125,.12);color:var(--accent-b)}
.set-C .exp-num{background:rgba(106,120,252,.15);color:var(--accent-c)}
.exp-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;line-height:1.4}

/* sections */
.section-block{margin:16px 0}
.section-label{
  font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
.aim-text{color:var(--text-dim);font-size:14px;line-height:1.7}
.algo-list{padding-left:18px;color:var(--text-dim);font-size:13px;line-height:1.9}
.algo-list li{margin-bottom:4px}
.algo-list code{
  background:rgba(255,255,255,.07);border-radius:4px;padding:1px 6px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent-c);
}

/* code block */
.code-block{
  background:var(--code-bg);border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
}
.code-block-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);
}
.code-lang{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.copy-btn{
  background:none;border:1px solid var(--border);border-radius:5px;
  color:var(--text-muted);font-size:11px;padding:2px 8px;cursor:pointer;transition:.2s;
}
.copy-btn:hover{border-color:var(--accent-c);color:var(--accent-c)}
pre{
  padding:16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;
  font-size:12.5px;line-height:1.8;color:#c9d1d9;
}
pre::-webkit-scrollbar{height:4px}
pre::-webkit-scrollbar-thumb{background:var(--border)}

/* fill blank */
.fill-block{
  background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);
  border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;
  font-size:12px;color:#fde68a;line-height:1.8;white-space:pre-wrap;
}

/* quiz */
.quiz-block{background:rgba(106,120,252,.08);border:1px solid rgba(106,120,252,.2);border-radius:8px;padding:14px}
.quiz-q{font-size:13px;font-weight:600;color:#a5b4fc;margin-bottom:6px}
.quiz-a{font-size:13px;color:var(--text-dim);padding-left:14px;border-left:2px solid var(--accent-c)}

/* io */
.io-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.io-box{
  background:var(--code-bg);border:1px solid var(--border);border-radius:8px;
  padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#86efac;
  white-space:pre-wrap;line-height:1.7;
}
.io-box.input-io{color:#93c5fd}
.io-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}

/* compiler */
.compiler-wrap{
  margin-top:20px;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.compiler-header{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);
}
.compiler-header svg{color:var(--accent-b)}
.compiler-header span{font-size:13px;font-weight:600;color:var(--accent-b)}
.compiler-body{padding:14px}
.code-editor-ta{
  width:100%;min-height:180px;max-height:380px;
  background:var(--code-bg);color:#c9d1d9;
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;
  padding:12px;border:1px solid var(--border);border-radius:8px;
  resize:vertical;outline:none;transition:border .2s;
}
.code-editor-ta:focus{border-color:var(--accent-c)}
.compiler-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:10px;align-items:start}
.stdin-ta{
  width:100%;height:52px;background:var(--surface);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;
  padding:8px 12px;border:1px solid var(--border);border-radius:8px;
  resize:none;outline:none;transition:border .2s;
}
.stdin-ta:focus{border-color:var(--accent-c)}
.run-btn{
  background:linear-gradient(135deg,#11998e,#38ef7d);color:#0a0c10;
  border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px;white-space:nowrap;
  transition:.2s;height:52px;
}
.run-btn:hover{opacity:.9;transform:translateY(-1px)}
.run-btn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;transform:none}
.output-ta{
  width:100%;min-height:80px;background:#000;color:var(--green);
  font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;
  padding:12px;border-radius:8px;margin-top:10px;white-space:pre-wrap;
  border:1px solid rgba(255,255,255,.05);
}
.output-ta.error{color:var(--red)}

/* no results */
#no-results{display:none;text-align:center;padding:60px 20px;color:var(--text-muted)}
#no-results svg{opacity:.3;margin-bottom:16px}

/* ─── MOBILE ─── */
@media(max-width:768px){
  #menu-btn{display:block}
  #layout{overflow:visible;height:auto;flex-direction:column}
  #sidebar{
    position:fixed;top:56px;left:0;bottom:0;z-index:150;
    transform:translateX(-100%);transition:transform .3s;
  }
  #sidebar.open{transform:translateX(0)}
  #main{height:auto;overflow:visible;padding:16px}
  .io-row{grid-template-columns:1fr}
  .compiler-row{grid-template-columns:1fr}
  .run-btn{width:100%;height:44px}
  .filter-btns{display:none}
  #topbar h1{font-size:.9rem}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header id="topbar">
  <button id="menu-btn" onclick="toggleSidebar()">☰</button>
  <h1>C++ ECE Lab <span>//</span> All 52</h1>
  <div id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search experiments..." oninput="filterAll()">
  </div>
  <div class="filter-btns">
    <button class="flt active" data-set="ALL" onclick="setFilter('ALL')">All</button>
    <button class="flt" data-set="A" onclick="setFilter('A')">Set A</button>
    <button class="flt" data-set="B" onclick="setFilter('B')">Set B</button>
    <button class="flt" data-set="C" onclick="setFilter('C')">Set C</button>
  </div>
</header>

<div id="layout">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div id="sidebar-inner"></div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="main">
    <div id="exp-list"></div>
    <div id="no-results">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <p style="font-size:15px">No experiments match your search.</p>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════
//  EXPERIMENT DATA — ALL 52
// ══════════════════════════════════════════════════
const experiments = [

// ────────────────── SET A (17) ──────────────────
{
  set:'A', num:1, id:'a1',
  title:'Single Linked List ADT Operations',
  aim:'To implement a Singly Linked List ADT with basic operations like insertion, deletion, and display.',
  algo:['Define Node with data and next pointer.','Define LinkedList class with head initialized to NULL.','Insert: Create node. If head is NULL, make it head. Else, traverse to end and link.','Delete: Traverse to find key. Link previous node to next node and delete target.','Display: Traverse from head to NULL, printing data.'],
  code:`#include <iostream>
using namespace std;

struct Node { int data; Node* next; };

class SLL {
    Node* head = NULL;
public:
    void insert(int v) {
        Node* n = new Node{v, NULL};
        if(!head) head = n;
        else { Node* t=head; while(t->next) t=t->next; t->next=n; }
    }
    void del(int v) {
        if(!head) return;
        if(head->data==v) { Node* t=head; head=head->next; delete t; return; }
        Node *t=head, *p=NULL;
        while(t && t->data!=v) { p=t; t=t->next; }
        if(t) { p->next=t->next; delete t; }
    }
    void disp() { for(Node* t=head; t; t=t->next) cout<<t->data<<"->"; cout<<"NULL\\n"; }
};

int main() {
    SLL l;
    l.insert(10); l.insert(20); l.insert(30);
    l.disp();
    l.del(10);
    l.disp();
    return 0;
}`,
  fill:'void insert(int v) { Node* n = new Node{v, ___}; if(!head) head = ___; else { Node* t=head; while(t->___) t=t->next; t->___=n; } }',
  quiz:[
    {q:'What is the time complexity of inserting at end of SLL?', a:'O(N) — must traverse to last node.'},
    {q:'What if we don\'t set next pointer to NULL on new node?', a:'Dangling pointer → likely segmentation fault.'},
    {q:'What keyword frees heap memory in C++?', a:'delete'}
  ],
  sampleIn:'Hardcoded: insert(10), insert(20), insert(30), del(10)',
  sampleOut:'10->20->30->NULL\n20->30->NULL'
},
{
  set:'A', num:2, id:'a2',
  title:'Doubly Linked List ADT Operations',
  aim:'To implement a Doubly Linked List ADT with insertion, deletion, and display operations.',
  algo:['Define Node with data, prev, and next pointers.','Insert: Traverse to end, link next of last to new node, and prev of new to last.','Delete: Update prev and next pointers of neighboring nodes.','Display: Traverse from head, printing data and arrows.'],
  code:`#include <iostream>
using namespace std;

struct Node { int data; Node *prev, *next; };

class DLL {
    Node* head = NULL;
public:
    void insert(int v) {
        Node* n = new Node{v, NULL, NULL};
        if(!head) head = n;
        else { Node* t=head; while(t->next) t=t->next; t->next=n; n->prev=t; }
    }
    void del(int v) {
        for(Node* t=head; t; t=t->next) {
            if(t->data==v) {
                if(t->prev) t->prev->next=t->next;
                else head=t->next;
                if(t->next) t->next->prev=t->prev;
                delete t; return;
            }
        }
    }
    void disp() { for(Node* t=head; t; t=t->next) cout<<t->data<<"<->"; cout<<"NULL\\n"; }
};

int main() {
    DLL d;
    d.insert(1); d.insert(2); d.insert(3);
    d.disp();
    d.del(2);
    d.disp();
    return 0;
}`,
  fill:'struct Node { int data; Node* ___; Node* ___; };',
  quiz:[
    {q:'Advantage of DLL over SLL?', a:'Bidirectional traversal — can go forward and backward.'},
    {q:'What is the extra memory cost in DLL?', a:'One extra pointer (prev) per node.'},
    {q:'What is the output of disp() when only one node exists?', a:'data<->NULL'}
  ],
  sampleIn:'insert(1), insert(2), insert(3), del(2)',
  sampleOut:'1<->2<->3<->NULL\n1<->3<->NULL'
},
{
  set:'A', num:3, id:'a3',
  title:'Circular Linked List Operations',
  aim:'To implement a Circular Linked List with basic ADT operations.',
  algo:['Define Node. For circular, last node\'s next points to head.','Insert: Find last node, link its next to new node, new node\'s next to head.','Display: Use do-while loop; stop when back at head.'],
  code:`#include <iostream>
using namespace std;

struct Node { int data; Node* next; };

class CLL {
    Node* head = NULL;
public:
    void insert(int v) {
        Node* n = new Node{v, NULL};
        if(!head) { head=n; n->next=head; }
        else { Node* t=head; while(t->next!=head) t=t->next; t->next=n; n->next=head; }
    }
    void disp() {
        if(!head) return;
        Node* t=head;
        do { cout<<t->data<<" "; t=t->next; } while(t!=head);
        cout<<"(back to head)\\n";
    }
};

int main() {
    CLL c;
    c.insert(5); c.insert(10); c.insert(15);
    c.disp();
    return 0;
}`,
  fill:'if(!head) { head=n; n->next=___; } else { Node* t=head; while(t->next!=___) t=t->next; ... }',
  quiz:[
    {q:'How to identify end of CLL traversal?', a:'When node->next == head.'},
    {q:'CLL advantage over normal LL?', a:'No NULL — circular access, useful for round-robin scheduling.'},
    {q:'What loop is preferred to traverse a CLL?', a:'do-while — ensures at least one iteration.'}
  ],
  sampleIn:'insert(5), insert(10), insert(15)',
  sampleOut:'5 10 15 (back to head)'
},
{
  set:'A', num:4, id:'a4',
  title:'Vehicle Monitoring — dynamic_cast & Runtime Type Safety',
  aim:'To demonstrate base class pointers, explicit type casting (dynamic_cast), and runtime type safety.',
  algo:['Define base Vehicle class with virtual show().','Define derived Car class overriding show() and adding drift().','Create Vehicle* pointing to Car object.','Use dynamic_cast to safely convert and call drift().'],
  code:`#include <iostream>
using namespace std;

class Vehicle {
public:
    virtual void show() { cout<<"Vehicle\\n"; }
    virtual ~Vehicle() {}
};

class Car : public Vehicle {
public:
    void show() override { cout<<"Car\\n"; }
    void drift() { cout<<"Drifting!\\n"; }
};

class Bike : public Vehicle {
public:
    void show() override { cout<<"Bike\\n"; }
};

int main() {
    Vehicle* v = new Car();
    v->show();
    Car* c = dynamic_cast<Car*>(v);
    if(c) c->drift();

    Vehicle* b = new Bike();
    Car* x = dynamic_cast<Car*>(b);
    if(!x) cout<<"Not a Car — cast failed safely\\n";

    delete v; delete b;
    return 0;
}`,
  fill:'Car* c = ___(v); // dynamic_cast<Car*>',
  quiz:[
    {q:'What does dynamic_cast return on failure for pointers?', a:'nullptr (NULL).'},
    {q:'What must base class have for dynamic_cast to work?', a:'At least one virtual function (polymorphic type).'},
    {q:'static_cast vs dynamic_cast?', a:'static_cast is compile-time; dynamic_cast is runtime-safe.'}
  ],
  sampleIn:'Run Program',
  sampleOut:'Car\nDrifting!\nNot a Car — cast failed safely'
},
{
  set:'A', num:5, id:'a5',
  title:'Banking System — Operator Overloading & this Pointer',
  aim:'To overload the + operator for merging bank accounts and demonstrate the this pointer.',
  algo:['Create Account class with balance.','Overload operator+ to merge balances of two Account objects.','Use this->balance to refer to the calling object\'s member.','Return the merged Account object.'],
  code:`#include <iostream>
using namespace std;

class Account {
    int balance;
public:
    Account(int b=0) { this->balance = b; }
    Account operator+(const Account& a) {
        Account temp;
        temp.balance = this->balance + a.balance;
        return temp;
    }
    void show() { cout << "Balance: " << balance << "\\n"; }
};

int main() {
    Account a1(100), a2(200);
    Account a3 = a1 + a2;
    a1.show();
    a2.show();
    a3.show();
    return 0;
}`,
  fill:'Account ___(const Account& a) { temp.balance = ___->balance + a.balance; ... }',
  quiz:[
    {q:'What is the this pointer?', a:'A hidden pointer to the calling object of the member function.'},
    {q:'Can we overload all operators?', a:'No. :: . .* sizeof cannot be overloaded.'},
    {q:'What does operator+ return?', a:'A new Account object with merged balance.'}
  ],
  sampleIn:'a1(100), a2(200)',
  sampleOut:'Balance: 100\nBalance: 200\nBalance: 300'
},
{
  set:'A', num:6, id:'a6',
  title:'Inheritance Area & Constructor/Destructor',
  aim:'To demonstrate single inheritance for area calculation, and constructor/destructor invocation.',
  algo:['Base Shape with b, h. Derived Triangle calculates 0.5*b*h.','Constructor prints message when object is created.','Destructor prints message when object goes out of scope.'],
  code:`#include <iostream>
using namespace std;

class Shape {
protected:
    float b, h;
public:
    void set(float x, float y) { b=x; h=y; }
};

class Triangle : public Shape {
public:
    Triangle() { cout<<"Triangle created\\n"; }
    ~Triangle() { cout<<"Triangle destroyed\\n"; }
    float area() { return 0.5*b*h; }
};

int main() {
    { Triangle t; t.set(10,5); cout<<"Area: "<<t.area()<<"\\n"; }
    cout<<"After scope\\n";
    return 0;
}`,
  fill:'class Triangle : ___ Shape { ... };  ___Triangle() { cout<<"Dest\\n"; }',

    stack<char> st; string out;
    for(char c:s) {

  code:`#include <iostream>
using namespace std;

struct Node { int data, height; Node *l,*r; };

int ht(Node* n) { return n?n->height:0; }
int bf(Node* n) { return n?ht(n->l)-ht(n->r):0; }
Node* newNode(int v) { return new Node{v,1,NULL,NULL}; }

void upd(Node* n) { n->height=1+max(ht(n->l),ht(n->r)); }

Node* rotR(Node* y) { Node* x=y->l; y->l=x->r; x->r=y; upd(y); upd(x); return x; }
Node* rotL(Node* x) { Node* y=x->r; x->r=y->l; y->l=x; upd(x); upd(y); return y; }

Node* ins(Node* r, int v) {
    if(!r) return newNode(v);
    if(v<r->data) r->l=ins(r->l,v);
    else r->r=ins(r->r,v);
    upd(r);
    int b=bf(r);
    if(b>1&&v<r->l->data) return rotR(r);
    if(b<-1&&v>r->r->data) return rotL(r);
    if(b>1&&v>r->l->data){ r->l=rotL(r->l); return rotR(r); }
    if(b<-1&&v<r->r->data){ r->r=rotR(r->r); return rotL(r); }
    return r;
}

void inorder(Node* r) { if(!r) return; inorder(r->l); cout<<r->data<<" "; inorder(r->r); }

  code:`#include <iostream>
#include <stack>
#include <string>
using namespace std;

int prec(char op) { return (op=='+'||op=='-')?1:(op=='*'||op=='/')?2:0; }

int applyOp(int a, int b, char op) {
    if(op=='+') return a+b;
    if(op=='-') return a-b;
    if(op=='*') return a*b;
    return a/b;
}

int eval(string s) {
    stack<int> vals; stack<char> ops;
    for(int i=0;i<(int)s.size();i++) {
        if(isspace(s[i])) continue;
        if(isdigit(s[i])) {
            int v=0; while(i<(int)s.size()&&isdigit(s[i])) v=v*10+(s[i++]-'0'); i--;
            vals.push(v);
        } else if(s[i]=='(') ops.push(s[i]);
        else if(s[i]==')') {
            while(ops.top()!='('){ int b=vals.top();vals.pop();int a=vals.top();vals.pop();vals.push(applyOp(a,b,ops.top()));ops.pop(); }
            ops.pop();
        } else {
            while(!ops.empty()&&prec(ops.top())>=prec(s[i])){int b=vals.top();vals.pop();int a=vals.top();vals.pop();vals.push(applyOp(a,b,ops.top()));ops.pop();}
            ops.push(s[i]);
        }
    }
    while(!ops.empty()){int b=vals.top();vals.pop();int a=vals.top();vals.pop();vals.push(applyOp(a,b,ops.top()));ops.pop();}
    return vals.top();
}

int main() {
    cout<<"3+5*2 = "<<eval("3+5*2")<<"\\n";
    cout<<"(3+5)*2 = "<<eval("(3+5)*2")<<"\\n";

void merge(vector<int>& a, int l, int m, int r) {
    vector<int> L(a.begin()+l, a.begin()+m+1);

int partition(vector<int>& a, int lo, int hi) {
    int pivot=a[hi], i=lo-1;
    for(int j=lo;j<hi;j++) if(a[j]<=pivot) swap(a[++i],a[j]);
    swap(a[++i],a[hi]);
    return i;
}

void quickSort(vector<int>& a, int lo, int hi) {
    if(lo>=hi) return;
    int p=partition(a,lo,hi);
    quickSort(a,lo,p-1);
    quickSort(a,p+1,hi);
}

const int SIZE=10;

    int h=hash(k);
    for(int i=0;i<SIZE;i++) {

        if(table[idx]==k) return true;

let currentFilter='ALL';

function escape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyCode(id){
  const pre=document.getElementById(id);
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    const btn=pre.previousElementSibling.querySelector('.copy-btn');
    btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',2000);
  });
}

async function runCode(id){
  const code=document.getElementById('ce-'+id).value;
  const stdin=document.getElementById('si-'+id).value;
  const out=document.getElementById('out-'+id);
  const btn=document.getElementById('rb-'+id);
  btn.disabled=true; btn.textContent='Running…';
  out.className='output-ta'; out.textContent='⏳ Compiling and executing…';
  try{
    const res=await fetch('https://emkc.org/api/v2/piston/execute',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({language:'c++',version:'10.2.0',files:[{name:'main.cpp',content:code}],stdin})
    });
    const data=await res.json();
    if(data.compile&&data.compile.code!==0){
      out.className='output-ta error';
      out.textContent='❌ COMPILE ERROR:\n'+data.compile.stderr;
    }else if(data.run){
      if(data.run.stderr&&data.run.code!==0){
        out.className='output-ta error';
        out.textContent='❌ RUNTIME ERROR:\n'+data.run.stderr;
      }else{
        out.className='output-ta';
        out.textContent=data.run.stdout||(data.run.stderr||'(no output)');
      }
    }
  }catch(err){
    out.className='output-ta error';
    out.textContent='❌ Network error: '+err.message+'\n\nTip: Check internet connection.';
  }finally{
    btn.disabled=false; btn.textContent='▶ Run';
  }
}

function setFilter(set){
  currentFilter=set;
  document.querySelectorAll('.flt').forEach(b=>b.classList.toggle('active',b.dataset.set===set));
  filterAll();
}

function filterAll(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let visible=0;
  experiments.forEach(e=>{
    const card=document.getElementById(e.id);
    const nav=document.querySelector(`.nav-item[data-id="${e.id}"]`);
    const setMatch=currentFilter==='ALL'||e.set===currentFilter;
    const textMatch=!q||e.title.toLowerCase().includes(q)||`set ${e.set.toLowerCase()}`.includes(q)||`q${e.num}`.includes(q);
    const show=setMatch&&textMatch;
    card.classList.toggle('hidden',!show);
    nav&&nav.classList.toggle('hidden',!show);
    if(show) visible++;
  });
  document.getElementById('no-results').style.display=visible?'none':'block';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

// highlight active nav on scroll
function onScroll(){
  const cards=[...document.querySelectorAll('.exp-card:not(.hidden)')];
  let current=null;
  for(const c of cards){
    const rect=c.getBoundingClientRect();
    if(rect.top<=120) current=c.id;
  }
  if(current){
    document.querySelectorAll('.nav-item').forEach(a=>{
      a.classList.toggle('active',a.dataset.id===current);
    });
  }
}

document.getElementById('main').addEventListener('scroll',onScroll);

buildSidebar();
buildExperiments();
filterAll();
</script>
