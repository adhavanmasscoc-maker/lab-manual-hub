<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C++ ECE Lab</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h1 {
    margin-top: 40px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
}

.card {
    width: 220px;
    padding: 30px;
    border-radius: 15px;
    color: white;
    text-decoration: none;
    font-size: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.setA { background: linear-gradient(135deg,#ff416c,#ff4b2b); }
.setB { background: linear-gradient(135deg,#11998e,#38ef7d); }
.setC { background: linear-gradient(135deg,#6a11cb,#2975fc); }
.setK { background: linear-gradient(135deg,#6a61cb,#8575fc); }
</style>
</head>

<body>

<h1>📘 C++ ECE Lab</h1>
<p>Select a Set</p>

<div class="container">
    <a href="MAIN/" class="card setK">MAIN</a>
    <a href="setA/" class="card setA">SET A</a>
    <a href="setB/" class="card setB">SET B</a>
    <a href="setC/" class="card setC">SET C</a>

</div>

</body>
</html>
