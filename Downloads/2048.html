<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern 2048</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            /* Sizing */
            --board-size: 400px;
            --gap: 12px;
            --cell-size: calc((var(--board-size) - var(--gap) * 5) / 4);

            /* Light Theme (Default) */
            --bg-color: #f4f6f8;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --board-bg: rgba(200, 205, 210, 0.4);
            --cell-empty: rgba(238, 228, 218, 0.35);
            --panel-bg: rgba(255, 255, 255, 0.6);
            --btn-bg: #34495e;
            --btn-text: #fff;

            /* Tile Colors */
            --t-2-bg: #eee4da;
            --t-2-c: #776e65;
            --t-4-bg: #ede0c8;
            --t-4-c: #776e65;
            --t-8-bg: #f2b179;
            --t-8-c: #f9f6f2;
            --t-16-bg: #f59563;
            --t-16-c: #f9f6f2;
            --t-32-bg: #f67c5f;
            --t-32-c: #f9f6f2;
            --t-64-bg: #f65e3b;
            --t-64-c: #f9f6f2;
            --t-128-bg: #edcf72;
            --t-128-c: #f9f6f2;
            --t-256-bg: #edcc61;
            --t-256-c: #f9f6f2;
            --t-512-bg: #edc850;
            --t-512-c: #f9f6f2;
            --t-1024-bg: #edc53f;
            --t-1024-c: #f9f6f2;
            --t-2048-bg: #edc22e;
            --t-2048-c: #f9f6f2;
            --t-super-bg: #3c3a32;
            --t-super-c: #f9f6f2;
        }

        /* Dark Theme overrides */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-main: #f5f6fa;
            --text-light: #dcdde1;
            --board-bg: rgba(40, 40, 40, 0.6);
            --cell-empty: rgba(255, 255, 255, 0.05);
            --panel-bg: rgba(30, 30, 30, 0.6);
            --btn-bg: #4a69bd;

            /* Slight tweak for dark mode tile visibility */
            --t-2-bg: #3d3b39;
            --t-2-c: #f9f6f2;
            --t-4-bg: #4d4a46;
            --t-4-c: #f9f6f2;
        }

        /* Responsive scaling for mobile */
        @media (max-width: 500px) {
            :root {
                --board-size: 92vw;
                --gap: 2.5vw;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* Animated Background Gradient */
        .bg-anim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(45deg, var(--bg-color), rgba(100, 150, 250, 0.1), var(--bg-color));
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .game-container {
            width: var(--board-size);
            margin-top: 4vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header & Scoring */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .score-val {
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        button {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-icon {
            padding: 10px;
            font-size: 1.1rem;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Game Board */
        .board-wrapper {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            background: var(--board-bg);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            touch-action: none;
            /* Prevent browser swipe handling */
        }

        .grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: var(--gap);
            padding: var(--gap);
        }

        .grid-cell {
            background: var(--cell-empty);
            border-radius: 6px;
        }

        .tile-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Tile Logic (Hardware Accelerated, Zero Layout Triggers) */
        .tile {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--cell-size);
            height: var(--cell-size);
            /* Position via transform utilizing CSS variables set by JS */
            transform: translate(calc(var(--gap) + var(--x) * (var(--cell-size) + var(--gap))),
                    calc(var(--gap) + var(--y) * (var(--cell-size) + var(--gap))));
            transition: transform 0.12s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Inner element handles scaling & coloring to prevent transform conflicts */
        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        @media (max-width: 500px) {
            .tile-inner {
                font-size: 1.5rem;
            }
        }

        /* Tile Values */
        .tile[data-val="2"] .tile-inner {
            background: var(--t-2-bg);
            color: var(--t-2-c);
        }

        .tile[data-val="4"] .tile-inner {
            background: var(--t-4-bg);
            color: var(--t-4-c);
        }

        .tile[data-val="8"] .tile-inner {
            background: var(--t-8-bg);
            color: var(--t-8-c);
        }

        .tile[data-val="16"] .tile-inner {
            background: var(--t-16-bg);
            color: var(--t-16-c);
        }

        .tile[data-val="32"] .tile-inner {
            background: var(--t-32-bg);
            color: var(--t-32-c);
        }

        .tile[data-val="64"] .tile-inner {
            background: var(--t-64-bg);
            color: var(--t-64-c);
        }

        .tile[data-val="128"] .tile-inner {
            background: var(--t-128-bg);
            color: var(--t-128-c);
            font-size: 1.8rem;
        }

        .tile[data-val="256"] .tile-inner {
            background: var(--t-256-bg);
            color: var(--t-256-c);
            font-size: 1.8rem;
        }

        .tile[data-val="512"] .tile-inner {
            background: var(--t-512-bg);
            color: var(--t-512-c);
            font-size: 1.8rem;
        }

        .tile[data-val="1024"] .tile-inner {
            background: var(--t-1024-bg);
            color: var(--t-1024-c);
            font-size: 1.4rem;
        }

        .tile[data-val="2048"] .tile-inner {
            background: var(--t-2048-bg);
            color: var(--t-2048-c);
            font-size: 1.4rem;
        }

        /* Modals */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(var(--bg-color), 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .modal .btn-group {
            display: flex;
            gap: 10px;
        }

        /* Animations */
        .tile.new .tile-inner {
            animation: popIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .tile.merged .tile-inner {
            animation: mergePop 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes mergePop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="bg-anim"></div>

    <div class="game-container">
        <header>
            <h1>2048</h1>
            <div class="scores">
                <div class="score-box">
                    <span class="score-label">Score</span>
                    <span class="score-val" id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Best</span>
                    <span class="score-val" id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="controls">
            <button id="btn-new-game">New Game</button>
            <div style="display: flex; gap: 8px;">
                <button id="btn-undo" class="btn-icon" title="Undo">↩️</button>
                <button id="btn-theme" class="btn-icon" title="Toggle Theme">🌓</button>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="grid-background" id="grid-bg"></div>

            <div class="tile-container" id="tile-container"></div>

            <div class="modal" id="modal-win">
                <h2>You Win!</h2>
                <div class="btn-group">
                    <button id="btn-keep-playing">Keep Playing</button>
                    <button id="btn-restart-win">Restart</button>
                </div>
            </div>
            <div class="modal" id="modal-over">
                <h2>Game Over</h2>
                <button id="btn-restart-over">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        /** --- CONFIG & STATE --- */
        let board = [];       // Array of active tile objects {id, x, y, val}
        let score = 0;
        let bestScore = localStorage.getItem('2048-best') || 0;
        let history = [];     // For undo functionality
        let tileIdCounter = 0;
        let hasWon = false;
        let isGameOver = false;
        let isMoving = false; // Lock to prevent rapid overlapping moves

        const DOM = {
            container: document.getElementById('tile-container'),
            score: document.getElementById('score'),
            bestScore: document.getElementById('best-score'),
            modalWin: document.getElementById('modal-win'),
            modalOver: document.getElementById('modal-over'),
            gridBg: document.getElementById('grid-bg')
        };

        /** --- INITIALIZATION --- */
        function init() {
            // Generate background grid cells
            DOM.gridBg.innerHTML = Array(16).fill('<div class="grid-cell"></div>').join('');
            DOM.bestScore.innerText = bestScore;
            
            // Theme setup
            const savedTheme = localStorage.getItem('2048-theme');
            if (savedTheme === 'dark') document.body.setAttribute('data-theme', 'dark');

            loadState() || startNewGame();
            setupEventListeners();
        }

        function startNewGame() {
            board = [];
            score = 0;
            history = [];
            hasWon = false;
            isGameOver = false;
            tileIdCounter = 0;
            DOM.modalWin.classList.remove('active');
            DOM.modalOver.classList.remove('active');
            DOM.container.innerHTML = '';
            
            addRandomTile();
            addRandomTile();
            updateDOM();
            saveState();
        }

        /** --- CORE LOGIC --- */
        function addRandomTile() {
            let emptyCells = [];
            for(let y=0; y<4; y++) {
                for(let x=0; x<4; x++) {
                    if(!board.find(t => t.x === x && t.y === y)) emptyCells.push({x, y});
                }
            }
            if(emptyCells.length === 0) return;
            
            let pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            let val = Math.random() < 0.9 ? 2 : 4;
            
            board.push({
                id: tileIdCounter++,
                x: pos.x,
                y: pos.y,
                val: val,
                isNew: true
            });
        }

        // Direction mapping: 0:Up, 1:Right, 2:Down, 3:Left
        function move(direction) {
            if (isMoving || isGameOver || (hasWon && DOM.modalWin.classList.contains('active'))) return;
            isMoving = true;

            // Save state before move for Undo
            const boardSnapshot = JSON.parse(JSON.stringify(board));
            const scoreSnapshot = score;

            let moved = false;
            let scoreIncrease = 0;
            let tilesToRemove = [];

            // Grouping config based on direction
            const isVertical = direction === 0 || direction === 2;
            const isReverse = direction === 1 || direction === 2; // Right or Down

            for (let i = 0; i < 4; i++) {
                // Get tiles in current row/col
                let line = board.filter(t => isVertical ? t.x === i : t.y === i);
                
                // Sort appropriately
                line.sort((a, b) => {
                    const diff = isVertical ? a.y - b.y : a.x - b.x;
                    return isReverse ? -diff : diff;
                });

                let targetIndex = isReverse ? 3 : 0;
                let prevTile = null;

                for (let tile of line) {
                    if (prevTile && prevTile.val === tile.val && !prevTile.merged) {
                        // Merge logic
                        if (isVertical) tile.y = prevTile.y; else tile.x = prevTile.x;
                        tile.isMerging = true; // Mark for DOM removal
                        
                        prevTile.val *= 2;
                        prevTile.merged = true;
                        prevTile.isUpgraded = true;
                        scoreIncrease += prevTile.val;
                        moved = true;
                        tilesToRemove.push(tile);
                        board = board.filter(t => t.id !== tile.id); // Remove from logic array immediately
                    } else {
                        // Slide logic
                        if (isVertical && tile.y !== targetIndex) { tile.y = targetIndex; moved = true; }
                        if (!isVertical && tile.x !== targetIndex) { tile.x = targetIndex; moved = true; }
                        prevTile = tile;
                        isReverse ? targetIndex-- : targetIndex++;
                    }
                }
            }

            if (moved) {
                // Haptic feedback
                if (scoreIncrease > 0 && navigator.vibrate) navigator.vibrate(50);
                
                score += scoreIncrease;
                if (score > bestScore) {
                    bestScore = score;
                    DOM.bestScore.innerText = bestScore;
                    localStorage.setItem('2048-best', bestScore);
                }

                // Push history (limit to 20 states to save memory)
                history.push({ board: boardSnapshot, score: scoreSnapshot });
                if (history.length > 20) history.shift();

                addRandomTile();
                saveState();
                updateDOM(tilesToRemove);

                checkWinLoss();
            } else {
                isMoving = false;
            }
        }

        function checkWinLoss() {
            if (!hasWon && board.some(t => t.val === 2048)) {
                hasWon = true;
                setTimeout(() => DOM.modalWin.classList.add('active'), 800);
            }

            // Check Loss
            if (board.length === 16) {
                let canMove = false;
                for (let t of board) {
                    if (board.find(other => other.y === t.y && other.x === t.x + 1 && other.val === t.val)) canMove = true;
                    if (board.find(other => other.x === t.x && other.y === t.y + 1 && other.val === t.val)) canMove = true;
                }
                if (!canMove) {
                    isGameOver = true;
                    setTimeout(() => DOM.modalOver.classList.add('active'), 800);
                }
            }
        }

        /** --- RENDER ENGINE --- */
        function updateDOM(tilesToRemove = []) {
            requestAnimationFrame(() => {
                DOM.score.innerText = score;

                // Create or update active tiles
                board.forEach(tile => {
                    let el = document.getElementById('tile-' + tile.id);
                    if (!el) {
                        el = document.createElement('div');
                        el.id = 'tile-' + tile.id;
                        el.innerHTML = `<div class="tile-inner">${tile.val}</div>`;
                        DOM.container.appendChild(el);
                    }
                    
                    // Hardware accelerated positioning
                    el.style.setProperty('--x', tile.x);
                    el.style.setProperty('--y', tile.y);
                    
                    // Update styling and inner value
                    el.setAttribute('data-val', tile.val > 2048 ? 'super' : tile.val);
                    el.querySelector('.tile-inner').innerText = tile.val;

                    // Animations
                    el.className = `tile ${tile.isNew ? 'new' : ''} ${tile.isUpgraded ? 'merged' : ''}`;
                    
                    // Reset animation flags
                    tile.isNew = false;
                    tile.isUpgraded = false;
                    tile.merged = false;
                });

                // Handle merged tiles (animate to target, then destroy)
                tilesToRemove.forEach(tile => {
                    let el = document.getElementById('tile-' + tile.id);
                    if (el) {
                        el.style.setProperty('--x', tile.x);
                        el.style.setProperty('--y', tile.y);
                        el.style.zIndex = "1"; // Push behind the newly created merged tile
                        // Remove from DOM after CSS transition completes
                        setTimeout(() => el.remove(), 150); 
                    }
                });

                // Unlock movement after animation time
                setTimeout(() => { isMoving = false; }, 150);
            });
        }

        /** --- UTILS & STORAGE --- */
        function undo() {
            if (history.length === 0 || isMoving) return;
            let lastState = history.pop();
            board = lastState.board;
            score = lastState.score;
            isGameOver = false;
            DOM.modalOver.classList.remove('active');
            DOM.container.innerHTML = ''; // Force clean DOM rebuild
            updateDOM();
            saveState();
        }

        function saveState() {
            localStorage.setItem('2048-state', JSON.stringify({ board, score, hasWon, idCounter: tileIdCounter }));
        }

        function loadState() {
            try {
                const state = JSON.parse(localStorage.getItem('2048-state'));
                if (state && state.board && state.board.length > 0) {
                    board = state.board;
                    score = state.score;
                    hasWon = state.hasWon;
                    tileIdCounter = state.idCounter || 100; // prevent ID overlap
                    updateDOM();
                    return true;
                }
            } catch(e) { console.error("Could not load state"); }
            return false;
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('2048-theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('2048-theme', 'dark');
            }
        }

        /** --- INPUT HANDLING --- */
        function setupEventListeners() {
            // Keyboard
            window.addEventListener('keydown', e => {
                if (['ArrowUp', 'w', 'W'].includes(e.key)) move(0);
                if (['ArrowRight', 'd', 'D'].includes(e.key)) move(1);
                if (['ArrowDown', 's', 'S'].includes(e.key)) move(2);
                if (['ArrowLeft', 'a', 'A'].includes(e.key)) move(3);
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
            }, {passive: false});

            // Buttons
            document.getElementById('btn-new-game').addEventListener('click', startNewGame);
            document.getElementById('btn-undo').addEventListener('click', undo);
            document.getElementById('btn-theme').addEventListener('click', toggleTheme);
            document.getElementById('btn-restart-win').addEventListener('click', startNewGame);
            document.getElementById('btn-restart-over').addEventListener('click', startNewGame);
            document.getElementById('btn-keep-playing').addEventListener('click', () => {
                DOM.modalWin.classList.remove('active');
            });

            // Touch Swipe Logic
            let startX, startY;
            const boardEl = document.querySelector('.board-wrapper');

            boardEl.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, {passive: true});

            boardEl.addEventListener('touchmove', e => {
                e.preventDefault(); // Stop screen scrolling while swiping board
            }, {passive: false});

            boardEl.addEventListener('touchend', e => {
                if (!startX || !startY) return;
                let dx = e.changedTouches[0].clientX - startX;
                let dy = e.changedTouches[0].clientY - startY;
                let absDx = Math.abs(dx);
                let absDy = Math.abs(dy);

                // Swipe threshold
                if (Math.max(absDx, absDy) > 30) {
                    if (absDx > absDy) dx > 0 ? move(1) : move(3);
                    else dy > 0 ? move(2) : move(0);
                }
                startX = null; startY = null;
            });
        }

        // Boot
        init();

    </script>
</body>

</html>
