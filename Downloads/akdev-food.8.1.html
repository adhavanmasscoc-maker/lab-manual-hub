          {filteredFeedback.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text3)"}}>All caught up! No active feedback.</div>:
          filteredFeedback.map(fb=>(
            <div key={fb.id} className="fb-item" style={{display: 'flex', flexDirection: 'column'}}>
              <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 12}}>
                  <div>
                      <div style={{fontSize: 14, fontWeight: 700}}>{fb.user}</div>
                      <div style={{fontSize: 10, color: "var(--text3)", marginTop: 2}}>{fb.time}</div>
                  </div>
              </div>
              <div style={{fontSize: 13, color: "var(--text2)", lineHeight: 1.6, marginBottom: 16}}>
                  {fb.text}
              </div>
              <div style={{display:"flex", alignItems: "center", gap:12}}>
                {fb.status==="pending"&&<button className="ad-btn green" style={{fontSize: 12, padding: "8px 14px"}} onClick={()=>updateFeedbackStatus(fb.id,"resolved")}>✓ Resolve</button>}
                <span className={`fb-status ${fb.status==="pending"?"fb-pending":"fb-resolved"}`} style={{fontSize: 11, padding: "6px 12px"}}>{fb.status}</span>
                <button className="ad-btn" style={{color:"var(--red)", fontSize: 12, padding: "8px 14px", marginLeft: 'auto'}} onClick={()=>deleteFeedback(fb.id)}>🗑️ Delete</button>
              </div>
            </div>
          ))}
        </div>}

        {/* SETTINGS */}
        {tab==="settings"&&<div className="fi">
          <div className="ad-section-title">Global App Switches</div>
          {appSettings.maintenance&&<div className="maint-banner"><p>🚧 Maintenance mode is ON — public access blocked</p></div>}
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:"16px 20px",marginBottom:20}}>
            {[
              {k:"maintenance",label:"🚧 Maintenance Mode (Kill Switch)",desc:"Block public access immediately. Admin dashboard still works."},
              {k:"showTrending",label:"🔥 Show Trending Module",desc:"Toggle the recommended/trending slider on the Home screen."},
              {k:"showMostOrdered",label:"🍽️ Show Most Ordered Module",desc:"Toggle the secondary list on the Home screen."},
            ].map(({k,label,desc})=>(
              <div key={k} className="ad-toggle-row">
                <div><div className="ad-toggle-lbl">{label}</div><div className="ad-toggle-desc">{desc}</div></div>
                <div className={`toggle-sw${appSettings[k]?" on":""}`} onClick={()=>{setAppSettings(p=>({...p,[k]:!p[k]}));showNotif(`✓ ${label} ${appSettings[k]?"disabled":"enabled"}`);}}/>
              </div>
            ))}
          </div>
          <div className="ad-section-title">Localization / Text Customization</div>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:"16px 20px"}}>
            {[["appName","App Name Brand","CIT Food Finder"],["trendingTitle","Trending Section Title","Recommended For You"],["mostOrderedTitle","Most Ordered Title","Most Ordered"],["searchPlaceholder","Search Placeholder String","rolls, dosa, juice"]].map(([k,label,ph])=>(
              <div key={k} style={{marginBottom:16}}>
                <label style={{fontFamily:"'DM Mono', monospace",fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",display:"block",marginBottom:6}}>{label}</label>
                <input className="a-inp" style={{marginBottom:0, fontSize:16}} placeholder={ph} value={appSettings[k]||""} onChange={e=>setAppSettings(p=>({...p,[k]:e.target.value}))} onBlur={()=>showNotif("✓ Copy updated")}/>
              </div>
            ))}
          </div>
        </div>}

        {/* JSON */}
        {tab==="json"&&<div className="fi">
          <div className="ad-section-title">Database Export / Import</div>
          <p style={{fontSize:13,color:"var(--text2)",marginBottom:16,lineHeight:1.6}}>Directly modify the underlying database array. Use this to backup the current state or batch-import new vendors.</p>
          <textarea className="json-editor" rows={14} value={jsonText||JSON.stringify(foods,null,2)} onChange={e=>{setJsonText(e.target.value);validateJson(e.target.value);}} placeholder='[{"id":"food1","name":"Food Name",...}]'/>
          {jsonValid!==null&&<div className={`json-valid ${jsonValid?"json-ok":"json-err"}`}>{jsonValid?"✓ Syntax Valid":"✗ Invalid JSON — fix errors before applying"}</div>}
          <div style={{display:"flex",gap:12,marginTop:16}}>
            <button className="ad-btn primary" onClick={applyJson} disabled={jsonValid===false} style={{flex:1,padding:"14px",fontSize:14}}>Deploy JSON</button>
            <button className="ad-btn" onClick={()=>{const blob=new Blob([JSON.stringify(foods,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="cit_foods_backup.json";a.click();}} style={{flex:1,padding:"14px",fontSize:14}}>Download Backup</button>
          </div>
          <div style={{height:24}}/>
          <div className="ad-section-title">Upload Local Backup</div>
          <div className="img-upload-btn" onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setJsonText(ev.target.result);validateJson(ev.target.result);};r.readAsText(f);};inp.click();}} style={{padding:"16px",justifyContent:"center"}}>📁 Choose JSON File</div>
        </div>}
      </div>

      {/* ADVANCED EDIT FOOD MODAL */}
      {editFood&&(
        <div className="overlay" onClick={e=>{if(e.target.className==="overlay")setEditFood(null);}}>
          <div className="sheet" style={{maxHeight:"85vh"}} onClick={e=>e.stopPropagation()}>
            <div className="drag-handle"/>
            <div style={{padding:"20px 24px 30px"}}>
              <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Edit: {editFood.name}</div>
              
              <div style={{marginBottom:14}}>
                 <label style={{fontFamily:"'DM Mono', monospace",fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",display:"block",marginBottom:6}}>Food Image (Upload or URL)</label>
                 <div style={{display: 'flex', gap: 10, alignItems: 'center'}}>
                     <input type="text" className="a-inp" style={{marginBottom:0, flex: 1}} placeholder="https://... or upload ->" value={editFood.image||""} onChange={e=>setEditFood(p=>({...p, image: e.target.value}))}/>
                 </div>
              </div>

              {[["name","Food Name","text"],["price","Price (₹)","number"],["category","Category (e.g., Snacks, Drinks)","text"],["time","Available Time String","text"],["desc","Description","text"],["emoji","Emoji Fallback","text"]].map(([k,label,type])=>(
                <div key={k} style={{marginBottom:14}}>
                  <label style={{fontFamily:"'DM Mono', monospace",fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",display:"block",marginBottom:6}}>{label}</label>
                  <input type={type} className="a-inp" style={{marginBottom:0, fontSize:16}} value={editFood[k]||""} onChange={e=>setEditFood(p=>({...p,[k]:type==="number"?parseFloat(e.target.value)||0:e.target.value}))}/>
                </div>
              ))}
              <div style={{marginBottom:14}}>
                <label style={{fontFamily:"'DM Mono', monospace",fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",display:"block",marginBottom:6}}>Dietary Type</label>
                <div style={{display:"flex",gap:10}}>
                  <span className={`avs${editFood.isVeg?" on-green":""}`} onClick={()=>setEditFood(p=>({...p,isVeg:true}))}>🥦 Veg</span>
                  <span className={`avs${!editFood.isVeg?" on-red":""}`} onClick={()=>setEditFood(p=>({...p,isVeg:false}))}>🍗 Non-Veg</span>
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <label style={{fontFamily:"'DM Mono', monospace",fontSize:10,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",display:"block",marginBottom:6}}>App Placement</label>
                <div style={{display:"flex",gap:10}}>
                  <span className={`avs${editFood.isTrending?" on-green":""}`} onClick={()=>setEditFood(p=>({...p,isTrending:true}))}>🔥 Trending Section</span>
                  <span className={`avs${!editFood.isTrending?" on-red":""}`} onClick={()=>setEditFood(p=>({...p,isTrending:false}))}>Normal List</span>
                </div>
              </div>
              <div style={{display:"flex",gap:12,marginTop:24}}>
                <button className="a-btn" style={{flex:1,padding:"14px",background:"none",border:"2px solid var(--border2)",borderRadius:14,color:"var(--text)",fontWeight:700}} onClick={()=>setEditFood(null)}>Discard</button>
                <button className="a-btn" style={{flex:1,padding:"14px",background:"var(--cyan)",color:"#000",border:"none",borderRadius:14,fontWeight:800}} onClick={() => { db.collection("foods").doc(editFood.id).set(editFood).then(() => { setEditFood(null); showNotif("✓ Cloud Database updated!"); }); }}>Commit Changes</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════
// MAIN APP ROUTER / INIT (FIXED DUPLICATES)
// ══════════════════════════════════════════════════
function App(){
  const [theme,setTheme]=useLS("cit_theme","dark");
  const [tab,setTab]=useState("home");

  // 👇 FIREBASE CLOUD STATE 👇
  const [foods, setFoods] = useState([]);
  const [shops, setShops] = useState([]);
  const [feedback, setFeedback] = useState([]);

  useEffect(() => {
      const unsubFoods = db.collection("foods").onSnapshot(snap => {
          if (snap.empty) { INIT_FOODS.forEach(f => db.collection("foods").doc(f.id).set(f)); } 
          else { setFoods(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); }
      });
      const unsubShops = db.collection("shops").onSnapshot(snap => {
          if (snap.empty) { INIT_SHOPS.forEach(s => db.collection("shops").doc(s.id).set(s)); } 
          else { setShops(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); }
      });
      const unsubFeedback = db.collection("feedback").onSnapshot(snap => {
          setFeedback(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
      });
      return () => { unsubFoods(); unsubShops(); unsubFeedback(); };
  }, []);
  // 👆 END FIREBASE CLOUD STATE 👆

  const [appSettings,setAppSettings]=useLS("cit_settings",{maintenance:false,showTrending:true,showMostOrdered:true,appName:"CIT Food Finder",trendingTitle:"Recommended For You",mostOrderedTitle:"Most Ordered",searchPlaceholder:"rolls, dosa, juice"});
  const [wishlist,setWishlist]=useLS("cit_wl",[]);
  const [userNA,setUserNA]=useLS("cit_na_v4",[]);
  const [recentlyViewed,setRV]=useLS("cit_rv",[]);
  const [openFood,setOpenFood]=useState(null);
  const [loginOpen,setLoginOpen]=useState(false);
  const [filterOpen,setFilterOpen]=useState(false);
  const [themeOpen,setThemeOpen]=useState(false); 
  const [supportOpen,setSupportOpen]=useState(false); 
  const [currentUser,setCurrentUser]=useLS("cit_user",null);
  const [adminSession,setAdminSession]=useLS("cit_admin_session",null);
  
  const [viewAdminDash,setViewAdminDash]=useState(!!adminSession);
  const [notif,setNotif]=useState("");
  const [clock,setClock]=useState("");

  const [currentFilters,setCurrentFilters]=useLS("cit_filters_v2", {veg:false, nonveg:false, avail:false, budget:[0,999], minStar:0, shops:[], sort:"relevance"});
  const [showDropdown, setShowDropdown] = useState(false);

  useEffect(()=>{
    const tick=()=>{const n=new Date();const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();const ap=h>=12?"PM":"AM";setClock(`${String(h%12||12).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")} ${ap}`);};
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);

  // Apply Theme 
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  // Handle Browser Back Button for Modals
  useEffect(() => {
    const handlePopState = (e) => {
      if (openFood) setOpenFood(null);
      if (loginOpen) setLoginOpen(false);
      if (filterOpen) setFilterOpen(false);
      if (themeOpen) setThemeOpen(false);
      if (supportOpen) setSupportOpen(false);
    };
    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, [openFood, loginOpen, filterOpen, themeOpen, supportOpen]);

  // Close dropdown on outside click
  useEffect(() => {
    const closeDD = (e) => { if (showDropdown && !e.target.closest('.user-avatar-container')) setShowDropdown(false); };
    document.addEventListener('click', closeDD);
    return () => document.removeEventListener('click', closeDD);
  }, [showDropdown]);

  const handleRequireLogin=()=>{
    window.history.pushState({ modal: 'login' }, '');
    setLoginOpen(true);
  };

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setLoginOpen(false);
    setNotif(`Welcome ${user.name.split(" ")[0]} 👋`);
  };

  const handleAdminLogin=(user)=>{
    setAdminSession(user);
    setViewAdminDash(true);
    setLoginOpen(false);
    setNotif(`Admin Access Granted 🛡️`);
  };

  const handleLogout = () => {
    if (confirm("Are you sure you want to logout?")) {
      setCurrentUser(null);
      setAdminSession(null);
      setViewAdminDash(false);
      setWishlist([]); 
      setUserNA([]);
      localStorage.removeItem('cit_user');
      localStorage.removeItem('cit_admin_session');
      localStorage.removeItem('cit_role');
      setShowDropdown(false);
      setNotif("Logged out successfully 👋");
    }
  };

  const handleOpenFood=(food)=>{
    setRV(rv=>{const n=rv.filter(x=>x!==food.id);return[food.id,...n].slice(0,10);});
    window.history.pushState({ modal: 'food' }, '');
    setOpenFood(food);
  };

  // 👇 FIXED: NA reports sync to Cloud 👇
  const handleNA=(id, e)=>{
    if(e) e.stopPropagation();
    setUserNA(prev=>prev.includes(id)?prev:[...prev,id]);
    const food = foods.find(f=>f.id===id);
    if(food) {
        const newCount = (food.notAvailableCount || 0) + 1;
        const newStatus = food.adminStatus === "available" && newCount >= NA_THRESHOLD ? "likely_unavailable" : food.adminStatus;
        db.collection("foods").doc(id).update({
            notAvailableCount: newCount,
            adminStatus: newStatus
        }).catch(err => console.error(err));
    }
    setNotif("Noted! Item moved to bottom for you.");
  };

  const handleWish=(id, e)=>{
    if(e) e.stopPropagation();
    if(!currentUser){handleRequireLogin();return;}
    setWishlist(prev=>{
        const isSaved = prev.includes(id);
        const newList = isSaved ? prev.filter(x=>x!==id) : [...prev,id];
        setNotif(isSaved ? "Removed from wishlist" : "♥ Added to wishlist");
        return newList;
    });
  };

  // 👇 FIXED: Push Reviews to Firebase 👇
  const handleSubmitReview = (foodId, review) => {
      db.collection("foods").doc(foodId).update({
          reviews: firebase.firestore.FieldValue.arrayUnion(review)
      });
  };
  
  // 👇 FIXED: Push Support Feedback to Firebase 👇
  const handleSupportSubmit = (msg, type) => {
      const newFb = {
          id: Date.now().toString(),
          user: currentUser?.name || "Guest Student",
          email: currentUser?.email || "guest@citchennai.net",
          text: `[${type}] ${msg}`,
          time: new Date().toISOString().replace('T',' ').substring(0, 16),
          status: "pending"
      };
      db.collection("feedback").doc(newFb.id).set(newFb);
      setNotif("Feedback sent to admin! Thank you.");
  };

  // Maintenance mode block
  if(appSettings.maintenance && !viewAdminDash && !adminSession) return(
    <div style={{height:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"var(--bg)",textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:20}}>🚧</div>
      <div style={{fontSize:24,fontWeight:800,marginBottom:12}}>Site Under Maintenance</div>
      <div style={{fontSize:15,color:"var(--text2)",lineHeight:1.6,marginBottom:32}}>We're making CIT Food Finder even better.<br/>Check back soon!</div>
      <button className="login-btn" style={{padding:"14px 32px",width:"auto"}} onClick={handleRequireLogin}>Admin Login</button>
      {loginOpen&&<LoginModal onClose={()=>setLoginOpen(false)} onLogin={()=>{}} onAdminLogin={handleAdminLogin}/>}
    </div>
  );

  // Admin View Rendering
  if(adminSession && viewAdminDash){
    return <AdminDashboard foods={foods} setFoods={setFoods} shops={shops} setShops={setShops} feedback={feedback} setFeedback={setFeedback} appSettings={appSettings} setAppSettings={setAppSettings} onViewSite={() => setViewAdminDash(false)} onLogout={()=>{setAdminSession(null);setViewAdminDash(false);localStorage.removeItem('cit_admin_session');}} adminUser={adminSession}/>;
  }

  const modalFood=openFood?foods.find(f=>f.id===openFood.id)||openFood:null;

  return(
    <div id="root" data-theme={theme}>
      {notif&&<Notif msg={notif} onDone={()=>setNotif("")}/>}

      <div className="topbar">
        <div className="tb-brand">
          <div className="tb-logo-row">
            <span style={{fontSize: 22}}>🍽️</span>
            <div>
              <div style={{color: 'var(--cyan)'}}>{appSettings.appName.split(" ")[0] || "CIT"} Food</div>
              <div style={{color: 'var(--cyan)'}}>{appSettings.appName.split(" ").slice(1).join(" ") || "Finder"}</div>
            </div>
          </div>
          <div className="tb-sub">
            CHENNAI INSTITUTE OF TECHNOLOGY · <br/>
            <a href="https://akdev-official.vercel.app/" target="_blank">BY AKDEV LABS</a>
          </div>
        </div>
        <div className="tb-right">
          {adminSession && (
              <button onClick={() => setViewAdminDash(true)} style={{background:"var(--cyan)", color:"#000", border:"none", fontSize:11, fontWeight:800, padding:"6px 12px", borderRadius:"12px", marginRight: "4px"}}>
                  Dashboard 🛡️
              </button>
          )}
          
          {/* THEME SWITCHER ICON */}
          <button className="theme-btn" onClick={()=>{window.history.pushState({modal:'theme'},''); setThemeOpen(true);}}>
            {theme==='dark'?'🌙':theme==='light'?'☀️':theme==='midnight'?'🌌':theme==='forest'?'🌲':'🌇'}
          </button>
          
          {currentUser? (
            <div className="user-avatar-container" style={{ position: 'relative' }}>
              <div className="user-avatar" title={currentUser.email} onClick={(e) => { e.stopPropagation(); setShowDropdown(!showDropdown); }}>
                {currentUser.name.charAt(0).toUpperCase()}
              </div>
              {showDropdown && (
                <div className="fi" style={{ position: 'absolute', top: '120%', right: 0, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: 8, minWidth: 140, boxShadow: 'var(--shadow)', zIndex: 200 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, padding: "8px 12px", borderBottom: "1px solid var(--border)", marginBottom: 4 }}>
                    {currentUser.name.split(" ")[0]}
                  </div>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleLogout(); }} style={{ width: '100%', textAlign: 'left', padding: "8px 12px", fontSize: 13, color: 'var(--red)', borderRadius: 8, transition: 'background 0.2s', background: 'transparent', border: 'none', cursor: 'pointer', fontWeight: 600 }} onMouseOver={e => e.currentTarget.style.background = 'rgba(239,71,111,0.1)'} onMouseOut={e => e.currentTarget.style.background = 'transparent'}>
                    Logout 👋
                  </button>
                </div>
              )}
            </div>
          ) : (
            <button className="user-avatar" style={{background:"var(--card)",color:"var(--text)",border:"1px solid var(--border2)",fontSize:12,fontWeight:700,width:"auto",padding:"0 12px",borderRadius:"18px"}} onClick={handleRequireLogin}>Login</button>
          )}
        </div>
      </div>

      {tab==="home"&&<HomeScreen foods={foods} shops={shops} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} filterOpen={filterOpen} setFilterOpen={(val) => {if(val) window.history.pushState({modal:'filter'},''); setFilterOpen(val);}} appSettings={appSettings}/>}
      {tab==="explore"&&<ExploreScreen foods={foods} shops={shops} wishlist={wishlist} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} recentlyViewed={recentlyViewed} filterOpen={filterOpen} setFilterOpen={(val) => {if(val) window.history.pushState({modal:'filter'},''); setFilterOpen(val);}} currentFilters={currentFilters} setCurrentFilters={setCurrentFilters}/>}
      {tab==="wishlist"&&<WishlistScreen foods={foods} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin}/>}
      {tab==="ai"&&<AIScreen foods={foods} wishlist={wishlist} onAddWish={handleWish} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin} currentUser={currentUser}/>}

      {/* SUPPORT FLOATING ACTION BUTTON */}
      <div className="support-fab" onClick={()=>{window.history.pushState({modal:'support'},''); setSupportOpen(true);}}>💬</div>

      <nav className="bnav">
        {[["home","🏠","Home"],["explore","🔍","Explore"],["wishlist","♡","Wishlist"],["ai","✦","AI Pick"]].map(([t,ico,lbl])=>(
          <button key={t} className={`bn${tab===t?" on":""}`} onClick={()=>setTab(t)}>
            <div className="bn-ico">{t==="wishlist"&&wishlist.length>0?"♥":ico}</div>
            <div className="bn-lbl">{lbl}</div>
          </button>
        ))}
      </nav>

      {/* MODALS */}
      {modalFood&&<FoodModal food={modalFood} onClose={()=>setOpenFood(null)} wishlist={wishlist} onWish={handleWish} onSubmitReview={handleSubmitReview} currentUser={currentUser} foods={foods} onNA={handleNA} userNA={userNA}/>}
      {loginOpen&&<LoginModal onClose={()=>setLoginOpen(false)} onLogin={handleLogin} onAdminLogin={handleAdminLogin}/>}
      {filterOpen&&<FilterSheet onClose={()=>setFilterOpen(false)} shops={shops} currentFilters={currentFilters} setCurrentFilters={setCurrentFilters}/>}
      {themeOpen&&<ThemePicker onClose={()=>setThemeOpen(false)} currentTheme={theme} onSelectTheme={setTheme}/>}
      {supportOpen&&<SupportModal onClose={()=>setSupportOpen(false)} onSubmitFeedback={handleSupportSubmit}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>

</html>
