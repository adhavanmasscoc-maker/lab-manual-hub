<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>CIT Food Finder | By AKDEV Labs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* ── THEME ENGINE (5 THEMES) ───────────────────── */
        :root,
        [data-theme="dark"] {
            --bg: #070710 !important;
            --bg2: #0f0f1a !important;
            --card: #161625 !important;
            --card2: #1d1d30 !important;
            --text: #eeeef5 !important;
            --text2: #a0a0b5 !important;
            --text3: #7878a0 !important;
            --border: #252540 !important;
            --border2: #353558 !important;
            --cyan: #00e5ff !important;
            --purple: #9b5de5 !important;
            --red: #ef476f !important;
            --green: #00d68f !important;
            --yellow: #ffd166 !important;
            --orange: #ff6b35 !important;
            --glass: rgba(22, 22, 37, 0.85) !important;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.55) !important;
            --input-bg: #1d1d30 !important;
            --glow-p: 0 0 20px rgba(0, 229, 255, 0.3) !important;
        }

        [data-theme="light"] {
            --bg: #f8f9fa !important;
            --bg2: #ffffff !important;
            --card: #ffffff !important;
            --card2: #f1f3f5 !important;
            --text: #1a1a2e !important;
            --text2: #4a4a68 !important;
            --text3: #6c6c8c !important;
            --border: #e2e8f0 !important;
            --border2: #cbd5e1 !important;
            --cyan: #0ea5e9 !important;
            --purple: #8b5cf6 !important;
            --red: #e11d48 !important;
            --green: #10b981 !important;
            --yellow: #f59e0b !important;
            --orange: #ea580c !important;
            --glass: rgba(255, 255, 255, 0.85) !important;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08) !important;
            --input-bg: #f8f9fa !important;
            --glow-p: 0 0 20px rgba(14, 165, 233, 0.2) !important;
        }

        [data-theme="midnight"] {
            --bg: #030712 !important;
            --bg2: #0b1120 !important;
            --card: #111827 !important;
            --card2: #1f2937 !important;
            --text: #f9fafb !important;
            --text2: #9ca3af !important;
            --text3: #6b7280 !important;
            --border: #1f2937 !important;
            --border2: #374151 !important;
            --cyan: #38bdf8 !important;
            --purple: #a78bfa !important;
            --red: #f43f5e !important;
            --green: #34d399 !important;
            --yellow: #fbbf24 !important;
            --orange: #fb923c !important;
            --glass: rgba(17, 24, 39, 0.85) !important;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
            --input-bg: #1f2937 !important;
            --glow-p: 0 0 20px rgba(56, 189, 248, 0.3) !important;
        }

        [data-theme="forest"] {
            --bg: #05140b !important;
            --bg2: #081c10 !important;
            --card: #0a2414 !important;
            --card2: #10361e !important;
            --text: #ecfdf5 !important;
            --text2: #6ee7b7 !important;
            --text3: #34d399 !important;
            --border: #10361e !important;
            --border2: #1a532e !important;
            --cyan: #a7f3d0 !important;
            --purple: #6ee7b7 !important;
            --red: #f87171 !important;
            --green: #10b981 !important;
            --yellow: #fcd34d !important;
            --orange: #fb923c !important;
            --glass: rgba(10, 36, 20, 0.85) !important;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
            --input-bg: #10361e !important;
            --glow-p: 0 0 20px rgba(167, 243, 208, 0.3) !important;
        }

        [data-theme="sunset"] {
            --bg: #1a0505 !important;
            --bg2: #240a0a !important;
            --card: #331111 !important;
            --card2: #4a1919 !important;
            --text: #fff1f2 !important;
            --text2: #fda4af !important;
            --text3: #fb7185 !important;
            --border: #4a1919 !important;
            --border2: #702626 !important;
            --cyan: #fca5a5 !important;
            --purple: #f43f5e !important;
            --red: #ef4444 !important;
            --green: #10b981 !important;
            --yellow: #fde047 !important;
            --orange: #fb923c !important;
            --glass: rgba(51, 17, 17, 0.85) !important;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
            --input-bg: #4a1919 !important;
            --glow-p: 0 0 20px rgba(252, 165, 165, 0.3) !important;
        }

        /* ── RESET & VIEWPORT FIX ──────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body,
        #root {
            height: 100dvh;
            overflow: hidden;
            font-family: 'Syne', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background .35s, color .35s;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            color: inherit;
        }

        input,
        textarea,
        select {
            font-family: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .tc * {
            transition: background .35s, color .35s, border-color .35s, box-shadow .35s !important;
        }

        /* ── APP SHELL ─────────────────────────────────── */
        #root {
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .screen {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 100px;
            background: var(--bg);
            height: 100%;
        }

        .screen::-webkit-scrollbar {
            display: none;
        }

        /* ── TOPBAR ────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .tb-brand {
            display: flex;
            flex-direction: column;
        }

        .tb-logo-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 800;
            color: var(--cyan);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .tb-sub {
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            color: var(--text3);
            margin-top: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .tb-sub a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .tb-sub a:hover {
            opacity: 0.8;
        }

        .tb-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clock-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 12px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clock-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            transition: transform .2s;
        }

        .theme-btn:active {
            transform: scale(.88);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--purple);
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .user-avatar:active {
            transform: scale(0.9);
        }

        /* ── BOTTOM NAV & FAB ──────────────────────────── */
        .bnav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 75px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 100;
            padding: 0 10px;
        }

        .bn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            position: relative;
            color: var(--text3);
            transition: color .2s;
        }

        .bn.on {
            color: var(--cyan);
        }

        .bn-ico {
            font-size: 22px;
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .bn.on .bn-ico {
            transform: scale(1.18) translateY(-2px);
        }

        .bn:active .bn-ico {
            transform: scale(.85);
        }

        .bn-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .support-fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: var(--cyan);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow);
            z-index: 90;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .support-fab:active {
            transform: scale(0.9);
        }

        /* ── SEARCH & UI ELEMENTS ──────────────────────── */
        .search-wrap {
            padding: 12px 20px 4px;
        }

        .sbox {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--card);
            border: 1.5px solid var(--border2);
            border-radius: 14px;
            padding: 11px 14px;
            transition: border-color .2s, box-shadow .2s;
        }

        .sbox:focus-within {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }

        .sbox input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 14px;
            color: var(--text);
        }

        .sbox input::placeholder {
            color: var(--text3);
        }

        .sec-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 10px;
        }

        .sec-title {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sec-more {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--cyan);
        }

        .qfrow {
            display: flex;
            gap: 10px;
            padding: 6px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .qfrow::-webkit-scrollbar {
            display: none;
        }

        .qfc {
            white-space: nowrap;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--text2);
            background: var(--card);
            transition: all .18s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .qfc.on {
            background: var(--cyan);
            border-color: var(--cyan);
            color: #000;
            font-weight: 800;
        }

        .qfc:active {
            transform: scale(.93);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            overflow-x: auto;
            margin-bottom: 10px;
            scrollbar-width: none;
        }

        .stats-row::-webkit-scrollbar {
            display: none;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            min-width: 100px;
            text-align: center;
            flex-shrink: 0;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }

        .stat-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── VERTICAL FOOD CARD ────────────────────────── */
        .food-scroll {
            display: flex;
            gap: 16px;
            padding: 0 20px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .food-scroll::-webkit-scrollbar {
            display: none;
        }

        .grid-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 0 20px 20px;
        }

        .fc {
            display: flex;
            flex-direction: column;
            width: 170px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            animation: fadeUp .3s ease forwards;
        }

        .grid-wrap .fc {
            width: 100%;
        }

        .fc:hover {
            transform: translateY(-4px);
            border-color: var(--border2);
        }

        .fc.greyed {
            opacity: 0.5;
            filter: grayscale(80%);
        }

        .fc.community-warn {
            border-color: var(--yellow);
        }

        .fc-img-area {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
        }

        .fc-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, var(--card) 100%);
            pointer-events: none;
        }

        .fc-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }

        .badge-trend {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--orange);
            color: #000;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge-avail {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 12px;
            z-index: 2;
            border: 1px solid transparent;
        }

        .badge-avail.yes {
            background: rgba(0, 214, 143, 0.15);
            border-color: var(--green);
            color: var(--green);
        }

        .badge-avail.no {
            background: rgba(239, 71, 111, 0.15);
            border-color: var(--red);
            color: var(--red);
        }

        .badge-avail.warn {
            background: rgba(251, 191, 36, 0.15);
            border-color: var(--yellow);
            color: var(--yellow);
        }

        .community-badge {
            position: absolute;
            top: 35px;
            right: 10px;
            z-index: 3;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 8px;
            background: rgba(251, 191, 36, .9);
            color: #000;
        }

        .fc-body {
            padding: 12px 14px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .fc-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fc-shop {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--text3);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .fc-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .fc-price {
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--cyan);
        }

        .fc-stars {
            color: var(--yellow);
            font-size: 10px;
        }

        .add-btn {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        .add-btn.added {
            background: var(--cyan);
            color: #000;
        }

        .na-btn {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(239, 71, 111, 0.3);
            color: var(--red);
            background: rgba(239, 71, 111, 0.05);
            transition: all 0.2s;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .na-btn:hover {
            background: var(--red);
            color: #fff;
        }

        /* ── SHOP CARDS ────────────────────────────────── */
        .shops-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 10px;
        }

        .shops-row::-webkit-scrollbar {
            display: none;
        }

        .shop-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 148px;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .shop-card:hover {
            transform: translateY(-2px);
            border-color: var(--border2);
        }

        .shop-img {
            height: 86px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            position: relative;
        }

        .shop-info {
            padding: 12px;
        }

        .shop-name {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .shop-meta {
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .shop-rat {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: var(--green);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 5px;
            margin-right: 4px;
        }

        /* ── TIME BANNER ───────────────────────────────── */
        .tb-banner {
            margin: 10px 20px 20px;
            background: rgba(255, 209, 102, 0.05);
            border: 1px solid rgba(255, 209, 102, 0.2);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .tbb-emo {
            font-size: 32px;
            background: rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .tbb-body strong {
            font-size: 14px;
            color: var(--yellow);
            display: block;
            margin-bottom: 4px;
        }

        .tbb-body p {
            font-size: 11px;
            color: var(--text3);
            line-height: 1.4;
        }

        .tbb-chips {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tbb-chip {
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            cursor: pointer;
        }

        /* ── WISHLIST ──────────────────────────────────── */
        .wl-item {
            background: var(--card);
            border-radius: 16px;
            margin: 0 20px 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform .2s;
        }

        .wl-item:active {
            transform: scale(.98);
        }

        .wl-img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .wl-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

const NA_THRESHOLD=5;

function isAvailNow(food){
  const h=new Date().getHours();
  if(food.adminStatus==="not_available")return false;
  if(food.notAvailableCount>=NA_THRESHOLD&&food.adminStatus!=="available")return false;
  if(food.avail==="available")return true;
  if(food.avail==="morning")return h>=6&&h<13;
  if(food.avail==="evening")return h>=15&&h<21;
  return false;
}

function getDisplayStatus(food,userNA){
  if(food.adminStatus==="not_available")return{label:"❌ Not Available",cls:"tag-na",avail:false,priority:"admin"};
  if(food.adminStatus==="likely_unavailable")return{label:"⚠️ Likely Unavailable",cls:"tag-warn",avail:false,priority:"admin"};
  if(userNA)return{label:"Moved Down",cls:"",avail:isAvailNow(food),priority:"user"};
  if(food.notAvailableCount>=NA_THRESHOLD)return{label:"⚠️ Likely Not Available",cls:"tag-warn",avail:false,priority:"community"};
  if(isAvailNow(food))return{label:"● Available Now",cls:"",avail:true,priority:"none"};
  return{label:"○ Not Now",cls:"",avail:false,priority:"none"};
}

// STORAGE HELPERS
// ══════════════════════════════════════════════════
function useLS(key,init){
  const [val,setVal]=useState(()=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{};},[key,val]);
  return[val,setVal];
}

function Notif({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[onDone]);
  return <div className="notif">{msg}</div>;
}

function Stars({n,size=12}){
  return <span style={{color:"var(--yellow)",fontSize:size}}>{"★".repeat(Math.floor(n))}{"☆".repeat(5-Math.floor(n))}</span>;
}

function FoodCard({food,onOpen,onNA,userNA,onRequireLogin,isLoggedIn}){
  const [added,setAdded]=useState(false);
  const status=getDisplayStatus(food,userNA);
  const communityWarn=food.notAvailableCount>=NA_THRESHOLD&&food.adminStatus==="available";

  const handleAdd=(e)=>{
    e.stopPropagation();
    if(!isLoggedIn){onRequireLogin();return;}
    setAdded(true);setTimeout(()=>setAdded(false),700);
  };
  const handleNA=(e)=>{
    e.stopPropagation();
    if(!isLoggedIn){onRequireLogin();return;}
    onNA(food.id, e);
  };
  const handleOpen=()=>{
    if(!isLoggedIn){onRequireLogin();return;}
    onOpen(food);
  };

  return(
    <div className={`fc${userNA?" greyed":""}${communityWarn?" community-warn":""} fi`} onClick={handleOpen}>
      <div className="fc-img-area" style={{background:food.gradient}}>
        {food.isTrending && <div className="badge-trend">🔥 Trending</div>}
        <div className={`badge-avail ${status.avail?"yes":"no"}`}>{status.avail?"● Now":"○ Later"}</div>
        {communityWarn && <div className="community-badge">⚠️ Reported</div>}
        {food.image?<img src={food.image} alt={food.name}/>:<span style={{position:"relative",zIndex:1,fontSize:"64px"}}>{food.emoji}</span>}
        <div className="fc-img-overlay"/>
      </div>
      <div className="fc-body">
        <div className="fc-name">{food.name}</div>
        <div className="fc-shop">
          <span style={{color:food.isVeg?"var(--green)":"var(--red)",fontSize:12}}>●</span> 🏪 {food.shop}
        </div>
        <div className="fc-row">
          <div className="fc-price">{food.price!==null?`₹${food.price}`:"On visit"}</div>
          <button className={`add-btn${added?" added":""}`} onClick={handleAdd}>{added?"✓":"+ ADD"}</button>
        </div>
        {!userNA ? (
          <button className="na-btn" onClick={handleNA}>Not Available?</button>
        ) : (
          <button className="na-btn" disabled style={{opacity:0.5,borderColor:'var(--border)',color:'var(--text3)'}}>Reported NA</button>
        )}
      </div>
    </div>
  );
}

function FoodModal({food,onClose,wishlist,onWish,onSubmitReview,currentUser,foods,onNA,userNA}){
  const [myRating,setMyRating]=useState(0);
  const [reviewText,setReviewText]=useState("");
  const [reviewName,setReviewName]=useState(currentUser?.name||"");
  const [images,setImages]=useState([]);
  const [submitted,setSubmitted]=useState(false);
  const [helpfulMap,setHelpfulMap]=useLS(`helpful_${food.id}`,{});
  const fileRef=useRef();
  const inWL=wishlist.includes(food.id);
  const avail=isAvailNow(food);

  const avgRating=food.reviews?.length?(food.reviews.reduce((a,r)=>a+r.rating,0)/food.reviews.length).toFixed(1):food.rating;

  const handleImgUpload=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(f=>{
      const reader=new FileReader();
      reader.onload=(ev)=>setImages(prev=>[...prev,ev.target.result]);
      reader.readAsDataURL(f);
    });
  };

  const handleSubmit=()=>{
    if(!myRating||!reviewText.trim())return;
    onSubmitReview(food.id,{id:Date.now(),user:reviewName||"Anonymous",email:currentUser?.email||"",rating:myRating,text:reviewText.trim(),date:new Date().toISOString().split("T")[0],helpful:0,images});
    setSubmitted(true);
    setMyRating(0);setReviewText("");setImages([]);
  };

  const handleNA_modal=(e)=>{e.stopPropagation();onNA(food.id, e);};
  const allImages=(food.reviews||[]).flatMap(r=>r.images||[]).filter(Boolean);

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="drag-handle"/>
        <div className="fm-img" style={{background:food.gradient}}>
          {food.image?<img src={food.image} alt={food.name}/>:<span style={{fontSize:88,position:"relative",zIndex:1}}>{food.emoji}</span>}
        </div>
        <div className="fm-body">
          <div className={`fm-avail ${avail?"fma-yes":"fma-no"}`}>{avail?"● Available Now":"○ Not Available Now"} · {food.time}</div>
          <div className="fm-name">{food.name}</div>
          <div className="fm-shop"><span>{food.isVeg?<span style={{color:"var(--green)"}}>●</span>:<span style={{color:"var(--red)"}}>●</span>}</span>🏪 {food.shop} · {food.category}</div>
          <div className="fm-meta">
            <div className="fm-mc"><span className="fm-mc-lbl">Price</span><span className="fm-mc-val" style={{color:"var(--cyan)"}}>{food.price!==null?`₹${food.price}`:"On visit"}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Rating</span><span className="fm-mc-val">★ {avgRating}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Reviews</span><span className="fm-mc-val">{food.reviews?.length||0}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Time</span><span className="fm-mc-val" style={{fontSize:13}}>{food.time}</span></div>
          </div>
          <p style={{fontSize:14,color:"var(--text2)",lineHeight:1.6,marginBottom:20}}>{food.desc}</p>

          {/* Community report */}

            <span style={{fontSize:20}}>⚠️</span>
            <span style={{fontSize:13,color:"var(--yellow)",lineHeight:1.4}}><strong>{food.notAvailableCount} student{food.notAvailableCount>1?"s":""}</strong> reported this may not be available right now.</span>
          </div>}

          {/* User images gallery */}
          {allImages.length>0&&<>
            <div className="sec-lbl">Photos from students</div>
            <div className="fm-imgs">{allImages.map((img,i)=><img key={i} src={img} alt="food"/>)}</div>
          </>}

          {/* Reviews */}
          {food.reviews?.length>0&&<>
            <div className="sec-lbl">What students say ({food.reviews.length})</div>
            {food.reviews.map(rv=>(

        </div>
      </div>
    </div>
  );

function LoginModal({onClose,onLogin,onAdminLogin}){
    const [isAdminMode, setIsAdminMode] = useState(false);
    const [email,setEmail]=useState("");
    
    const [adminUser, setAdminUser]=useState("");
    const [adminPass, setAdminPass]=useState("");
    const [err,setErr]=useState("");
    const [loading,setLoading]=useState(false);

    // 👇 Real Google Authentication via Firebase Compat 👇
    const handleGmail = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider)
        .then((result) => {
            const userEmail = result.user.email;
            if (!userEmail.endsWith("@citchennai.net")) {
                firebase.auth().signOut();
                setErr("⚠️ Only @citchennai.net college emails are allowed.");
                return;
            }
            onLogin({ name: result.user.displayName, email: userEmail, uid: result.user.uid });
        })
        .catch((error) => setErr(error.message));
    };
    
    const handleEmailLogin=(em)=>{
        const e=(em||email).trim().toLowerCase();
        if(!e.endsWith(COLLEGE_DOMAIN)){
            setErr("⚠️ Only @citchennai.net college emails are allowed.");
            return;
        }
        setLoading(true);
        setTimeout(()=>{
            const name=e.split("@")[0].split(".").map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(" ");
            onLogin({name,email:e});
            setLoading(false);
        },800);
    };

    const handleAdminSubmit = () => {
        if(!adminUser || !adminPass) { setErr("Enter username and password"); return; }
        setLoading(true);
        setTimeout(() => {
            if(checkAdmin(adminUser, adminPass)) {
                onAdminLogin(adminUser);
            } else {
                setErr("Invalid Admin Credentials");
                setLoading(false);
            }
        }, 600);
    };

    return(
        <div className="login-overlay" onClick={e=>{if(e.target.className==="login-overlay")onClose();}}>

            <div className={`ltab ${!isAdminMode ? 'active' : 'inactive' }`} onClick={()=> {setIsAdminMode(false); setErr("");}}>👨‍🎓 Student</div>
            <div className={`ltab ${isAdminMode ? 'active' : 'inactive' }`} onClick={()=> {setIsAdminMode(true); setErr("");}}>🛡️ Admin</div>
            </div>

            <>
            <input className="login-inp" placeholder="Admin Username" value={adminUser} onChange={e=>{setAdminUser(e.target.value);setErr("");}} autoCapitalize="none"/>
            <input className="login-inp" type="password" placeholder="Admin Password" value={adminPass} onChange={e=>{setAdminPass(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleAdminSubmit()}/>

            </>

function FilterSheet({onClose, shops, currentFilters, setCurrentFilters}){
  const [sec,setSec]=useState("Sort");

  const handleSort = (s) => setCurrentFilters(p => ({ ...p, sort: s }));
  const handleRating = (r) => setCurrentFilters(p => ({ ...p, minStar: p.minStar === r ? 0 : r }));
  const handleType = (t) => {
    if (t === 'veg') setCurrentFilters(p => ({ ...p, veg: !p.veg, nonveg: false }));
    else if (t === 'nonveg') setCurrentFilters(p => ({ ...p, nonveg: !p.nonveg, veg: false }));
    else setCurrentFilters(p => ({ ...p, veg: false, nonveg: false }));
  };
  const handleAvail = () => setCurrentFilters(p => ({ ...p, avail: !p.avail }));
  const handleShop = (s) => setCurrentFilters(p => ({ ...p, shops: p.shops.includes(s) ? p.shops.filter(x => x !== s) : [...p.shops, s] }));
  const handleBudget = (val) => setCurrentFilters(p => ({ ...p, budget: [0, parseInt(val)] }));

  const clearAll = () => setCurrentFilters({ veg: false, nonveg: false, avail: false, budget: [0, 999], minStar: 0, shops: [], sort: "relevance" });

  const activeCount = Object.values(currentFilters).filter(v => v === true || v > 0 || (Array.isArray(v) && v.length > 0 && v[1] !== 999)).length;

  const renderRightPanel = () => {
    switch (sec) {
      case "Sort":
        return [
          { label: "Relevance", val: "relevance" },
          { label: "Rating (High to Low)", val: "rating" },
          { label: "Price (Low to High)", val: "priceLow" },
          { label: "Price (High to Low)", val: "priceHigh" },
          { label: "Trending First", val: "trending" }
        ].map(o => (
          <div key={o.val} className="fo" onClick={() => handleSort(o.val)}>
            <div className="fo-lbl">{o.label}</div>
            <div className={`fo-chk${currentFilters.sort === o.val ? " on" : ""}`}>{currentFilters.sort === o.val && "✓"}</div>
          </div>
        ));
      case "Rating":
        return [4.5, 4.0, 3.5, 3.0, 2.0].map(r => (
          <div key={r} className="fo" onClick={() => handleRating(r)}>
            <div className="fo-lbl">★ {r}+ Stars</div>
            <div className={`fo-chk${currentFilters.minStar === r ? " on" : ""}`}>{currentFilters.minStar === r && "✓"}</div>
          </div>
        ));
      case "Type":
        return [
          { label: "🥦 Veg Only", val: "veg", active: currentFilters.veg },
          { label: "🍗 Non-Veg Only", val: "nonveg", active: currentFilters.nonveg },
          { label: "Both", val: "both", active: !currentFilters.veg && !currentFilters.nonveg }
        ].map(o => (
          <div key={o.val} className="fo" onClick={() => handleType(o.val)}>
            <div className="fo-lbl">{o.label}</div>
            <div className={`fo-chk${o.active ? " on" : ""}`}>{o.active && "✓"}</div>
          </div>
        ));
      case "Availability":
        return (
          <div className="fo" onClick={handleAvail}>
            <div className="fo-lbl">🟢 Available Now</div>
            <div className={`fo-chk${currentFilters.avail ? " on" : ""}`}>{currentFilters.avail && "✓"}</div>
          </div>
        );
      case "Price Range":
        return (
          <div style={{ padding: "20px 0" }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontSize: 14 }}>₹0</span>
              <span style={{ fontSize: 16, fontWeight: 800, color: 'var(--cyan)' }}>₹{currentFilters.budget[1] >= 999 ? 'Any' : currentFilters.budget[1]}</span>
            </div>
            <input 
              type="range" min="20" max="250" step="10" 
              value={currentFilters.budget[1] >= 999 ? 250 : currentFilters.budget[1]} 
              onChange={e => handleBudget(e.target.value >= 250 ? 999 : e.target.value)} 
              style={{ width: '100%', accentColor: 'var(--cyan)' }} 
            />
            <p style={{ fontSize: 11, color: 'var(--text3)', marginTop: 10 }}>Drag to set maximum price</p>
          </div>
        );
      case "Shops":
        return shops.map(s => (
          <div key={s.id} className="fo" onClick={() => handleShop(s.name)}>
            <div className="fo-lbl">{s.name}</div>
            <div className={`fo-chk${currentFilters.shops.includes(s.name) ? " on" : ""}`}>{currentFilters.shops.includes(s.name) && "✓"}</div>
          </div>
        ));
      default: return null;
    }
  };

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="filter-sheet" style={{width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="drag-handle"/>
        <div className="fs-hdr">
          <div className="fs-title">Filters {activeCount>0&&<span style={{fontSize:12,background:"var(--cyan)",color:"#000",borderRadius:12,padding:"2px 8px",marginLeft:8}}>{activeCount}</span>}</div>
          <button style={{fontFamily:"'DM Mono', monospace",fontSize:11,color:"var(--cyan)",fontWeight:700,textTransform:"uppercase"}} onClick={clearAll}>Clear All</button>
        </div>
        <div className="fs-body">
          <div className="fs-left">
            {["Sort", "Type", "Price Range", "Rating", "Availability", "Shops"].map(s=>{
              let dot = false;
              if (s === "Type" && (currentFilters.veg || currentFilters.nonveg)) dot = true;
              if (s === "Price Range" && currentFilters.budget[1] < 999) dot = true;
              if (s === "Rating" && currentFilters.minStar > 0) dot = true;
              if (s === "Availability" && currentFilters.avail) dot = true;
              if (s === "Shops" && currentFilters.shops.length > 0) dot = true;
              if (s === "Sort" && currentFilters.sort !== "relevance") dot = true;

              return (
                <div key={s} className={`fs-left-item${sec===s?" on":""}`} onClick={()=>setSec(s)}>
                  {s}{dot&&<span style={{color:"var(--cyan)",marginLeft:6,fontSize:10}}>●</span>}
                </div>
              );
            })}
          </div>
          <div className="fs-right">
            {renderRightPanel()}
          </div>
        </div>
        <div className="fs-footer">
          <button className="fs-apply" onClick={onClose}>Close Filters</button>
        </div>
      </div>
    </div>
  );
}

function HomeScreen({foods,shops,wishlist,onWish,onOpenFood,onNA,userNA,onRequireLogin,isLoggedIn,filterOpen,setFilterOpen,appSettings}){
  const [qf,setQf]=useState("all");
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(true);
  const slot=getSlot();
  const cfg=SLOT_CFG[slot];

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),600);return()=>clearTimeout(t);},[]);

  const sortedFoods=useMemo(()=>{
    let f=[...foods];
    if(search)f=f.filter(x=>x.name.toLowerCase().includes(search.toLowerCase())||x.shop.toLowerCase().includes(search.toLowerCase())||x.category.toLowerCase().includes(search.toLowerCase()));
    if(qf==="under50")f=f.filter(x=>x.price!==null&&x.price<=50);
    if(qf==="veg")f=f.filter(x=>x.isVeg);
    if(qf==="nonveg")f=f.filter(x=>!x.isVeg);
    if(qf==="avail")f=f.filter(x=>isAvailNow(x));
    if(qf==="top")f=[...f].sort((a,b)=>b.rating-a.rating);

    const userNASet=new Set(userNA);
    f.sort((a,b)=>{
      const aN=userNASet.has(a.id)?1:0;
      const bN=userNASet.has(b.id)?1:0;
      if(aN!==bN)return aN-bN;
      const aA=a.adminStatus==="not_available"?1:0;
      const bA=b.adminStatus==="not_available"?1:0;
      return aA-bA;
    });
    return f;
  },[foods,qf,search,userNA]);

  const trending=sortedFoods.filter(f=>f.isTrending&&!userNA.includes(f.id));
  const others=sortedFoods.filter(f=>!f.isTrending&&!userNA.includes(f.id));
  const movedDown=sortedFoods.filter(f=>userNA.includes(f.id));

  return(
    <div className="screen fi">
      {appSettings.maintenance&&<div className="maint-banner" style={{margin:"14px 20px 0"}}><p>🚧 Site is currently under maintenance. Admin access only.</p></div>}
      
      <div className="search-wrap">
        <div className="sbox">
          <span style={{fontSize:16,color:"var(--text3)"}}>🔍</span>
          <input placeholder={`Search '${appSettings.searchPlaceholder||"rolls, dosa, juice"}'`} value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button style={{fontSize:16,color:"var(--text3)"}} onClick={()=>setSearch("")}>✕</button>}
        </div>
      </div>

      {!search&&<div className="tb-banner fi-2">
        <div className="tbb-emo">{cfg.e}</div>
        <div className="tbb-body">
          <strong>{cfg.t}</strong>
          <p>{cfg.s}</p>
          <div className="tbb-chips">
            {cfg.chips.map(c=><div key={c} className="tbb-chip">{c}</div>)}
          </div>
        </div>
      </div>}

      {!search && !loading && (
        <div className="stats-row fi-3">
          <div className="stat-card">
            <span className="stat-val" style={{color: 'var(--cyan)'}}>{shops.length}</span>
            <span className="stat-lbl">Shops</span>
          </div>
          <div className="stat-card">
            <span className="stat-val" style={{color: 'var(--green)'}}>{shops.filter(s=>s.queue==='free').length}</span>
            <span className="stat-lbl">Free Queue</span>
          </div>
          <div className="stat-card">
            <span className="stat-val" style={{color: 'var(--orange)'}}>{foods.length}+</span>
            <span className="stat-lbl">Items</span>
          </div>
        </div>
      )}

      <div className="qfrow fi-4">
        {[["all","All"],["under50","💸 Under ₹50"],["veg","🥦 Veg"],["nonveg","🍗 Non-Veg"],["avail","🟢 Available"],["top","⭐ Top Rated"]].map(([k,l])=>(
          <div key={k} className={`qfc${qf===k?" on":""}`} onClick={()=>setQf(qf===k?"all":k)}>{l}</div>
        ))}
      </div>

      {!loading&&(appSettings.showTrending!==false)&&<>
        <div className="sec-hdr">
          <div className="sec-title">🔥 {search?"Results":qf==="top"?"Top Rated":appSettings.trendingTitle||"Recommended For You"}</div>
          <button className="sec-more">See all</button>
        </div>
        {trending.length===0&&others.length===0?
          <div className="empty-state"><span className="es-ico">🍽️</span><h3>Nothing Found</h3><p>Try different filters or search terms</p></div>:
          <div className="food-scroll">
            {trending.map((f)=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)}
          </div>
        }
      </>}
      {loading&&<div className="food-scroll">{[1,2,3].map(i=><div key={i} className="skel skel-card"/>)}</div>}

      {!loading&&!search&&(appSettings.showMostOrdered!==false)&&others.length>0&&<>
        <div className="sec-hdr">
          <div className="sec-title">🍽️ {appSettings.mostOrderedTitle||"Most Ordered"}</div>
          <button className="sec-more">See all</button>
        </div>
        <div className="food-scroll">
          {others.map(f=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)}
        </div>
      </>}

      {movedDown.length>0&&<>
        <div className="sec-hdr"><div className="sec-title" style={{fontSize:14,color:"var(--text3)",fontWeight:600}}>Moved to Bottom</div></div>
        <div className="food-scroll">
          {movedDown.map(f=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={()=>{}} userNA={true} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)}
        </div>
      </>}

      {!loading&&!search&&<>
        <div style={{height:1,background:"var(--border)",margin:"10px 20px 20px"}}/>

              <div className="shop-info">
                <div className="shop-name">{s.name}</div>
                <div className="shop-meta">
                  <span className="shop-rat">★{s.rating}</span>{s.cuisine?.split("·")[0]}
                </div>
                <div style={{marginTop:8}}>
                  <span style={{fontFamily:"'DM Mono', monospace",fontSize:9,fontWeight:700,padding:"4px 8px",borderRadius:10,background:s.queue==="free"?"rgba(0,214,143,.12)":"rgba(255,107,53,.1)",color:s.queue==="free"?"var(--green)":"var(--orange)"}}>{s.queue==="free"?"🟢 FREE":"🟡 BUSY"}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </>}
    </div>
  );

function ExploreScreen({foods, shops, wishlist, onOpenFood, onNA, userNA, onRequireLogin, isLoggedIn, recentlyViewed, filterOpen, setFilterOpen, currentFilters, setCurrentFilters}){
  const [search,setSearch]=useState("");

  const updateFilter = (key, val) => {
    setCurrentFilters(prev => {
      if (key === 'veg') return { ...prev, veg: !prev.veg, nonveg: false };
      if (key === 'nonveg') return { ...prev, nonveg: !prev.nonveg, veg: false };
      if (key === 'clear') return { veg: false, nonveg: false, avail: false, budget: [0, 999], minStar: 0, shops: [], sort: "relevance" };
      return { ...prev, [key]: val };
    });
  };

  const removeShopFilter = (shopName) => {
    setCurrentFilters(prev => ({ ...prev, shops: prev.shops.filter(s => s !== shopName) }));
  };

  const results=useMemo(()=>{
    let f=[...foods];
    
    if(search)f=f.filter(x=>x.name?.toLowerCase().includes(search.toLowerCase())||x.shop?.toLowerCase().includes(search.toLowerCase())||x.category?.toLowerCase().includes(search.toLowerCase()));
    if(currentFilters.veg)f=f.filter(x=>x.isVeg);
    if(currentFilters.nonveg)f=f.filter(x=>!x.isVeg);
    if(currentFilters.avail)f=f.filter(x=>isAvailNow(x) && !userNA.includes(x.id));
    if(currentFilters.budget[1]<999)f=f.filter(x=>x.price!==null&&x.price<=currentFilters.budget[1]);
    if(currentFilters.minStar>0)f=f.filter(x=>x.rating>=currentFilters.minStar);
    if(currentFilters.shops.length>0)f=f.filter(x=>currentFilters.shops.includes(x.shop));

    if(currentFilters.sort === "rating") f.sort((a,b)=>b.rating-a.rating);
    else if(currentFilters.sort === "priceLow") f.sort((a,b)=>(a.price||999)-(b.price||999));
    else if(currentFilters.sort === "priceHigh") f.sort((a,b)=>(b.price||0)-(a.price||0));
    else if(currentFilters.sort === "trending") f.sort((a,b)=>(b.isTrending===a.isTrending?0:b.isTrending?1:-1));
    else {
      const userNASet=new Set(userNA);
      f.sort((a,b)=>{
        const aN=userNASet.has(a.id)?1:0;
        const bN=userNASet.has(b.id)?1:0;
        if(aN!==bN)return aN-bN;
        return b.rating-a.rating;
      });
    }
    return f;
  },[foods,search,currentFilters,userNA]);

  const rv=recentlyViewed.slice(0,6).map(id=>foods.find(f=>f.id===id)).filter(Boolean);
  const activeCount = Object.values(currentFilters).filter(v => v === true || v > 0 || (Array.isArray(v) && v.length > 0 && v[1] !== 999)).length;

  return(
    <div className="screen fi">
      <div className="search-wrap">
        <div className="sbox">
          <span style={{fontSize:16,color:"var(--text3)"}}>🔍</span>
          <input placeholder="Search food, shop, category…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
          {search&&<button style={{fontSize:16,color:"var(--text3)"}} onClick={()=>setSearch("")}>✕</button>}
        </div>
      </div>
      
      <div className="qfrow" style={{paddingTop:8}}>
        <div className="qfc" onClick={() => setFilterOpen(true)} style={{ background: 'var(--card2)', borderColor: 'var(--border2)' }}>
          🎛 Filters {activeCount > 0 && <span style={{ color: 'var(--cyan)', fontWeight:800 }}>({activeCount})</span>}
        </div>
        
        {currentFilters.budget[1] < 999 && <div className="qfc on" onClick={() => updateFilter('budget', [0, 999])}>₹0 – ₹{currentFilters.budget[1]} ✕</div>}
        {currentFilters.veg && <div className="qfc on" onClick={() => updateFilter('veg', false)}>🥦 Veg ✕</div>}
        {currentFilters.nonveg && <div className="qfc on" onClick={() => updateFilter('nonveg', false)}>🍗 Non-Veg ✕</div>}
        {currentFilters.avail && <div className="qfc on" onClick={() => updateFilter('avail', false)}>🟢 Available Now ✕</div>}
        {currentFilters.minStar > 0 && <div className="qfc on" onClick={() => updateFilter('minStar', 0)}>★ {currentFilters.minStar}+ ✕</div>}
        {currentFilters.shops.map(s => <div key={s} className="qfc on" onClick={() => removeShopFilter(s)}>🏪 {s} ✕</div>)}
        
        {activeCount > 0 && <div className="qfc" onClick={() => updateFilter('clear')} style={{ color: 'var(--red)', borderColor: 'var(--red)', background: 'transparent' }}>✖ Clear All</div>}
      </div>

      {rv.length>0&&!search&&activeCount===0&&<>
        <div className="sec-hdr" style={{paddingTop:20}}><div className="sec-title">🕐 Recently Viewed</div></div>
        <div className="rv-row">
          {rv.map(f=><div key={f.id} className="rv-chip" onClick={()=>{if(!isLoggedIn){onRequireLogin();}else{onOpenFood(f);}}}>
            <span className="rv-emo">{f.emoji}</span>
            <div><div className="rv-cn">{f.name}</div><div className="rv-cp">₹{f.price||"?"}</div></div>
          </div>)}
        </div>

function AIScreen({foods,wishlist,onAddWish,isLoggedIn,onRequireLogin,currentUser}){
  const [budget,setBudget]=useState("");
  const [mood,setMood]=useState("any");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [ran,setRan]=useState(false);
  const slot=getSlot();

  if(!isLoggedIn) return(
    <div className="screen fi"><div className="empty-state"><span className="es-ico">🤖</span><h3>Login to use AI</h3><p>Login with your college email<br/>to get personalized food recommendations.</p><button className="login-btn" style={{marginTop:20,width:"auto",padding:"14px 32px",display:"inline-block"}} onClick={onRequireLogin}>Login Now</button></div></div>
  );

  const SLOT_BOOST={morning:["South Indian","Snacks","Drinks"],lunch:["North Indian","South Indian","Meals"],evening:["Drinks","Chaats","Desserts"],night:["Snacks","Fast Food"]};
  const MOOD_CATS={any:null,snacks:["Snacks","Fast Food"],meals:["North Indian","South Indian","Meals","Chinese"],drinks:["Drinks"],chaats:["Chaats"],desserts:["Desserts"],veg:null};

  async function run(){
    setLoading(true);setRan(true);
    const b=parseInt(budget)||999;
    const moodCats=MOOD_CATS[mood];
    const boostCats=SLOT_BOOST[slot]||[];
    let candidates=[...foods].filter(f=>f.adminStatus==="available");
    if(b<999)candidates=candidates.filter(f=>f.price!==null&&f.price<=b);
    if(moodCats)candidates=candidates.filter(f=>moodCats.includes(f.category));
    if(mood==="veg")candidates=candidates.filter(f=>f.isVeg);
    candidates=candidates.map(f=>{
      let sc=f.rating*2;
      if(boostCats.includes(f.category))sc+=2;
      if(isAvailNow(f))sc+=1;
      if(f.isTrending)sc+=1.5;
      if(f.notAvailableCount===0)sc+=0.5;
      return{...f,sc};
    }).sort((a,b)=>b.sc-a.sc).slice(0,3);

    const reasons={};
    try{
      const ctx=`CIT campus. Time: ${slot}. Student: ${currentUser?.name}. Budget: ₹${b}. Mood: ${mood}.\nCandidates:\n${candidates.map(f=>`${f.name} ₹${f.price||"on visit"} from ${f.shop} (${f.category}, ${f.rating}★, ${isAvailNow(f)?"available now":"check timing"})`).join("\n")}`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:'For each food item, write one very short friendly recommendation sentence (max 10 words). Be specific. Return only valid JSON: {"item name":"reason"}',messages:[{role:"user",content:ctx}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||"{}";
      Object.assign(reasons,JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch{
      const fb={morning:"Perfect light morning pick — fresh and affordable",lunch:"Best value filling meal for lunch right now",evening:"Ideal evening special — don't miss it today",night:"One of few available options at this hour"};
      candidates.forEach(f=>{reasons[f.name]=fb[slot];});
    }
    setResults(candidates.map(f=>({...f,reason:reasons[f.name]||`Rated ${f.rating}★ · ${isAvailNow(f)?"Available now":"Check availability"}`})));
    setLoading(false);
  }

  return(
    <div className="screen fi">
      <div className="ai-hero">
        <span className="ai-hero-ico">🤖</span>
        <div className="ai-hero-title">What should I eat?</div>
        <div className="ai-hero-sub">Hi {currentUser?.name?.split(" ")[0]} 👋 Tell me your budget and mood — I'll find the best campus food for you right now.</div>
        <button className="ai-cta" onClick={run} disabled={loading}>{loading?"✦ Thinking…":"✦ Suggest Food Now →"}</button>
      </div>
      <div className="ai-inputs">
        <div className="ai-inp-card"><label>Budget (₹)</label><input type="number" placeholder="e.g. 80" value={budget} onChange={e=>setBudget(e.target.value)} inputMode="numeric"/></div>
        <div className="ai-inp-card"><label>I'm craving</label>
          <select value={mood} onChange={e=>setMood(e.target.value)}>
            <option value="any">Anything 🍽</option>
            <option value="snacks">Snacks 🍟</option>
            <option value="meals">Full Meal 🍛</option>
            <option value="drinks">Juice/Drink 🧃</option>
            <option value="chaats">Chaats 🥙</option>
            <option value="desserts">Desserts 🍰</option>
            <option value="veg">Veg Only 🥦</option>
          </select>
        </div>
      </div>
      {loading&&[1,2,3].map(i=><div key={i} className="skel" style={{height:140,margin:"0 20px 14px",borderRadius:18}}/>)}
      {!loading&&ran&&results.length===0&&<div className="empty-state"><span className="es-ico">😕</span><h3>No matches</h3><p>Try a higher budget or different mood</p></div>}
      {!loading&&results.map((f,i)=>(
        <div key={f.id} className={`ai-result fi`} style={{animationDelay:`${i*.08}s`}}>
          <div className="air-top">
            <div className="air-img" style={{background:f.gradient}}>{f.image?<img src={f.image} alt={f.name}/>:<span>{f.emoji}</span>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="air-name">{i===0?"🥇 ":""}{f.name}</div>
              <div className="air-shop">🏪 {f.shop} · ₹{f.price||"ask"} · ★{f.rating}</div>
            </div>
            <button onClick={(e)=>{e.stopPropagation(); onAddWish(f.id);}} style={{padding:"6px 14px",borderRadius:10,border:`1.5px solid ${wishlist.includes(f.id)?"var(--cyan)":"var(--border2)"}`,background:wishlist.includes(f.id)?"var(--cyan)":"none",color:wishlist.includes(f.id)?"#000":"var(--text2)",fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0,transition:"all 0.2s"}}>
              {wishlist.includes(f.id)?"♥":"♡"}
            </button>
          </div>
          <div className="air-reason"><strong>Why?</strong> {f.reason}</div>
          <div className="air-bottom">
            <span className="air-score">Score: {f.sc.toFixed(1)} · {isAvailNow(f)?"● Available":"○ Later"}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminDashboard({foods,setFoods,shops,setShops,feedback,setFeedback,appSettings,setAppSettings,onLogout,adminUser,onViewSite}){
  const [tab,setTab]=useState("overview");
  const [editFood,setEditFood]=useState(null);
  const [jsonText,setJsonText]=useState("");
  const [jsonValid,setJsonValid]=useState(null);
  const [notif,setNotif]=useState("");
  
  const [adminSearch, setAdminSearch] = useState("");

  const showNotif=(m)=>{setNotif(m);setTimeout(()=>setNotif(""),2500);};

  function validateJson(txt){
    try{JSON.parse(txt);setJsonValid(true);}catch{setJsonValid(false);}
  }

  // 👇 FIXED: Added Firebase Batch Push for JSON import 👇
  function applyJson(){
    try{
        const d=JSON.parse(jsonText);
        if(Array.isArray(d)){
            const batch = db.batch();
            d.forEach(f => {
                const docRef = db.collection("foods").doc(f.id);
                batch.set(docRef, f);
            });
            batch.commit().then(() => showNotif("✓ Food data updated to cloud!"));
        }
    }catch{
        showNotif("⚠️ Invalid JSON");
    }
  }

  // 👇 FIXED: Added Firebase Cloud Updates 👇
  function updateFoodAvailability(id,status){
    db.collection("foods").doc(id).update({adminStatus: status})
      .then(() => showNotif(`✓ Availability overridden: ${status}`));
  }

  function resetNACount(id){
    db.collection("foods").doc(id).update({notAvailableCount: 0, adminStatus: "available"})
      .then(() => showNotif("✓ Community votes reset"));
  }

  function updateFeedbackStatus(id,status){
    db.collection("feedback").doc(id).update({status: status})
      .then(() => showNotif(`✓ Marked as ${status}`));

    db.collection("feedback").doc(id).delete()
      .then(() => showNotif("✓ Feedback deleted"));

  function deleteReview(foodId, reviewId) {
      if(confirm("Are you sure you want to delete this review?")) {
          const food = foods.find(f => f.id === foodId);

              const rev = (food.reviews || []).find(r => r.id === reviewId);

                  db.collection("foods").doc(foodId).update({

                  }).then(() => showNotif("🗑️ Review deleted (Spam handled)"));
