<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>CIT Food Finder | By AKDEV Labs</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── THEME ─────────────────────────────────────── */
    [data-theme="dark"] {
      --bg: #121212;
      --bg2: #1A1A1A;
      --card: #1E1E1E;
      --card2: #2C2C2C;
      --card3: #242424;
      --text: #FFFFFF;
      --text2: #A0A0A0;
      --text3: #6B6B6B;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --red: #E23744;
      --green: #22C55E;
      --purple: #9B5DE5;
      --orange: #FF6B35;
      --yellow: #FBBF24;
      --glass: rgba(30, 30, 30, .85);
      --shadow: 0 8px 32px rgba(0, 0, 0, .55);
      --shadow2: 0 2px 12px rgba(0, 0, 0, .4);
      --glow-r: 0 0 20px rgba(226, 55, 68, .3);
      --glow-g: 0 0 16px rgba(34, 197, 94, .25);
      --glow-p: 0 0 20px rgba(155, 93, 229, .3);
      --input-bg: #2C2C2C;
    }

    [data-theme="light"] {
      --bg: #FFFFFF;
      --bg2: #F8F9FA;
      --card: #F5F5F5;
      --card2: #EBEBEB;
      --card3: #F0F0F0;
      --text: #1A1A1A;
      --text2: #6B6B6B;
      --text3: #9A9A9A;
      --border: rgba(0, 0, 0, .08);
      --border2: rgba(0, 0, 0, .14);
      --red: #E23744;
      --green: #16A34A;
      --purple: #7C3AED;
      --orange: #EA580C;
      --yellow: #CA8A04;
      --glass: rgba(255, 255, 255, .9);
      --shadow: 0 4px 20px rgba(0, 0, 0, .1);
      --shadow2: 0 2px 8px rgba(0, 0, 0, .08);
      --glow-r: none;
      --glow-g: none;
      --glow-p: none;
      --input-bg: #F5F5F5;
    }

    /* ── RESET ─────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body,
    #root {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      transition: background .35s, color .35s;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      color: inherit;
    }

    input,
    textarea,
    select {
      font-family: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .tc * {
      transition: background .35s, color .35s, border-color .35s, box-shadow .35s !important;
    }

    /* ── APP SHELL ─────────────────────────────────── */
    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    .screen {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 72px;
      background: var(--bg);
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    /* ── TOPBAR ────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .tb-brand {
      display: flex;
      flex-direction: column;
    }

    .tb-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--red);
      letter-spacing: -.3px;
    }

    .tb-loc {
      font-size: 10px;
      color: var(--text3);
      margin-top: 1px;
    }

    .tb-dev {
      font-size: 10px;
      color: var(--text2);
      margin-top: 2px;
      text-decoration: none;
      display: inline-block;
    }

    .tb-dev:hover {
      color: var(--purple);
      text-decoration: underline;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .clock-pill {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: transform .2s;
    }

    .theme-btn:active {
      transform: scale(.88);
    }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── BOTTOM NAV ────────────────────────────────── */
    .bnav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 68px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border2);
      display: flex;
      z-index: 100;
    }

    .bn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      position: relative;
      color: var(--text3);
      transition: color .2s;
    }

    .bn.on {
      color: var(--red);
    }

    .bn-pip {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 3px;
      border-radius: 0 0 4px 4px;
      background: var(--red);
      opacity: 0;
      transition: opacity .25s;
    }

    .bn.on .bn-pip {
      opacity: 1;
    }

    .bn-ico {
      font-size: 22px;
      transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
    }

    .bn.on .bn-ico {
      transform: scale(1.18) translateY(-1px);
    }

    .bn:active .bn-ico {
      transform: scale(.85);
    }

    .bn-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    /* ── SEARCH ────────────────────────────────────── */
    .search-wrap {
      padding: 12px 18px 4px;
    }

    .sbox {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--card);
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      padding: 11px 14px;
      transition: border-color .2s, box-shadow .2s;
    }

    .sbox:focus-within {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(226, 55, 68, .1);
    }

    .sbox input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text);
    }

    .sbox input::placeholder {
      color: var(--text3);
    }

    /* ── SECTIONS ──────────────────────────────────── */
    .sec-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 10px;
    }

    .sec-title {
      font-size: 16px;
      font-weight: 700;
    }

    .sec-more {
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
    }

    /* ── QUICK FILTERS ─────────────────────────────── */
    .qfrow {
      display: flex;
      gap: 8px;
      padding: 6px 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .qfrow::-webkit-scrollbar {
      display: none;
    }

    .qfc {
      white-space: nowrap;
      padding: 7px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border2);
      color: var(--text2);
      background: var(--card);
      transition: all .18s;
      flex-shrink: 0;
    }

    .qfc.on {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .qfc:active {
      transform: scale(.93);
    }

    /* ── FOOD CARD ─────────────────────────────────── */
    .fc {
      background: var(--card);
      border-radius: 16px;
      margin: 0 18px 12px;
      padding: 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }

    .fc:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .fc:active {
      transform: scale(.97);
    }

    [data-theme="dark"] .fc:hover {
      box-shadow: var(--shadow), var(--glow-r);
    }

    .fc.greyed {
      opacity: .45;
    }

    .fc.community-warn {
      border-color: var(--yellow);
    }

    .fc-left {
      flex: 1;
      min-width: 0;
    }

    .fc-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .tag-reorder {
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .25);
      color: var(--green);
    }

    .tag-budget {
      background: rgba(251, 191, 36, .1);
      border: 1px solid rgba(251, 191, 36, .25);
      color: var(--yellow);
    }

    .tag-warn {
      background: rgba(251, 191, 36, .12);
      border: 1px solid rgba(251, 191, 36, .3);
      color: var(--yellow);
    }

    .tag-na {
      background: rgba(226, 55, 68, .1);
      border: 1px solid rgba(226, 55, 68, .25);
      color: var(--red);
    }

    .fc-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fc-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fc-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rat-chip {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--green);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
    }

    .fc-price {
      font-size: 14px;
      font-weight: 800;
    }

    .fc-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .food-img {
      width: 86px;
      height: 86px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .food-img .img-real {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }

    .food-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, .15));
      border-radius: 14px;
    }

    .avail-pill {
      position: absolute;
      bottom: 5px;
      left: 5px;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      z-index: 2;
    }

    .ap-now {
      background: rgba(34, 197, 94, .85);
      color: #fff;
    }

    .ap-later {
      background: rgba(255, 107, 53, .8);
      color: #fff;
    }

    .ap-warn {
      background: rgba(251, 191, 36, .85);
      color: #000;
    }

    .add-btn {
      width: 82px;
      height: 32px;
      border-radius: 10px;
      background: transparent;
      border: 2px solid var(--red);
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all .2s;
    }

    .add-btn:hover,
    .add-btn.added {
      background: var(--red);
      color: #fff;
    }

    .add-btn:active {
      transform: scale(.9);
    }

    .add-btn.added {
      animation: addbounce .3s ease;
    }

    @keyframes addbounce {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.12)
      }

      100% {
        transform: scale(1)
      }
    }

    .na-btn {
      font-size: 10px;
      color: var(--text3);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 3px 8px;
      transition: all .15s;
    }

    .na-btn:active {
      background: rgba(226, 55, 68, .1);
      color: var(--red);
    }

    /* ── SHOP CARDS ────────────────────────────────── */
    .shops-row {
      display: flex;
      gap: 12px;
      padding: 0 18px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .shops-row::-webkit-scrollbar {
      display: none;
    }

    .shop-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 148px;
      flex-shrink: 0;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }

    .shop-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .shop-card:active {
      transform: scale(.96);
    }

    .shop-img {
      height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      position: relative;
    }

    .shop-info {
      padding: 9px 11px 11px;
    }

    .shop-name {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .shop-meta {
      font-size: 10px;
      color: var(--text2);
    }

    .shop-rat {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: var(--green);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 5px;
      margin-right: 4px;
    }

    /* ── TIME BANNER ───────────────────────────────── */
    .tb-banner {
      margin: 10px 18px;
      background: linear-gradient(135deg, rgba(155, 93, 229, .1), rgba(226, 55, 68, .06));
      border: 1px solid rgba(155, 93, 229, .2);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .tbb-emo {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tbb-body strong {
      font-size: 12px;
      color: var(--purple);
      display: block;
    }

    .tbb-body p {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
      line-height: 1.4;
    }

    /* ── WISHLIST ──────────────────────────────────── */
    .wl-item {
      background: var(--card);
      border-radius: 14px;
      margin: 0 18px 10px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }

    .wl-item:active {
      transform: scale(.98);
    }

    .wl-img {
      width: 56px;
      height: 56px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .wl-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wl-info {
      flex: 1;
      min-width: 0;
    }

    .wl-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wl-shop {
      font-size: 10px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .wl-price {
      font-size: 13px;
      font-weight: 800;
    }

    .avail-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .ab-yes {
      background: rgba(34, 197, 94, .12);
      color: var(--green);
    }

    .ab-no {
      background: rgba(255, 107, 53, .1);
      color: var(--orange);
    }

    .wl-del {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: rgba(226, 55, 68, .1);
      border: 1px solid rgba(226, 55, 68, .2);
      color: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .15s;
    }

    .wl-del:active {
      background: var(--red);
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
    }

    .empty-state .es-ico {
      font-size: 52px;
      display: block;
      margin-bottom: 14px;
    }

    .empty-state h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }

    /* ── MODAL OVERLAY ─────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(5px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet {
      background: var(--bg);
      width: 100%;
      max-width: 480px;
      border-radius: 22px 22px 0 0;
      max-height: 92vh;
      overflow-y: auto;
      scrollbar-width: none;
      animation: slideUp .3s cubic-bezier(.22, 1, .36, 1);
    }

    .sheet::-webkit-scrollbar {
      display: none;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 10px auto 0;
    }

    /* ── FOOD MODAL ────────────────────────────────── */
    .fm-img {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 88px;
      position: relative;
      overflow: hidden;
    }

    .fm-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fm-body {
      padding: 18px 20px 28px;
    }

    .fm-avail {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .fma-yes {
      background: rgba(34, 197, 94, .12);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, .3);
    }

    .fma-no {
      background: rgba(226, 55, 68, .08);
      color: var(--red);
      border: 1px solid rgba(226, 55, 68, .2);
    }

    .fm-name {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .fm-shop {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .fm-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .fm-mc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .fm-mc-lbl {
      font-size: 9px;
      color: var(--text3);
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .fm-mc-val {
      font-size: 14px;
      font-weight: 800;
    }

    .sec-lbl {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .review-bub {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px 13px;
      margin-bottom: 8px;
    }

    .rb-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 8px;
    }

    .rb-name {
      font-size: 12px;
      font-weight: 600;
    }

    .rb-date {
      font-size: 10px;
      color: var(--text3);
    }

    .rb-stars {
      color: var(--yellow);
      font-size: 12px;
    }

    .rb-text {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    .rb-img-row {
      display: flex;
      gap: 7px;
      margin-top: 8px;
      overflow-x: auto;
    }

    .rb-img-row img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .rb-helpful {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .helpful-btn {
      font-size: 10px;
      color: var(--text3);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px 9px;
      transition: all .15s;
    }

    .helpful-btn.on {
      background: rgba(34, 197, 94, .12);
      border-color: var(--green);
      color: var(--green);
    }

    .fm-imgs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
    }

    .fm-imgs img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      cursor: pointer;
    }

    .fm-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-wish {
      flex: 1;
      padding: 13px;
      border-radius: 13px;
      border: 2px solid var(--red);
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
      background: none;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-wish.on,
    .btn-wish:hover {
      background: var(--red);
      color: #fff;
    }

    .btn-wish:active {
      transform: scale(.96);
    }

    .btn-add-lg {
      flex: 1;
      padding: 13px;
      border-radius: 13px;
      background: var(--red);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      border: none;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-add-lg:active {
      transform: scale(.96);
      opacity: .9;
    }

    /* ── REVIEW FORM ───────────────────────────────── */
    .rev-form {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
    }

    .star-pick {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .sp-star {
      font-size: 28px;
      cursor: pointer;
      transition: transform .15s, filter .15s;
      filter: grayscale(1) opacity(.4);
    }

    .sp-star.on {
      filter: none;
      transform: scale(1.1);
    }

    .rev-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 80px;
      transition: border-color .2s;
    }

    .rev-input:focus {
      border-color: var(--purple);
    }

    .rev-name-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      margin-bottom: 10px;
      transition: border-color .2s;
    }

    .rev-name-input:focus {
      border-color: var(--purple);
    }

    .img-upload-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--card);
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: border-color .2s;
      margin: 10px 0;
    }

    .img-upload-btn:hover {
      border-color: var(--purple);
    }

    .img-preview-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .img-prev {
      width: 64px;
      height: 64px;
      border-radius: 9px;
      object-fit: cover;
      position: relative;
    }

    .submit-rev-btn {
      width: 100%;
      padding: 12px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .submit-rev-btn:hover {
      opacity: .9;
    }

    .submit-rev-btn:active {
      transform: scale(.97);
    }

    .rev-thanks {
      text-align: center;
      padding: 20px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    /* ── AI SCREEN ─────────────────────────────────── */
    .ai-hero {
      margin: 14px 18px;
      background: linear-gradient(135deg, rgba(155, 93, 229, .14), rgba(226, 55, 68, .07));
      border: 1px solid rgba(155, 93, 229, .22);
      border-radius: 20px;
      padding: 22px 18px;
      text-align: center;
    }

    .ai-hero-ico {
      font-size: 46px;
      display: block;
      margin-bottom: 10px;
    }

    .ai-hero-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .ai-hero-sub {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .ai-cta {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple), var(--red));
      border: none;
      border-radius: 13px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .ai-cta:hover {
      opacity: .9;
    }

    .ai-cta:active {
      transform: scale(.97);
    }

    .ai-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 18px 14px;
    }

    .ai-inp-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 11px 13px;
    }

    .ai-inp-card label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .ai-inp-card input,
    .ai-inp-card select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }

    .ai-inp-card input:focus,
    .ai-inp-card select:focus {
      border-color: var(--purple);
    }

    .ai-inp-card select option {
      background: var(--card);
    }

    .ai-result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 15px;
      margin: 0 18px 11px;
      padding: 15px;
      cursor: pointer;
      transition: transform .2s, border-color .2s;
    }

    .ai-result:hover {
      transform: translateX(3px);
      border-color: var(--purple);
    }

    [data-theme="dark"] .ai-result:hover {
      box-shadow: var(--glow-p);
    }

    .air-top {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 10px;
    }

    .air-img {
      width: 52px;
      height: 52px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .air-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .air-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .air-shop {
      font-size: 10px;
      color: var(--text2);
    }

    .air-reason {
      background: rgba(155, 93, 229, .08);
      border: 1px solid rgba(155, 93, 229, .18);
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    .air-reason strong {
      color: var(--purple);
    }

    .air-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .air-score {
      font-size: 11px;
      color: var(--purple);
      font-weight: 600;
    }

    /* ── LOGIN MODAL ───────────────────────────────── */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(8px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 22px;
      width: 100%;
      max-width: 380px;
      padding: 28px 24px;
      animation: fadeUp .3s ease;
    }

    .login-logo {
      font-size: 42px;
      text-align: center;
      margin-bottom: 10px;
    }

    .login-title {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .login-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .ltab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid transparent;
    }

    .ltab.active {
      background: var(--red);
      color: #fff;
    }

    .ltab.inactive {
      background: var(--card2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .gmail-btn {
      width: 100%;
      padding: 14px;
      border-radius: 13px;
      background: var(--card);
      border: 2px solid var(--border2);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 16px;
    }

    .gmail-btn:hover {
      border-color: var(--red);
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-divider span {
      font-size: 11px;
      color: var(--text3);
    }

    .login-inp {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border2);
      border-radius: 11px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      margin-bottom: 10px;
      transition: border-color .2s;
    }

    .login-inp:focus {
      border-color: var(--red);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .login-btn:hover {
      opacity: .9;
    }

    .login-btn:active {
      transform: scale(.97);
    }

    .login-err {
      font-size: 12px;
      color: var(--red);
      text-align: center;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    /* ── FILTER SHEET ──────────────────────────────── */
    .filter-sheet {
      background: var(--bg);
      border-radius: 22px 22px 0 0;
      animation: slideUp .3s cubic-bezier(.22, 1, .36, 1);
    }

    .fs-hdr {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fs-title {
      font-size: 16px;
      font-weight: 700;
    }

    .fs-body {
      display: flex;
      height: 320px;
    }

    .fs-left {
      width: 125px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .fs-left-item {
      padding: 15px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
    }

    .fs-left-item.on {
      color: var(--text);
      border-left-color: var(--red);
      background: var(--card);
    }

    .fs-right {
      flex: 1;
      padding: 14px 16px;
      overflow-y: auto;
    }

    .fo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .fo:last-child {
      border-bottom: none;
    }

    .fo-lbl {
      font-size: 13px;
    }

    .fo-chk {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: all .15s;
    }

    .fo-chk.on {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .fs-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .fs-apply {
      width: 100%;
      padding: 13px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── ADMIN DASHBOARD ─────────────────────────────── */
    .admin-dash {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
    }

    .ad-topbar {
      padding: 14px 18px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .ad-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--red);
    }

    .ad-logout {
      font-size: 12px;
      color: var(--text3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 4px 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .ad-logout:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .ad-tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .ad-tabs::-webkit-scrollbar {
      display: none;
    }

    .ad-tab {
      flex-shrink: 0;
      padding: 11px 16px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
    }

    .ad-tab.on {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    .ad-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      scrollbar-width: none;
    }

    .ad-content::-webkit-scrollbar {
      display: none;
    }

    .ad-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* admin food row */
    .ad-food-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 9px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ad-food-emo {
      font-size: 26px;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ad-food-info {
      flex: 1;
      min-width: 0;
    }

    .ad-food-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .ad-food-meta {
      font-size: 10px;
      color: var(--text3);
    }

    .ad-food-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .ad-btn {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .ad-btn.primary {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .ad-btn.green {
      background: rgba(34, 197, 94, .12);
      border-color: var(--green);
      color: var(--green);
    }

    .ad-btn.yellow {
      background: rgba(251, 191, 36, .1);
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .ad-btn:hover {
      opacity: .85;
    }

    /* admin avail selector */
    .avail-sel {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .avs {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      cursor: pointer;
      transition: all .15s;
    }

    .avs.on-green {
      background: rgba(34, 197, 94, .12);
      border-color: var(--green);
      color: var(--green);
    }

    .avs.on-yellow {
      background: rgba(251, 191, 36, .1);
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .avs.on-red {
      background: rgba(226, 55, 68, .1);
      border-color: var(--red);
      color: var(--red);
    }

    /* admin stats */
    .ad-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .ad-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .ad-stat-val {
      font-size: 24px;
      font-weight: 800;
      display: block;
    }

    .ad-stat-lbl {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 2px;
    }

    /* admin feedback */
    .fb-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 9px;
    }

    .fb-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 8px;
    }

    .fb-user {
      font-size: 12px;
      font-weight: 600;
    }

    .fb-time {
      font-size: 10px;
      color: var(--text3);
    }

    .fb-text {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .fb-status {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
    }

    .fb-pending {
      background: rgba(251, 191, 36, .1);
      color: var(--yellow);
    }

    .fb-resolved {
      background: rgba(34, 197, 94, .1);
      color: var(--green);
    }

    /* admin json editor */
    .json-editor {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border2);
      border-radius: 11px;
      padding: 12px;
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 11px;
      color: var(--text);
      outline: none;
      min-height: 200px;
      resize: vertical;
      transition: border-color .2s;
      line-height: 1.5;
    }

    .json-editor:focus {
      border-color: var(--purple);
    }

    .json-valid {
      font-size: 11px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .json-ok {
      color: var(--green);
    }

    .json-err {
      color: var(--red);
    }

    /* admin toggle */
    .ad-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .ad-toggle-row:last-child {
      border-bottom: none;
    }

    .ad-toggle-lbl {
      font-size: 13px;
      font-weight: 600;
    }

    .ad-toggle-desc {
      font-size: 11px;
      color: var(--text3);

// NA threshold for community warning
const NA_THRESHOLD=5;

function isAvailNow(food){
  const h=new Date().getHours();
  if(food.adminStatus==="not_available")return false;
  if(food.notAvailableCount>=NA_THRESHOLD&&food.adminStatus!=="available")return false;
  if(food.avail==="available")return true;
  if(food.avail==="morning")return h>=6&&h<13;
  if(food.avail==="evening")return h>=15&&h<21;
  return false;
}

function getDisplayStatus(food,userNA){
  if(food.adminStatus==="not_available")return{label:"❌ Not Available",cls:"tag-na",avail:false,priority:"admin"};
  if(food.adminStatus==="likely_unavailable")return{label:"⚠️ Likely Unavailable",cls:"tag-warn",avail:false,priority:"admin"};
  if(userNA)return{label:"Moved Down",cls:"",avail:isAvailNow(food),priority:"user"};
  if(food.notAvailableCount>=NA_THRESHOLD)return{label:"⚠️ Likely Not Available",cls:"tag-warn",avail:false,priority:"community"};
  if(isAvailNow(food))return{label:"● Available Now",cls:"",avail:true,priority:"none"};
  return{label:"○ Not Now",cls:"",avail:false,priority:"none"};
}

// ══════════════════════════════════════════════════
// STORAGE HELPERS
// ══════════════════════════════════════════════════
function useLS(key,init){
  const [val,setVal]=useState(()=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{};},[key,val]);
  return[val,setVal];
}

// ══════════════════════════════════════════════════
// NOTIFICATION COMPONENT
// ══════════════════════════════════════════════════
function Notif({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[onDone]);
  return <div className="notif">{msg}</div>;
}

// ══════════════════════════════════════════════════
// FOOD CARD COMPONENT
// ══════════════════════════════════════════════════
function FoodCard({food,onOpen,onNA,userNA,onRequireLogin,isLoggedIn}){
  const [added,setAdded]=useState(false);
  const status=getDisplayStatus(food,userNA);
  const communityWarn=food.notAvailableCount>=NA_THRESHOLD&&food.adminStatus==="available";

  const handleAdd=(e)=>{
    e.stopPropagation();
    if(!isLoggedIn){onRequireLogin();return;}
    setAdded(true);setTimeout(()=>setAdded(false),700);
  };
  const handleNA=(e)=>{
    e.stopPropagation();
    if(!isLoggedIn){onRequireLogin();return;}
    onNA(food.id);
  };
  const handleOpen=()=>{
    if(!isLoggedIn){onRequireLogin();return;}
    onOpen(food);
  };

  return(
    <div className={`fc${userNA?" greyed":""}${communityWarn?" community-warn":""}`} onClick={handleOpen}>
      {communityWarn&&<div className="community-badge">⚠️ Reported</div>}
      <div className="fc-left">
        {food.tag&&<div className={`fc-tag ${food.price<=50?"tag-budget":"tag-reorder"}`}>
          {food.isVeg?<span style={{color:"var(--green)"}}>●</span>:<span style={{color:"var(--red)"}}>●</span>} {food.tag}
        </div>}
        {status.priority!=="none"&&status.priority!=="user"&&<div className={`fc-tag ${status.cls}`}>{status.label}</div>}
        <div className="fc-name">{food.name}</div>
        <div className="fc-desc">{food.desc}</div>
        <div className="fc-meta">
          <div className="rat-chip">★ {food.rating}</div>
          <div className="fc-price">{food.price!==null?`₹${food.price}`:"Price on visit"}</div>
        </div>
      </div>
      <div className="fc-right">
        <div className="food-img" style={{background:food.gradient}}>
          {food.image?<img src={food.image} alt={food.name}/>:<span style={{position:"relative",zIndex:1}}>{food.emoji}</span>}
          <div className="food-img-overlay"/>
          <div className={`avail-pill ${status.avail?"ap-now":communityWarn?"ap-warn":"ap-later"}`}>{status.avail?"Now":communityWarn?"⚠️":"Later"}</div>
        </div>
        <button className={`add-btn${added?" added":""}`} onClick={handleAdd}>{added?"✓":"+ ADD"}</button>
        {!userNA&&<button className="na-btn" onClick={handleNA}>Not Available?</button>}
      </div>
    </div>
  );
}

  const avgRating=food.reviews.length?(food.reviews.reduce((a,r)=>a+r.rating,0)/food.reviews.length).toFixed(1):food.rating;

    onSubmitReview(food.id,{id:Date.now(),user:reviewName||"Anonymous",email:currentUser?.email||"",rating:myRating,text:reviewText.trim(),date:new Date().toISOString().split("T")[0],helpful:0,images});

    setMyRating(0);setReviewText("");setImages([]);
  };

  const handleNA_modal=(e)=>{e.stopPropagation();onNA(food.id);};

  const allImages=food.reviews.flatMap(r=>r.images||[]).filter(Boolean);

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="drag-handle"/>
        <div className="fm-img" style={{background:food.gradient}}>
          {food.image?<img src={food.image} alt={food.name}/>:<span style={{fontSize:88,position:"relative",zIndex:1}}>{food.emoji}</span>}
        </div>
        <div className="fm-body">
          <div className={`fm-avail ${avail?"fma-yes":"fma-no"}`}>{avail?"● Available Now":"○ Not Available Now"} · {food.time}</div>
          <div className="fm-name">{food.name}</div>
          <div className="fm-shop"><span>{food.isVeg?<span style={{color:"var(--green)"}}>●</span>:<span style={{color:"var(--red)"}}>●</span>}</span>🏪 {food.shop} · {food.category}</div>
          <div className="fm-meta">
            <div className="fm-mc"><span className="fm-mc-lbl">Price</span><span className="fm-mc-val" style={{color:"var(--text)"}}>{food.price!==null?`₹${food.price}`:"On visit"}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Rating</span><span className="fm-mc-val">★ {avgRating}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Reviews</span><span className="fm-mc-val">{food.reviews.length}</span></div>
            <div className="fm-mc"><span className="fm-mc-lbl">Time</span><span className="fm-mc-val" style={{fontSize:12}}>{food.time}</span></div>
          </div>
          <p style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,marginBottom:16}}>{food.desc}</p>

          {/* Community report */}
          {food.notAvailableCount>0&&<div style={{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.2)",borderRadius:11,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <span>⚠️</span>
            <span style={{fontSize:12,color:"var(--yellow)"}}><strong>{food.notAvailableCount} student{food.notAvailableCount>1?"s":""}</strong> reported this may not be available right now.</span>
          </div>}

          {/* User images gallery */}
          {allImages.length>0&&<>
            <div className="sec-lbl" style={{marginBottom:8}}>Photos from students</div>
            <div className="fm-imgs">{allImages.map((img,i)=><img key={i} src={img} alt="food"/>)}</div>
          </>}

          {/* Reviews */}
          {food.reviews.length>0&&<>
            <div className="sec-lbl">What students say ({food.reviews.length})</div>
            {food.reviews.map(rv=>(
              <div key={rv.id} className="review-bub fi">
                <div className="rb-top">
                  <div>
                    <div className="rb-name">{rv.user}</div>
                    <div className="rb-date">{rv.date}</div>
                  </div>
                  <div><Stars n={rv.rating} size={12}/></div>
                </div>
                <div className="rb-text">{rv.text}</div>
                {rv.images?.length>0&&<div className="rb-img-row">{rv.images.map((img,i)=><img key={i} src={img} alt="review"/>)}</div>}
                <div className="rb-helpful">
                  <button className={`helpful-btn${helpfulMap[rv.id]?" on":""}`} onClick={()=>setHelpfulMap(m=>({...m,[rv.id]:!m[rv.id]}))}>👍 Helpful ({rv.helpful+(helpfulMap[rv.id]?1:0)})</button>
                </div>
              </div>
            ))}
          </>}

          {/* Add Review */}
          <div className="sec-lbl" style={{marginTop:18}}>Add Your Review</div>
          {submitted?
            <div className="rev-thanks">
              <div style={{fontSize:40}}>🙌</div>
              <p style={{fontWeight:700,marginTop:8}}>Thank you {reviewName||"Anonymous"} for your contribution!</p>
              <p style={{fontSize:12,color:"var(--text2)",marginTop:4}}>Your review helps other students.</p>
            </div>:
            <div className="rev-form">
              <input className="rev-name-input" placeholder="Your name (optional)" value={reviewName} onChange={e=>setReviewName(e.target.value)}/>
              <div className="sec-lbl" style={{marginBottom:6}}>Your Rating</div>
              <div className="star-pick">
                {[1,2,3,4,5].map(n=><span key={n} className={`sp-star${myRating>=n?" on":""}`} onClick={()=>setMyRating(n)}>★</span>)}
              </div>
              <textarea className="rev-input" placeholder="Share your experience... (e.g. 'Tasty but oily', 'Best budget food')" value={reviewText} onChange={e=>setReviewText(e.target.value)}/>
              <div className="img-upload-btn" onClick={()=>fileRef.current?.click()}>📸 Upload Food Photo (optional)</div>
              <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleImgUpload}/>
              {images.length>0&&<div className="img-preview-row">{images.map((img,i)=><img key={i} src={img} className="img-prev" alt="preview"/>)}</div>}
              <button className="submit-rev-btn" onClick={handleSubmit} disabled={!myRating||!reviewText.trim()} style={{opacity:(!myRating||!reviewText.trim())?.5:1}}>Submit Review</button>
            </div>
          }

          {/* Actions */}
          <div className="fm-actions">
            <button className={`btn-wish${inWL?" on":""}`} onClick={()=>onWish(food.id)}>{inWL?"♥ Wishlisted":"♡ Wishlist"}</button>
            <button className="btn-add-lg" onClick={onClose}>+ Add Item</button>
          </div>
          <div style={{textAlign:"center",marginTop:10}}>
            <button className="na-btn" style={{fontSize:11,padding:"6px 14px"}} onClick={handleNA_modal}>⚠️ Not Available Right Now?</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// LOGIN MODAL (Easy Admin No Hide)
// ══════════════════════════════════════════════════
function LoginModal({onClose,onLogin,onAdminLogin}){
  const [isAdminMode, setIsAdminMode] = useState(false);
  const [email,setEmail]=useState("");
  
  // Admin fields
  const [adminUser, setAdminUser]=useState("");
  const [adminPass, setAdminPass]=useState("");
  
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const handleGmail=()=>{
    const em=prompt("Enter your CIT college email (@citchennai.net):");
    if(em){handleEmailLogin(em);}
  };

  const handleEmailLogin=(em)=>{
    const e=(em||email).trim().toLowerCase();
    if(!e.endsWith(COLLEGE_DOMAIN)){
      setErr("⚠️ Only @citchennai.net college emails are allowed.");
      return;
    }
    setLoading(true);
    setTimeout(()=>{
      const name=e.split("@")[0].split(".").map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(" ");
      onLogin({name,email:e});
      setLoading(false);
    },800);
  };

  const handleAdminSubmit = () => {
    if(!adminUser || !adminPass) { setErr("Enter username and password"); return; }
    setLoading(true);
    setTimeout(() => {
      if(checkAdmin(adminUser, adminPass)) {
        onAdminLogin(adminUser);
      } else {
        setErr("Invalid Admin Credentials");
        setLoading(false);
      }
    }, 600);
  };

  return(
    <div className="login-overlay" onClick={e=>{if(e.target.className==="login-overlay")onClose();}}>
      <div className="login-card" onClick={e=>e.stopPropagation()}>
        <div className="login-logo">{isAdminMode ? "🛡️" : "🍽️"}</div>
        <div className="login-title">{isAdminMode ? "Admin Login" : "Student Login"}</div>
        <div className="login-sub">
          {isAdminMode ? "Authorized personnel only" : "Login with your college email to interact."}
        </div>

        <div className="login-tabs">
          <div className={`ltab ${!isAdminMode ? 'active' : 'inactive'}`} onClick={() => {setIsAdminMode(false); setErr("");}}>👨‍🎓 Student</div>
          <div className={`ltab ${isAdminMode ? 'active' : 'inactive'}`} onClick={() => {setIsAdminMode(true); setErr("");}}>🛡️ Admin</div>
        </div>

        {isAdminMode ? (
          <>
            <input className="a-inp" placeholder="Admin Username" value={adminUser} onChange={e=>{setAdminUser(e.target.value);setErr("");}} autoCapitalize="none"/>
            <input className="a-inp" type="password" placeholder="Admin Password" value={adminPass} onChange={e=>{setAdminPass(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleAdminSubmit()}/>
            <button className="login-btn" onClick={handleAdminSubmit} disabled={loading}>{loading?"Verifying…":"Login to Dashboard →"}</button>
          </>
        ) : (
          <>
            <button className="gmail-btn" onClick={handleGmail}>
              <span style={{fontSize:18}}>🔐</span> Continue with Google
            </button>
            <div className="login-divider"><span>or enter manually</span></div>
            <input className="login-inp" type="email" placeholder="your.name@citchennai.net" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleEmailLogin()}/>
            <button className="login-btn" onClick={()=>handleEmailLogin()} disabled={loading}>{loading?"Verifying…":"Login →"}</button>
          </>
        )}

        {err&&<div className="login-err">⚠️ {err.replace("⚠️ ","")}</div>}

        <p style={{fontSize:10,color:"var(--text3)",textAlign:"center",marginTop:16,lineHeight:1.5}}>
          {isAdminMode ? "Admin actions are securely logged." : "Only students with @citchennai.net email can interact."}<br/>
          <span style={{color:"var(--text2)", marginTop:8, display:"inline-block"}}>Under Chennai Institute of Technology</span><br/>
          <a href="https://akdevlabs.com" target="_blank" style={{color:"var(--red)", textDecoration:"none", marginTop:4, display:"inline-block"}}>By AKDEV Labs</a>
        </p>
        
        <button onClick={onClose} style={{display:"block",margin:"12px auto 0",fontSize:12,color:"var(--text3)"}}>✕ Close</button>
      </div>
    </div>
  );
}

// FILTER SHEET
// ══════════════════════════════════════════════════
function FilterSheet({onClose,onApply}){
  const [sec,setSec]=useState("Sort");
  const [sel,setSel]=useState({});
  const sections={
    Sort:["Relevance","Rating ↑","Price ↑","Price ↓"],
    Rating:["3.5+ Stars","4.0+ Stars","4.5+ Stars"],
    Price:["Under ₹50","Under ₹100","Under ₹150"],
    "Veg/Non-Veg":["Veg Only","Non-Veg Only","Both"],
    Availability:["Available Now","All Items"],
  };
  const toggle=(s,o)=>setSel(p=>({...p,[s]:p[s]===o?null:o}));
  const active=Object.values(sel).filter(Boolean).length;

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")onClose();}}>
      <div className="filter-sheet" style={{width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="drag-handle"/>
        <div className="fs-hdr">
          <div className="fs-title">Filters {active>0&&<span style={{fontSize:11,background:"var(--red)",color:"#fff",borderRadius:10,padding:"2px 7px",marginLeft:6}}>{active}</span>}</div>
          <button style={{fontSize:12,color:"var(--red)",fontWeight:700}} onClick={()=>setSel({})}>Clear All</button>
        </div>
        <div className="fs-body">
          <div className="fs-left">
            {Object.keys(sections).map(s=>(
              <div key={s} className={`fs-left-item${sec===s?" on":""}`} onClick={()=>setSec(s)}>
                {s}{sel[s]&&<span style={{color:"var(--red)",marginLeft:4,fontSize:9}}>●</span>}
              </div>
            ))}
          </div>
          <div className="fs-right">
            {sections[sec].map(o=>(
              <div key={o} className="fo" onClick={()=>toggle(sec,o)}>
                <div className="fo-lbl">{o}</div>
                <div className={`fo-chk${sel[sec]===o?" on":""}`}>{sel[sec]===o&&"✓"}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="fs-footer">
          <button className="fs-apply" onClick={()=>{onApply(sel);onClose();}}>Apply Filters</button>
        </div>
      </div>
    </div>
  );
}

// HOME SCREEN
// ══════════════════════════════════════════════════
function HomeScreen({foods,shops,wishlist,onWish,onOpenFood,onNA,userNA,onRequireLogin,isLoggedIn,filterOpen,setFilterOpen,appSettings}){
  const [qf,setQf]=useState("all");
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(true);
  const slot=getSlot();
  const cfg=SLOT_CFG[slot];

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),600);return()=>clearTimeout(t);},[]);

  const sortedFoods=useMemo(()=>{
    let f=[...foods];
    if(search)f=f.filter(x=>x.name.toLowerCase().includes(search.toLowerCase())||x.shop.toLowerCase().includes(search.toLowerCase())||x.category.toLowerCase().includes(search.toLowerCase()));
    if(qf==="under50")f=f.filter(x=>x.price!==null&&x.price<=50);
    if(qf==="veg")f=f.filter(x=>x.isVeg);
    if(qf==="nonveg")f=f.filter(x=>!x.isVeg);
    if(qf==="avail")f=f.filter(x=>isAvailNow(x));
    if(qf==="top")f=[...f].sort((a,b)=>b.rating-a.rating);

    // Sort: admin-available first, then user-marked to bottom
    const userNASet=new Set(userNA);
    f.sort((a,b)=>{
      const aN=userNASet.has(a.id)?1:0;
      const bN=userNASet.has(b.id)?1:0;
      if(aN!==bN)return aN-bN;
      // admin marked unavailable to bottom
      const aA=a.adminStatus==="not_available"?1:0;
      const bA=b.adminStatus==="not_available"?1:0;
      return aA-bA;
    });
    return f;
  },[foods,qf,search,userNA]);

  const trending=sortedFoods.filter(f=>f.isTrending&&!userNA.includes(f.id));
  const others=sortedFoods.filter(f=>!f.isTrending&&!userNA.includes(f.id));
  const movedDown=sortedFoods.filter(f=>userNA.includes(f.id));

  return(
    <div className="screen">
      {/* maintenance */}
      {appSettings.maintenance&&<div className="maint-banner" style={{margin:"10px 18px 0"}}><p>🚧 Site is currently under maintenance. Admin access only.</p></div>}
      {/* search */}
      <div className="search-wrap">
        <div className="sbox">
          <span style={{fontSize:15,color:"var(--text3)"}}>🔍</span>
          <input placeholder={`Search '${appSettings.searchPlaceholder||"rolls, dosa, juice"}'`} value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button style={{fontSize:15,color:"var(--text3)"}} onClick={()=>setSearch("")}>✕</button>}
        </div>
      </div>
      {/* time banner */}
      {!search&&<div className="tb-banner">
        <div className="tbb-emo">{cfg.e}</div>
        <div className="tbb-body"><strong>{cfg.t}</strong><p>{cfg.s}</p></div>
      </div>}
      {/* quick filters */}
      <div className="qfrow" style={{marginTop:12}}>
        {[["all","All"],["under50","💸 Under ₹50"],["veg","🥦 Veg"],["nonveg","🍗 Non-Veg"],["avail","🟢 Available"],["top","⭐ Top Rated"]].map(([k,l])=>(
          <div key={k} className={`qfc${qf===k?" on":""}`} onClick={()=>setQf(qf===k?"all":k)}>{l}</div>
        ))}
        <div className="qfc" onClick={()=>setFilterOpen(true)}>🎛 Filter</div>
      </div>

      {/* trending */}
      {!loading&&(appSettings.showTrending!==false)&&<>
        <div className="sec-hdr"><div className="sec-title">🔥 {search?"Results":qf==="top"?"Top Rated":appSettings.trendingTitle||"Recommended For You"}</div></div>
        {trending.length===0&&others.length===0?
          <div className="empty-state"><span className="es-ico">🍽️</span><h3>Nothing Found</h3><p>Try different filters or search terms</p></div>:
          trending.map((f,i)=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)
        }
      </>}
      {loading&&[1,2,3].map(i=><div key={i} className="skel skel-card"/>)}

      {/* most ordered */}
      {!loading&&!search&&(appSettings.showMostOrdered!==false)&&others.length>0&&<>
        <div className="sec-hdr"><div className="sec-title">🍽️ {appSettings.mostOrderedTitle||"Most Ordered"}</div></div>
        {others.map(f=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)}
      </>}

      {/* moved down */}
      {movedDown.length>0&&<>
        <div className="sec-hdr"><div className="sec-title" style={{fontSize:12,color:"var(--text3)"}}>Moved to Bottom</div></div>
        {movedDown.map(f=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={()=>{}} userNA={true} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)}
      </>}

      {/* shops */}
      {!loading&&!search&&<>
        <div style={{height:1,background:"var(--border)",margin:"16px 0 8px"}}/>
        <div className="sec-hdr"><div className="sec-title">🏪 Campus Shops</div></div>
        <div className="shops-row">
          {shops.map(s=>(
            <div key={s.id} className="shop-card">
              <div className="shop-img" style={{background:s.gradient}}>{s.emoji}</div>
              <div className="shop-info">
                <div className="shop-name">{s.name}</div>
                <div className="shop-meta">
                  <span className="shop-rat">★{s.rating}</span>{s.cuisine.split("·")[0]}
                </div>
                <div style={{marginTop:4}}>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:9,background:s.queue==="free"?"rgba(34,197,94,.12)":"rgba(255,107,53,.1)",color:s.queue==="free"?"var(--green)":"var(--orange)"}}>{s.queue==="free"?"🟢 Free":"🟡 Busy"}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{height:20}}/>
      </>}
    </div>
  );
}

// EXPLORE SCREEN
// ══════════════════════════════════════════════════
function ExploreScreen({foods,wishlist,onOpenFood,onNA,userNA,onRequireLogin,isLoggedIn,recentlyViewed}){
  const [search,setSearch]=useState("");
  const [filters,setFilters]=useState({veg:false,nonveg:false,avail:false,budget:999,minStar:0});

  const results=useMemo(()=>{
    let f=[...foods];
    if(search)f=f.filter(x=>x.name.toLowerCase().includes(search.toLowerCase())||x.shop.toLowerCase().includes(search.toLowerCase())||x.category.toLowerCase().includes(search.toLowerCase()));
    if(filters.veg)f=f.filter(x=>x.isVeg);
    if(filters.nonveg)f=f.filter(x=>!x.isVeg);
    if(filters.avail)f=f.filter(x=>isAvailNow(x));
    if(filters.budget<999)f=f.filter(x=>x.price!==null&&x.price<=filters.budget);
    if(filters.minStar>0)f=f.filter(x=>x.rating>=filters.minStar);
    return f.sort((a,b)=>b.rating-a.rating);
  },[foods,search,filters]);

  const rv=recentlyViewed.slice(0,6).map(id=>foods.find(f=>f.id===id)).filter(Boolean);

  return(
    <div className="screen">
      <div className="search-wrap">
        <div className="sbox">
          <span style={{fontSize:15,color:"var(--text3)"}}>🔍</span>
          <input placeholder="Search food, shop, category…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
          {search&&<button style={{fontSize:15,color:"var(--text3)"}} onClick={()=>setSearch("")}>✕</button>}
        </div>
      </div>
      {/* filter chips */}
      <div className="qfrow" style={{paddingTop:6}}>
        <div className={`qfc${filters.veg?" on":""}`} onClick={()=>setFilters(f=>({...f,veg:!f.veg,nonveg:false}))}>🥦 Veg</div>
        <div className={`qfc${filters.nonveg?" on":""}`} onClick={()=>setFilters(f=>({...f,nonveg:!f.nonveg,veg:false}))}>🍗 Non-Veg</div>
        <div className={`qfc${filters.avail?" on":""}`} onClick={()=>setFilters(f=>({...f,avail:!f.avail}))}>🟢 Available</div>
        <div className={`qfc${filters.budget<999?" on":""}`} onClick={()=>setFilters(f=>({...f,budget:f.budget<999?999:100}))}>💸 ₹100</div>
        {[3.5,4.0,4.5].map(s=><div key={s} className={`qfc${filters.minStar===s?" on":""}`} onClick={()=>setFilters(f=>({...f,minStar:f.minStar===s?0:s}))}>★{s}+</div>)}
      </div>
      {/* recently viewed */}
      {rv.length>0&&!search&&<>
        <div className="sec-hdr" style={{paddingTop:16}}><div className="sec-title">🕐 Recently Viewed</div></div>
        <div className="rv-row">
          {rv.map(f=><div key={f.id} className="rv-chip" onClick={()=>{if(!isLoggedIn){onRequireLogin();}else{onOpenFood(f);}}}>
            <span className="rv-emo">{f.emoji}</span>
            <div><div className="rv-cn">{f.name}</div><div className="rv-cp">₹{f.price||"?"}</div></div>
          </div>)}
        </div>
      </>}
      <div className="sec-hdr" style={{paddingTop:16}}>
        <div className="sec-title">{search?`Results for "${search}"`:filters.avail?"Available Now":"All Items"} <span style={{fontSize:11,color:"var(--text3)",fontWeight:400}}>({results.length})</span></div>
      </div>
      {results.length===0?
        <div className="empty-state"><span className="es-ico">🔍</span><h3>No results</h3><p>Try different search or filters</p></div>:
        results.map(f=><FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn}/>)
      }
    </div>
  );
}

// WISHLIST SCREEN
// ══════════════════════════════════════════════════
function WishlistScreen({foods,wishlist,onWish,onOpenFood,isLoggedIn,onRequireLogin}){
  if(!isLoggedIn) return(
    <div className="screen"><div className="empty-state"><span className="es-ico">♡</span><h3>Login to see Wishlist</h3><p>Login with your college email<br/>to save and view your wishlist.</p><button className="login-btn" style={{marginTop:16,width:"auto",padding:"10px 28px"}} onClick={onRequireLogin}>Login Now</button></div></div>
  );
  const items=wishlist.map(id=>foods.find(f=>f.id===id)).filter(Boolean);
  if(!items.length) return(
    <div className="screen"><div className="empty-state"><span className="es-ico">♡</span><h3>Nothing saved yet</h3><p>Open any food item and tap<br/><strong>"Wishlist"</strong> to save it here.</p></div></div>
  );
  return(
    <div className="screen">
      <div className="sec-hdr" style={{paddingTop:18}}><div className="sec-title">♥ Saved Items <span style={{fontSize:11,color:"var(--text3)",fontWeight:400}}>({items.length})</span></div></div>
      {items.map(f=>{const av=isAvailNow(f);return(
        <div key={f.id} className="wl-item" onClick={()=>onOpenFood(f)}>
          <div className="wl-img" style={{background:f.gradient}}>{f.image?<img src={f.image} alt={f.name}/>:<span>{f.emoji}</span>}</div>
          <div className="wl-info">
            <div className="wl-name">{f.name}</div>
            <div className="wl-shop">🏪 {f.shop}</div>
            <div style={{display:"flex",alignItems:"center"}}>
              <div className="wl-price">{f.price!==null?`₹${f.price}`:"On visit"}</div>
              <span className={`avail-badge ${av?"ab-yes":"ab-no"}`}>{av?"● Now":"○ Later"}</span>
            </div>
          </div>
          <button className="wl-del" onClick={e=>{e.stopPropagation();onWish(f.id);}}>✕</button>
        </div>
      );})}
    </div>
  );
}

// AI SCREEN
// ══════════════════════════════════════════════════
function AIScreen({foods,wishlist,onAddWish,isLoggedIn,onRequireLogin,currentUser}){
  const [budget,setBudget]=useState("");
  const [mood,setMood]=useState("any");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [ran,setRan]=useState(false);
  const slot=getSlot();

  if(!isLoggedIn) return(
    <div className="screen"><div className="empty-state"><span className="es-ico">🤖</span><h3>Login to use AI</h3><p>Login with your college email<br/>to get personalized food recommendations.</p><button className="login-btn" style={{marginTop:16,width:"auto",padding:"10px 28px"}} onClick={onRequireLogin}>Login Now</button></div></div>
  );

  const SLOT_BOOST={morning:["South Indian","Snacks","Drinks"],lunch:["North Indian","South Indian","Meals"],evening:["Drinks","Chaats","Desserts"],night:["Snacks","Fast Food"]};
  const MOOD_CATS={any:null,snacks:["Snacks","Fast Food"],meals:["North Indian","South Indian","Meals","Chinese"],drinks:["Drinks"],chaats:["Chaats"],desserts:["Desserts"],veg:null};

  async function run(){
    setLoading(true);setRan(true);
    const b=parseInt(budget)||999;
    const moodCats=MOOD_CATS[mood];
    const boostCats=SLOT_BOOST[slot]||[];
    let candidates=[...foods].filter(f=>f.adminStatus==="available");
    if(b<999)candidates=candidates.filter(f=>f.price!==null&&f.price<=b);
    if(moodCats)candidates=candidates.filter(f=>moodCats.includes(f.category));
    if(mood==="veg")candidates=candidates.filter(f=>f.isVeg);
    candidates=candidates.map(f=>{
      let sc=f.rating*2;
      if(boostCats.includes(f.category))sc+=2;
      if(isAvailNow(f))sc+=1;
      if(f.isTrending)sc+=1.5;
      if(f.notAvailableCount===0)sc+=0.5;
      return{...f,sc};
    }).sort((a,b)=>b.sc-a.sc).slice(0,3);

    const reasons={};
    try{
      const ctx=`CIT campus. Time: ${slot}. Student: ${currentUser?.name}. Budget: ₹${b}. Mood: ${mood}.\nCandidates:\n${candidates.map(f=>`${f.name} ₹${f.price||"on visit"} from ${f.shop} (${f.category}, ${f.rating}★, ${isAvailNow(f)?"available now":"check timing"})`).join("\n")}`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:'For each food item, write one very short friendly recommendation sentence (max 10 words). Be specific. Return only valid JSON: {"item name":"reason"}',messages:[{role:"user",content:ctx}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||"{}";
      Object.assign(reasons,JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch{
      const fb={morning:"Perfect light morning pick — fresh and affordable",lunch:"Best value filling meal for lunch right now",evening:"Ideal evening special — don't miss it today",night:"One of few available options at this hour"};
      candidates.forEach(f=>{reasons[f.name]=fb[slot];});
    }
    setResults(candidates.map(f=>({...f,reason:reasons[f.name]||`Rated ${f.rating}★ · ${isAvailNow(f)?"Available now":"Check availability"}`})));
    setLoading(false);
  }

  return(
    <div className="screen">
      <div className="ai-hero">
        <span className="ai-hero-ico">🤖</span>
        <div className="ai-hero-title">What should I eat?</div>
        <div className="ai-hero-sub">Hi {currentUser?.name?.split(" ")[0]} 👋 Tell me your budget and mood — I'll find the best campus food for you right now.</div>
        <button className="ai-cta" onClick={run} disabled={loading}>{loading?"✦ Thinking…":"✦ Suggest Food Now →"}</button>
      </div>
      <div className="ai-inputs">
        <div className="ai-inp-card"><label>Budget (₹)</label><input type="number" placeholder="e.g. 80" value={budget} onChange={e=>setBudget(e.target.value)} inputMode="numeric"/></div>
        <div className="ai-inp-card"><label>I'm craving</label>
          <select value={mood} onChange={e=>setMood(e.target.value)}>
            <option value="any">Anything 🍽</option>
            <option value="snacks">Snacks 🍟</option>
            <option value="meals">Full Meal 🍛</option>
            <option value="drinks">Juice/Drink 🧃</option>
            <option value="chaats">Chaats 🥙</option>
            <option value="desserts">Desserts 🍰</option>
            <option value="veg">Veg Only 🥦</option>
          </select>
        </div>
      </div>
      {loading&&[1,2,3].map(i=><div key={i} className="skel" style={{height:110,margin:"0 18px 11px",borderRadius:15}}/>)}
      {!loading&&ran&&results.length===0&&<div className="empty-state"><span className="es-ico">😕</span><h3>No matches</h3><p>Try a higher budget or different mood</p></div>}
      {!loading&&results.map((f,i)=>(
        <div key={f.id} className={`ai-result fi`} style={{animationDelay:`${i*.08}s`}}>
          <div className="air-top">
            <div className="air-img" style={{background:f.gradient}}>{f.image?<img src={f.image} alt={f.name}/>:<span>{f.emoji}</span>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="air-name">{i===0?"🥇 ":""}{f.name}</div>
              <div className="air-shop">🏪 {f.shop} · ₹{f.price||"ask"} · ★{f.rating}</div>
            </div>
            <button onClick={()=>onAddWish(f.id)} style={{padding:"5px 12px",borderRadius:9,border:`1.5px solid ${wishlist.includes(f.id)?"var(--red)":"var(--border2)"}`,background:wishlist.includes(f.id)?"var(--red)":"none",color:wishlist.includes(f.id)?"#fff":"var(--text2)",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>
              {wishlist.includes(f.id)?"♥":"♡"}
            </button>
          </div>
          <div className="air-reason"><strong>Why?</strong> {f.reason}</div>
          <div className="air-bottom">
            <span className="air-score">Score: {f.sc.toFixed(1)} · {isAvailNow(f)?"● Available":"○ Later"}</span>
          </div>
        </div>
      ))}
    </div>
  );
}
