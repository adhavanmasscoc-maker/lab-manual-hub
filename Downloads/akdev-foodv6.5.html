// ADMIN DASHBOARD
// ══════════════════════════════════════════════════
function AdminDashboard({foods,setFoods,shops,setShops,feedback,setFeedback,appSettings,setAppSettings,onLogout,adminUser}){
  const [tab,setTab]=useState("overview");
  const [editFood,setEditFood]=useState(null);
  const [jsonText,setJsonText]=useState("");
  const [jsonValid,setJsonValid]=useState(null);
  const [notif,setNotif]=useState("");

  const showNotif=(m)=>{setNotif(m);setTimeout(()=>setNotif(""),2500);};

  function validateJson(txt){
    try{JSON.parse(txt);setJsonValid(true);}catch{setJsonValid(false);}
  }

  function applyJson(){
    try{const d=JSON.parse(jsonText);if(Array.isArray(d)){setFoods(d);showNotif("✓ Food data updated from JSON!");}}catch{showNotif("⚠️ Invalid JSON");}
  }

  function updateFoodAvailability(id,status){
    setFoods(prev=>prev.map(f=>f.id===id?{...f,adminStatus:status}:f));
    showNotif(`✓ Availability updated: ${status}`);
  }

  function resetNACount(id){
    setFoods(prev=>prev.map(f=>f.id===id?{...f,notAvailableCount:0}:f));
    showNotif("✓ Community votes reset");
  }

  function updateFeedbackStatus(id,status){
    setFeedback(prev=>prev.map(fb=>fb.id===id?{...fb,status}:fb));
    showNotif(`✓ Marked as ${status}`);
  }

  function deleteFeedback(id){
    setFeedback(prev=>prev.filter(fb=>fb.id!==id));
    showNotif("✓ Feedback deleted");
  }

  const missingData=foods.filter(f=>!f.price||!f.rating||!f.avail);
  const communityFlags=foods.filter(f=>f.notAvailableCount>=NA_THRESHOLD&&f.adminStatus==="available");

  const TABS=[["overview","📊 Overview"],["foods","🍔 Foods"],["shops","🏪 Shops"],["reviews","💬 Reviews"],["feedback","📝 Feedback"],["settings","⚙️ Settings"],["json","📦 JSON"]];

  return(
    <div className="admin-dash">
      {notif&&<Notif msg={notif} onDone={()=>setNotif("")}/>}
      <div className="ad-topbar">
        <div>
          <div className="ad-title">🛠 Admin Dashboard</div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>Logged in as <strong style={{color:"var(--red)"}}>{adminUser}</strong></div>
        </div>
        <button className="ad-logout" onClick={onLogout}>Logout</button>
      </div>
      <div className="ad-tabs">
        {TABS.map(([k,l])=><div key={k} className={`ad-tab${tab===k?" on":""}`} onClick={()=>setTab(k)}>{l}</div>)}
      </div>
      <div className="ad-content">

        {/* OVERVIEW */}
        {tab==="overview"&&<>
          <div className="ad-stats">
            <div className="ad-stat"><span className="ad-stat-val" style={{color:"var(--red)"}}>{foods.length}</span><div className="ad-stat-lbl">Food Items</div></div>
            <div className="ad-stat"><span className="ad-stat-val" style={{color:"var(--green)"}}>{foods.filter(f=>isAvailNow(f)).length}</span><div className="ad-stat-lbl">Available Now</div></div>
            <div className="ad-stat"><span className="ad-stat-val" style={{color:"var(--yellow)"}}>{communityFlags.length}</span><div className="ad-stat-lbl">Community Flags</div></div>
            <div className="ad-stat"><span className="ad-stat-val" style={{color:"var(--purple)"}}>{feedback.filter(f=>f.status==="pending").length}</span><div className="ad-stat-lbl">Pending Feedback</div></div>
          </div>
          {communityFlags.length>0&&<>
            <div className="ad-section-title">⚠️ Community-Flagged Items ({communityFlags.length})</div>
            {communityFlags.map(f=>(
              <div key={f.id} className="ad-food-row">
                <div className="ad-food-emo" style={{background:f.gradient}}><span style={{fontSize:20}}>{f.emoji}</span></div>
                <div className="ad-food-info"><div className="ad-food-name">{f.name}</div><div className="ad-food-meta">⚠️ {f.notAvailableCount} reports · {f.shop}</div></div>
                <div className="ad-food-actions">
                  <button className="ad-btn green" onClick={()=>{updateFoodAvailability(f.id,"available");resetNACount(f.id);}}>✓ Available</button>
                  <button className="ad-btn" style={{color:"var(--red)"}} onClick={()=>updateFoodAvailability(f.id,"not_available")}>✗ Confirm NA</button>
                </div>
              </div>
            ))}
          </>}
          {missingData.length>0&&<>
            <div className="ad-section-title" style={{marginTop:16}}>📊 Data Validation</div>
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
              {missingData.map(f=>(
                <div key={f.id} className="val-item">
                  <div className={`val-dot ${!f.price?"val-red":!f.rating?"val-yellow":"val-green"}`}/>
                  <div className="val-text"><strong>{f.name}</strong> — {!f.price?"Missing price":"Missing rating"}</div>
                  <button className="ad-btn" onClick={()=>{setTab("foods");}}>Edit</button>
                </div>
              ))}
            </div>
          </>}
        </>}

        {/* FOODS */}
        {tab==="foods"&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div className="ad-section-title" style={{marginBottom:0}}>Food Items ({foods.length})</div>
            <button className="ad-btn primary" onClick={()=>{const nf={id:`food-${Date.now()}`,name:"New Food",shopId:"apurva",shop:"Apurva Sweets & Bakery",price:50,rating:4.0,category:"Snacks",isVeg:true,isTrending:false,tag:"New",avail:"available",time:"Daily",desc:"New food item",emoji:"🍽️",gradient:"linear-gradient(135deg,#1a1a1a,#0a0a0a)",notAvailableCount:0,adminStatus:"available",image:null,reviews:[]};setFoods(prev=>[nf,...prev]);setEditFood(nf);showNotif("✓ New food added");}}>+ Add Food</button>
          </div>
          {foods.map(f=>(
            <div key={f.id} className="ad-food-row">
              <div className="ad-food-emo" style={{background:f.gradient,borderRadius:10}}><span style={{fontSize:20}}>{f.emoji}</span></div>
              <div className="ad-food-info">
                <div className="ad-food-name">{f.name}</div>
                <div className="ad-food-meta">₹{f.price||"?"} · ★{f.rating} · {f.shop} · {f.notAvailableCount>0?`⚠️${f.notAvailableCount} reports`:""}</div>
                <div className="avail-sel">
                  {[["available","✓ Available","on-green"],["likely_unavailable","⚠️ Likely","on-yellow"],["not_available","✗ Not Available","on-red"]].map(([v,l,c])=>(
                    <span key={v} className={`avs${f.adminStatus===v?" "+c:""}`} onClick={()=>updateFoodAvailability(f.id,v)}>{l}</span>

              <div className="ad-food-actions" style={{flexDirection:"column",gap:4}}>
                <button className="ad-btn primary" onClick={()=>setEditFood(f)}>Edit</button>

                <button className="ad-btn" style={{color:"var(--red)"}} onClick={()=>{if(confirm(`Delete ${f.name}?`)){setFoods(prev=>prev.filter(x=>x.id!==f.id));showNotif("✓ Food deleted");}}}>Delete</button>
              </div>
            </div>

        </>}

        {/* SHOPS */}
        {tab==="shops"&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div className="ad-section-title" style={{marginBottom:0}}>Shops ({shops.length})</div>

                <div className="ad-food-meta">★{s.rating} · {s.cuisine.split("·")[0].trim()} · {s.hours}</div>

        {/* FEEDBACK */}

          <div className="ad-section-title">User Feedback ({feedback.length})</div>

        </>}
      </div>

      {/* Edit Food Modal */}
      {editFood&&(
        <div className="overlay" onClick={e=>{if(e.target.className==="overlay")setEditFood(null);}}>
          <div className="sheet" style={{maxHeight:"85vh"}} onClick={e=>e.stopPropagation()}>
            <div className="drag-handle"/>
            <div style={{padding:"16px 20px 28px"}}>
              <div style={{fontSize:16,fontWeight:800,marginBottom:16}}>Edit: {editFood.name}</div>
              {[["name","Food Name","text"],["price","Price (₹)","number"],["rating","Rating (1-5)","number"],["category","Category","text"],["tag","Tag","text"],["time","Available Time","text"],["desc","Description","text"],["emoji","Emoji","text"]].map(([k,label,type])=>(

                  <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:4}}>{label}</label>
                  <input type={type} className="a-inp" style={{marginBottom:0}} value={editFood[k]||""} onChange={e=>setEditFood(p=>({...p,[k]:type==="number"?parseFloat(e.target.value)||0:e.target.value}))}/>
                </div>
              ))}
              <div style={{marginBottom:10}}>
                <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:4}}>Veg/Non-Veg</label>
                <div style={{display:"flex",gap:8}}>
                  <span className={`avs${editFood.isVeg?" on-green":""}`} onClick={()=>setEditFood(p=>({...p,isVeg:true}))}>🥦 Veg</span>
                  <span className={`avs${!editFood.isVeg?" on-red":""}`} onClick={()=>setEditFood(p=>({...p,isVeg:false}))}>🍗 Non-Veg</span>
                </div>
              </div>
              <div style={{marginBottom:10}}>
                <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:4}}>Trending</label>
                <div style={{display:"flex",gap:8}}>
                  <span className={`avs${editFood.isTrending?" on-green":""}`} onClick={()=>setEditFood(p=>({...p,isTrending:true}))}>🔥 Trending</span>
                  <span className={`avs${!editFood.isTrending?" on-red":""}`} onClick={()=>setEditFood(p=>({...p,isTrending:false}))}>Not Trending</span>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button className="a-btn" style={{flex:1,padding:"12px",background:"none",border:"1px solid var(--border2)",borderRadius:11}} onClick={()=>setEditFood(null)}>Cancel</button>
                <button className="a-btn" style={{flex:1,padding:"12px",background:"var(--green)",color:"#fff",border:"none",borderRadius:11,fontWeight:800}} onClick={()=>{setFoods(prev=>prev.map(f=>f.id===editFood.id?editFood:f));setEditFood(null);showNotif("✓ Food updated!");}}>Save Changes</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════
function App(){
  const [theme,setTheme]=useLS("cit_theme","dark");
  const [tab,setTab]=useState("home");
  const [foods,setFoods]=useLS("cit_foods",INIT_FOODS);
  const [shops,setShops]=useLS("cit_shops",INIT_SHOPS);
  const [feedback,setFeedback]=useLS("cit_feedback",INIT_FEEDBACK);
  const [appSettings,setAppSettings]=useLS("cit_settings",{maintenance:false,showTrending:true,showMostOrdered:true,appName:"CIT Food Finder",trendingTitle:"Recommended For You",mostOrderedTitle:"Most Ordered",searchPlaceholder:"rolls, dosa, juice"});
  const [wishlist,setWishlist]=useLS("cit_wl",[]);
  const [userNA,setUserNA]=useLS("cit_na",[]);
  const [recentlyViewed,setRV]=useLS("cit_rv",[]);
  const [openFood,setOpenFood]=useState(null);
  const [loginOpen,setLoginOpen]=useState(false);
  const [filterOpen,setFilterOpen]=useState(false);
  const [currentUser,setCurrentUser]=useLS("cit_user",null);
  const [adminSession,setAdminSession]=useLS("cit_admin_session",null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [notif,setNotif]=useState("");
  const [clock,setClock]=useState("");

  // Live clock
  useEffect(()=>{
    const tick=()=>{const n=new Date();const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();const ap=h>=12?"PM":"AM";setClock(`${String(h%12||12).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")} ${ap}`);};
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  const toggleTheme=()=>{
    document.body.classList.add("tc");
    setTheme(t=>t==="dark"?"light":"dark");
    setTimeout(()=>document.body.classList.remove("tc"),400);
  };

  const handleRequireLogin=()=>setLoginOpen(true);

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setLoginOpen(false);
    setNotif(`Welcome ${user.name.split(" ")[0]} 👋`);
  };

  const handleAdminLogin=(user)=>{
    setAdminSession(user);
    setShowAdmin(true);
    setLoginOpen(false);
    setNotif(`Admin Access Granted 🛡️`);
  };

  const handleOpenFood=(food)=>{
    setRV(rv=>{const n=rv.filter(x=>x!==food.id);return[food.id,...n].slice(0,10);});
    setOpenFood(food);
  };

  const handleNA=(id)=>{
    // User-level: add to personal NA list
    setUserNA(prev=>prev.includes(id)?prev:[...prev,id]);
    // Community level: increment count
    setFoods(prev=>prev.map(f=>{
      if(f.id!==id)return f;
      const newCount=f.notAvailableCount+1;
      return{...f,notAvailableCount:newCount,adminStatus:f.adminStatus==="available"&&newCount>=NA_THRESHOLD?"likely_unavailable":f.adminStatus};
    }));
    setNotif("Noted! Item moved to bottom for you.");
  };

  const handleWish=(id)=>{
    if(!currentUser){setLoginOpen(true);return;}
    setWishlist(prev=>{const n=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];setNotif(n.includes(id)?"♥ Added to wishlist":"Removed from wishlist");setTimeout(()=>setNotif(""),2000);return n;});
  };

  const handleSubmitReview=(foodId,review)=>{
    setFoods(prev=>prev.map(f=>f.id===foodId?{...f,reviews:[...f.reviews,review],rating:parseFloat(((f.reviews.reduce((a,r)=>a+r.rating,0)+review.rating)/(f.reviews.length+1)).toFixed(1))}:f));
  };

  // Maintenance mode
  if(appSettings.maintenance&&!showAdmin&&!adminSession) return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,background:"var(--bg)",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:14}}>🚧</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>Site Under Maintenance</div>
      <div style={{fontSize:14,color:"var(--text2)",lineHeight:1.6,marginBottom:20}}>We're making CIT Food Finder even better.<br/>Check back soon!</div>
      <button className="login-btn" style={{padding:"10px 24px",width:"auto"}} onClick={()=>setLoginOpen(true)}>Admin Login</button>
      {loginOpen&&<LoginModal onClose={()=>setLoginOpen(false)} onLogin={()=>{}} onAdminLogin={handleAdminLogin}/>}
    </div>
  );

  // Admin view
  if(showAdmin){
    return <AdminDashboard foods={foods} setFoods={setFoods} shops={shops} setShops={setShops} feedback={feedback} setFeedback={setFeedback} appSettings={appSettings} setAppSettings={setAppSettings} onLogout={()=>{setAdminSession(null);setShowAdmin(false);}} adminUser={adminSession}/>;
  }

  const modalFood=openFood?foods.find(f=>f.id===openFood.id)||openFood:null;

  return(
    <div id="root" data-theme={theme}>
      {notif&&<Notif msg={notif} onDone={()=>setNotif("")}/>}

      {/* Topbar */}
      <div className="topbar">
        <div className="tb-brand">
          <div className="tb-name">{appSettings.appName||"CIT Food Finder"}</div>
          <div className="tb-loc">📍 Under Chennai Institute of Technology</div>
          <a href="https://akdevlabs.com" target="_blank" className="tb-dev">By AKDEV Labs</a>
        </div>
        <div className="tb-right">
          <div className="clock-pill">{clock}</div>
          <button className="theme-btn" onClick={toggleTheme}>{theme==="dark"?"☀️":"🌙"}</button>
          {currentUser?
            <div className="user-avatar" title={currentUser.email} onClick={()=>{if(confirm("Logout?"))setCurrentUser(null);}}>{currentUser.name.charAt(0).toUpperCase()}</div>:
            <button className="user-avatar" style={{background:"var(--card)",color:"var(--text2)",border:"1px solid var(--border2)",fontSize:11,fontWeight:700}} onClick={handleRequireLogin}>Login</button>
          }
        </div>
      </div>

      {/* Screens */}
      {tab==="home"&&<HomeScreen foods={foods} shops={shops} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} filterOpen={filterOpen} setFilterOpen={setFilterOpen} appSettings={appSettings}/>}
      {tab==="explore"&&<ExploreScreen foods={foods} wishlist={wishlist} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} recentlyViewed={recentlyViewed}/>}
      {tab==="wishlist"&&<WishlistScreen foods={foods} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin}/>}
      {tab==="ai"&&<AIScreen foods={foods} wishlist={wishlist} onAddWish={handleWish} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin} currentUser={currentUser}/>}

      {/* Bottom Nav */}
      <nav className="bnav">
        {[["home","🏠","Home"],["explore","🔍","Explore"],["wishlist","♡","Wishlist"],["ai","🤖","AI Pick"]].map(([t,ico,lbl])=>(
          <button key={t} className={`bn${tab===t?" on":""}`} onClick={()=>setTab(t)}>
            <div className="bn-pip"/>
            <div className="bn-ico">{t==="wishlist"&&wishlist.length>0?"♥":ico}</div>
            <div className="bn-lbl">{lbl}{t==="wishlist"&&wishlist.length>0?` (${wishlist.length})`:""}</div>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {modalFood&&<FoodModal food={modalFood} onClose={()=>setOpenFood(null)} wishlist={wishlist} onWish={handleWish} onSubmitReview={handleSubmitReview} currentUser={currentUser} foods={foods} onNA={handleNA} userNA={userNA}/>}
      
      {loginOpen&&<LoginModal onClose={()=>setLoginOpen(false)} onLogin={handleLogin} onAdminLogin={handleAdminLogin}/>}
      
      {filterOpen&&<FilterSheet onClose={()=>setFilterOpen(false)} onApply={()=>{setNotif("✓ Filters applied");setTimeout(()=>setNotif(""),2000);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

</html>
