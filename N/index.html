    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100dvh; overflow: hidden; font-family: 'Syne', system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); transition: background .35s, color .35s; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, textarea, select { font-family: inherit; }
    img { max-width: 100%; display: block; }
    ::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .tc * { transition: background .35s, color .35s, border-color .35s, box-shadow .35s !important; }
    #root { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
    .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; background: var(--bg); height: 100%; }
    .screen::-webkit-scrollbar { display: none; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    .tb-brand { display: flex; flex-direction: column; }
    .tb-logo-row { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 800; color: var(--cyan); letter-spacing: -0.5px; line-height: 1.1; }
    .tb-sub { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .tb-sub a { color: var(--cyan); text-decoration: none; font-weight: 700; transition: opacity 0.2s; }
    .tb-sub a:hover { opacity: 0.8; }
    .tb-right { display: flex; align-items: center; gap: 8px; }
    .clock-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .clock-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .theme-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--card); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 17px; transition: transform .2s; }
    .theme-btn:active { transform: scale(.88); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--purple); color: #fff; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
    .user-avatar:active { transform: scale(0.9); }
    .bnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 75px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding: 0 10px; }
    .bn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; position: relative; color: var(--text3); transition: color .2s; }
    .bn.on { color: var(--cyan); }
    .bn-ico { font-size: 22px; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .bn.on .bn-ico { transform: scale(1.18) translateY(-2px); }
    .bn:active .bn-ico { transform: scale(.85); }
    .bn-lbl { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .support-fab { position: fixed; bottom: 90px; right: 20px; background: var(--cyan); color: #000; width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow); z-index: 90; cursor: pointer; transition: transform 0.2s; }
    .support-fab:active { transform: scale(0.9); }
    .search-wrap { padding: 12px 20px 4px; }
    .sbox { display: flex; align-items: center; gap: 9px; background: var(--card); border: 1.5px solid var(--border2); border-radius: 14px; padding: 11px 14px; transition: border-color .2s, box-shadow .2s; }
    .sbox:focus-within { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
    .sbox input { flex: 1; background: none; border: none; outline: none; font-size: 14px; color: var(--text); }
    .sbox input::placeholder { color: var(--text3); }
    .sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 10px; }
    .sec-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .sec-more { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: var(--cyan); }
    .qfrow { display: flex; gap: 10px; padding: 6px 20px; overflow-x: auto; scrollbar-width: none; }
    .qfrow::-webkit-scrollbar { display: none; }
    .qfc { white-space: nowrap; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); color: var(--text2); background: var(--card); transition: all .18s; flex-shrink: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .qfc.on { background: var(--cyan); border-color: var(--cyan); color: #000; font-weight: 800; }
    .qfc:active { transform: scale(.93); }
    .stats-row { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; margin-bottom: 10px; scrollbar-width: none; }
    .stats-row::-webkit-scrollbar { display: none; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; min-width: 100px; text-align: center; flex-shrink: 0; }
    .stat-val { font-size: 22px; font-weight: 800; display: block; margin-bottom: 4px; }
    .stat-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
    .food-scroll { display: flex; gap: 16px; padding: 0 20px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 10px; scrollbar-width: none; }
    .food-scroll::-webkit-scrollbar { display: none; }
    .grid-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 16px; padding: 0 20px 20px; }
    .fc { display: flex; flex-direction: column; width: 170px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; flex-shrink: 0; cursor: pointer; transition: transform 0.2s, border-color 0.2s; animation: fadeUp .3s ease forwards; }
    .grid-wrap .fc { width: 100%; }
    .fc:hover { transform: translateY(-4px); border-color: var(--border2); }
    .fc.greyed { opacity: 0.5; filter: grayscale(80%); }
    .fc.community-warn { border-color: var(--yellow); }
    .fc-img-area { width: 100%; height: 130px; display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; }
    .fc-img-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom,transparent 40%,var(--card) 100%); pointer-events: none; }
    .fc-img-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .badge-trend { position: absolute; top: 10px; left: 10px; background: var(--orange); color: #000; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 12px; z-index: 2; display: flex; align-items: center; gap: 4px; }
    .badge-avail { position: absolute; top: 10px; right: 10px; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 12px; z-index: 2; border: 1px solid transparent; }
    .badge-avail.yes { background: rgba(0,214,143,0.15); border-color: var(--green); color: var(--green); }
    .badge-avail.no { background: rgba(239,71,111,0.15); border-color: var(--red); color: var(--red); }
    .badge-avail.warn { background: rgba(251,191,36,0.15); border-color: var(--yellow); color: var(--yellow); }
    .community-badge { position: absolute; top: 35px; right: 10px; z-index: 3; font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 8px; background: rgba(251,191,36,.9); color: #000; }
    .fc-body { padding: 12px 14px 16px; display: flex; flex-direction: column; flex: 1; }
    .fc-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fc-shop { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
    .fc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .fc-price { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; color: var(--cyan); }
    .fc-stars { color: var(--yellow); font-size: 10px; }
    .add-btn { padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: 1px solid var(--cyan); background: transparent; color: var(--cyan); transition: all 0.2s; position: relative; z-index: 10; }
    .add-btn.added { background: var(--cyan); color: #000; }
    .na-btn { width: 100%; padding: 8px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700; border: 1px solid rgba(239,71,111,0.3); color: var(--red); background: rgba(239,71,111,0.05); transition: all 0.2s; text-align: center; position: relative; z-index: 10; }
    .na-btn:hover { background: var(--red); color: #fff; }
    .shops-row { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; }
    .shops-row::-webkit-scrollbar { display: none; }
    .shop-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 148px; flex-shrink: 0; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .shop-card:hover { transform: translateY(-2px); border-color: var(--border2); }
    .shop-img { height: 86px; display: flex; align-items: center; justify-content: center; font-size: 44px; position: relative; }
    .shop-info { padding: 12px; }
    .shop-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .shop-meta { font-size: 10px; color: var(--text2); margin-bottom: 6px; }
    .shop-rat { display: inline-flex; align-items: center; gap: 2px; background: var(--green); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-right: 4px; }
    .tb-banner { margin: 10px 20px 20px; background: rgba(255,209,102,0.05); border: 1px solid rgba(255,209,102,0.2); border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 14px; }
    .tbb-emo { font-size: 32px; background: rgba(255,255,255,0.1); width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0; }
    .tbb-body strong { font-size: 14px; color: var(--yellow); display: block; margin-bottom: 4px; }

    .wl-shop { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text2); margin-bottom: 6px; }
    .wl-price { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 800; color: var(--cyan); }
    .avail-badge { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 10px; margin-left: 8px; }

    .empty-state p { font-size: 13px; color: var(--text2); line-height: 1.6; }

    const NA_THRESHOLD = 5;

    function isAvailNow(food) {
      const h = new Date().getHours();
      if (food.adminStatus === "not_available") return false;
      if (food.notAvailableCount >= NA_THRESHOLD && food.adminStatus !== "available") return false;
      if (food.avail === "available") return true;
      if (food.avail === "morning") return h >= 6 && h < 13;
      if (food.avail === "evening") return h >= 15 && h < 21;
      return false;
    }

    function getDisplayStatus(food, userNA) {
      if (food.adminStatus === "not_available") return { label:"❌ Not Available", cls:"tag-na", avail:false, priority:"admin" };
      if (food.adminStatus === "likely_unavailable") return { label:"⚠️ Likely Unavailable", cls:"tag-warn", avail:false, priority:"admin" };
      if (userNA) return { label:"Moved Down", cls:"", avail:isAvailNow(food), priority:"user" };
      if (food.notAvailableCount >= NA_THRESHOLD) return { label:"⚠️ Likely Not Available", cls:"tag-warn", avail:false, priority:"community" };
      if (isAvailNow(food)) return { label:"● Available Now", cls:"", avail:true, priority:"none" };
      return { label:"○ Not Now", cls:"", avail:false, priority:"none" };
    }

    // ══════════════════════════════════════════════════
    // STORAGE HELPERS
    // ══════════════════════════════════════════════════
    function useLS(key, init) {
      const [val, setVal] = useState(() => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; } });
      useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
      return [val, setVal];
    }

    function Notif({ msg, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, [onDone]);
      return <div className="notif">{msg}</div>;
    }

    function Stars({ n, size=12 }) {
      return <span style={{ color:"var(--yellow)", fontSize:size }}>{"★".repeat(Math.floor(n))}{"☆".repeat(5-Math.floor(n))}</span>;
    }

    // ══════════════════════════════════════════════════
    // ── SUPABASE AUTH GATEKEEPER HOOK ────────────────
    // Watches session; enforces @citchennai.net strictly
    // ══════════════════════════════════════════════════
    function useSupabaseAuth(onVerifiedLogin, onLogout) {
      useEffect(() => {
        // 1. Check existing session on page load / OAuth redirect return
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session?.user?.email?.endsWith(ALLOWED_DOMAIN)) {
            onVerifiedLogin({
              name:  session.user.user_metadata?.full_name || session.user.email,
              email: session.user.email,
              uid:   session.user.id,
            });
          } else if (session) {
            // Signed in but wrong domain → force signout
            supabase.auth.signOut();
          }
        });

        // 2. Live listener — fires on every auth state change
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          if (event === "SIGNED_IN" && session?.user?.email?.endsWith(ALLOWED_DOMAIN)) {
            onVerifiedLogin({
              name:  session.user.user_metadata?.full_name || session.user.email,
              email: session.user.email,
              uid:   session.user.id,
            });
          } else if (event === "SIGNED_IN" && session) {
            // Wrong domain — boot immediately
            supabase.auth.signOut().then(() => {
              alert("⚠️ Only @citchennai.net college accounts are permitted.");
            });
          } else if (event === "SIGNED_OUT") {
            onLogout();
          }
        });

        return () => subscription.unsubscribe();
      }, []);
    }
    // ── END GATEKEEPER ───────────────────────────────

    function FoodCard({ food, onOpen, onNA, userNA, onRequireLogin, isLoggedIn, onAddToCart }) {

      const status = getDisplayStatus(food, userNA);
      const communityWarn = food.notAvailableCount >= NA_THRESHOLD && food.adminStatus === "available";

      const handleAdd = (e) => { e.stopPropagation(); if (!isLoggedIn) { onRequireLogin(); return; } setAdded(true); setTimeout(() => setAdded(false), 700); if (onAddToCart) onAddToCart(food.id); };
      const handleNA  = (e) => { e.stopPropagation(); if (!isLoggedIn) { onRequireLogin(); return; } onNA(food.id, e); };
      const handleOpen = () => { if (!isLoggedIn) { onRequireLogin(); return; } onOpen(food); };

      return (
        <div className={`fc${userNA ? " greyed" : ""}${communityWarn ? " community-warn" : ""} fi`} onClick={handleOpen}>

    // LOGIN MODAL  — Google SSO via Supabase
    // ══════════════════════════════════════════════════
    function LoginModal({ onClose, onAdminLogin }) {
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [adminUser, setAdminUser] = useState("");
      const [adminPass, setAdminPass] = useState("");
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);

      // ── Supabase Google OAuth ──────────────────────
      const handleGmail = async () => {
        setLoading(true);
        setErr("");
        const { error } = await supabase.auth.signInWithOAuth({
          provider: "google",
          options: {
            queryParams: {
              hd: "citchennai.net",       // Google hosted-domain hint
              prompt: "select_account",
            },
            redirectTo: window.location.href,  // return here after OAuth
          },
        });
        if (error) {
          setErr(error.message);
          setLoading(false);
        }
        // On success the browser navigates to Google and back.
        // useSupabaseAuth's onAuthStateChange fires automatically on return.
      };
      // ── End Supabase Google OAuth ──────────────────

      const handleAdminSubmit = () => {
        if (!adminUser || !adminPass) { setErr("Enter username and password"); return; }
        setLoading(true);
        setTimeout(() => {
          if (checkAdmin(adminUser, adminPass)) { onAdminLogin(adminUser); }
          else { setErr("Invalid Admin Credentials"); setLoading(false); }
        }, 600);
      };

      return (
        <div className="login-overlay" onClick={e => { if (e.target.className === "login-overlay") onClose(); }} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(8px)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }}>
          <div className="login-card" style={{ position:'relative' }} onClick={e => e.stopPropagation()}>
            <button onClick={onClose} style={{ position:'absolute', top:16, right:16, width:30, height:30, borderRadius:15, background:'var(--card)', color:'var(--text)', border:'1px solid var(--border)', fontSize:12, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', zIndex:100, fontWeight:'bold' }}>✕</button>
            <div className="login-logo">{isAdminMode ? "🛡️" : "🍽️"}</div>
            <div className="login-title">{isAdminMode ? "Admin Login" : "Student Login"}</div>
            <div className="login-sub">{isAdminMode ? "Authorized personnel only" : "Login with your college Google account."}</div>

            <div className="login-tabs">
              <div className={`ltab ${!isAdminMode ? "active" : "inactive"}`} onClick={() => { setIsAdminMode(false); setErr(""); }}>👨‍🎓 Student</div>
              <div className={`ltab ${isAdminMode ? "active" : "inactive"}`}  onClick={() => { setIsAdminMode(true);  setErr(""); }}>🛡️ Admin</div>
            </div>

            {isAdminMode ? (
              <>
                <input className="login-inp" placeholder="Admin Username" value={adminUser} onChange={e => { setAdminUser(e.target.value); setErr(""); }} autoCapitalize="none" />
                <input className="login-inp" type="password" placeholder="Admin Password" value={adminPass} onChange={e => { setAdminPass(e.target.value); setErr(""); }} onKeyDown={e => e.key === "Enter" && handleAdminSubmit()} />
                <button className="login-btn" onClick={handleAdminSubmit} disabled={loading}>{loading ? "Verifying…" : "Login to Dashboard →"}</button>
              </>
            ) : (
              <>
                {/* ── Supabase Google Button ── */}
                <button className="gmail-btn" onClick={handleGmail} disabled={loading}>
                  <span style={{ fontSize:20 }}>🔐</span>
                  {loading ? "Redirecting to Google…" : "Continue with Google (@citchennai.net)"}
                </button>
                <p style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:"var(--text3)", textAlign:"center", marginTop:-12, marginBottom:16, lineHeight:1.5 }}>
                  Only <strong style={{ color:"var(--cyan)" }}>@citchennai.net</strong> accounts are permitted.<br/>Domain is verified by both Google and our server.
                </p>
              </>
            )}

            {err && <div className="login-err">⚠️ {err.replace("⚠️ ", "")}</div>}

            <p style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:"var(--text3)", textAlign:"center", marginTop:24, lineHeight:1.6, textTransform:"uppercase" }}>
              {isAdminMode ? "Admin actions are securely logged." : "Under Chennai Institute of Technology"}<br/>
              <a href="https://akdev-official.vercel.app/" target="_blank" style={{ color:"var(--cyan)", textDecoration:"none", marginTop:4, display:"inline-block", fontWeight:700 }}>By AKDEV Labs</a>
            </p>
            <button onClick={onClose} style={{ display:"block", margin:"16px auto 0", fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase" }}>✕ Close</button>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // FILTER SHEET
    // ══════════════════════════════════════════════════
    function FilterSheet({ onClose, shops, currentFilters, setCurrentFilters }) {
      const [sec, setSec] = useState("Sort");
      const handleSort   = s => setCurrentFilters(p => ({ ...p, sort:s }));
      const handleRating = r => setCurrentFilters(p => ({ ...p, minStar:p.minStar === r ? 0 : r }));
      const handleType   = t => { if (t === 'veg') setCurrentFilters(p => ({ ...p, veg:!p.veg, nonveg:false })); else if (t === 'nonveg') setCurrentFilters(p => ({ ...p, nonveg:!p.nonveg, veg:false })); else setCurrentFilters(p => ({ ...p, veg:false, nonveg:false })); };
      const handleAvail  = () => setCurrentFilters(p => ({ ...p, avail:!p.avail }));
      const handleShop   = sId => setCurrentFilters(p => ({ ...p, shops:p.shops.includes(sId) ? p.shops.filter(x => x !== sId) : [...p.shops, sId] }));
      const handleBudget = val => setCurrentFilters(p => ({ ...p, budget:[0, parseInt(val)] }));
      const clearAll = () => setCurrentFilters({ veg:false, nonveg:false, avail:false, budget:[0,999], minStar:0, shops:[], sort:"relevance" });
      const activeCount = Object.values(currentFilters).filter(v => v === true || v > 0 || (Array.isArray(v) && v.length > 0 && v[1] !== 999)).length;

      const renderRightPanel = () => {
        switch (sec) {
          case "Sort": return [{ label:"Relevance",val:"relevance" },{ label:"Rating (High to Low)",val:"rating" },{ label:"Price (Low to High)",val:"priceLow" },{ label:"Price (High to Low)",val:"priceHigh" },{ label:"Trending First",val:"trending" }].map(o => (<div key={o.val} className="fo" onClick={() => handleSort(o.val)}><div className="fo-lbl">{o.label}</div><div className={`fo-chk${currentFilters.sort === o.val ? " on" : ""}`}>{currentFilters.sort === o.val && "✓"}</div></div>));
          case "Rating": return [4.5,4.0,3.5,3.0,2.0].map(r => (<div key={r} className="fo" onClick={() => handleRating(r)}><div className="fo-lbl">★ {r}+ Stars</div><div className={`fo-chk${currentFilters.minStar === r ? " on" : ""}`}>{currentFilters.minStar === r && "✓"}</div></div>));
          case "Type": return [{ label:"🥦 Veg Only",val:"veg",active:currentFilters.veg },{ label:"🍗 Non-Veg Only",val:"nonveg",active:currentFilters.nonveg },{ label:"Both",val:"both",active:!currentFilters.veg && !currentFilters.nonveg }].map(o => (<div key={o.val} className="fo" onClick={() => handleType(o.val)}><div className="fo-lbl">{o.label}</div><div className={`fo-chk${o.active ? " on" : ""}`}>{o.active && "✓"}</div></div>));
          case "Availability": return (<div className="fo" onClick={handleAvail}><div className="fo-lbl">🟢 Available Now</div><div className={`fo-chk${currentFilters.avail ? " on" : ""}`}>{currentFilters.avail && "✓"}</div></div>);
          case "Price Range": return (<div style={{ padding:"20px 0" }}><div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}><span style={{ fontSize:14 }}>₹0</span><span style={{ fontSize:16, fontWeight:800, color:'var(--cyan)' }}>₹{currentFilters.budget[1] >= 999 ? 'Any' : currentFilters.budget[1]}</span></div><input type="range" min="20" max="250" step="10" value={currentFilters.budget[1] >= 999 ? 250 : currentFilters.budget[1]} onChange={e => handleBudget(e.target.value >= 250 ? 999 : e.target.value)} style={{ width:'100%', accentColor:'var(--cyan)' }} /><p style={{ fontSize:11, color:'var(--text3)', marginTop:10 }}>Drag to set maximum price</p></div>);
          case "Shops": return shops.map(s => (<div key={s.id} className="fo" onClick={() => handleShop(s.id)}><div className="fo-lbl">{s.name}</div><div className={`fo-chk${currentFilters.shops.includes(s.id) ? " on" : ""}`}>{currentFilters.shops.includes(s.id) && "✓"}</div></div>));
          default: return null;
        }
      };

      return (
        <div className="overlay" onClick={e => { if (e.target.className === "overlay") onClose(); }}>
          <div className="filter-sheet" style={{ width:"100%", maxWidth:480, position:'relative' }} onClick={e => e.stopPropagation()}>
            <button onClick={onClose} style={{ position:'absolute', top:16, right:16, width:30, height:30, borderRadius:15, background:'var(--card)', color:'var(--text)', border:'1px solid var(--border)', fontSize:12, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', zIndex:100, fontWeight:'bold' }}>✕</button>
            <div className="drag-handle" />
            <div className="fs-hdr"><div className="fs-title">Filters {activeCount > 0 && <span style={{ fontSize:12, background:"var(--cyan)", color:"#000", borderRadius:12, padding:"2px 8px", marginLeft:8 }}>{activeCount}</span>}</div><button style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:"var(--cyan)", fontWeight:700, textTransform:"uppercase" }} onClick={clearAll}>Clear All</button></div>
            <div className="fs-body">
              <div className="fs-left">{["Sort","Type","Price Range","Rating","Availability","Shops"].map(s => { let dot = false; if (s === "Type" && (currentFilters.veg || currentFilters.nonveg)) dot=true; if (s === "Price Range" && currentFilters.budget[1] < 999) dot=true; if (s === "Rating" && currentFilters.minStar > 0) dot=true; if (s === "Availability" && currentFilters.avail) dot=true; if (s === "Shops" && currentFilters.shops.length > 0) dot=true; if (s === "Sort" && currentFilters.sort !== "relevance") dot=true; return (<div key={s} className={`fs-left-item${sec === s ? " on" : ""}`} onClick={() => setSec(s)}>{s}{dot && <span style={{ color:"var(--cyan)", marginLeft:6, fontSize:10 }}>●</span>}</div>); })}</div>
              <div className="fs-right">{renderRightPanel()}</div>
            </div>
            <div className="fs-footer"><button className="fs-apply" onClick={onClose}>Close Filters</button></div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // HOME SCREEN
    // ══════════════════════════════════════════════════
    function HomeScreen({ foods, shops, wishlist, onWish, onOpenFood, onNA, userNA, onRequireLogin, isLoggedIn, filterOpen, setFilterOpen, appSettings, setTab, setCurrentFilters, onAddToCart }) {
      const [qf, setQf] = useState("all");
      const [search, setSearch] = useState("");
      const [loading, setLoading] = useState(true);
      const slot = getSlot();
      const cfg  = SLOT_CFG[slot];
      useEffect(() => { const t = setTimeout(() => setLoading(false), 600); return () => clearTimeout(t); }, []);

      const sortedFoods = useMemo(() => {
        let f = [...foods];
        if (search) f = f.filter(x => x.name?.toLowerCase().includes(search.toLowerCase()) || x.shop?.toLowerCase().includes(search.toLowerCase()) || x.category?.toLowerCase().includes(search.toLowerCase()));
        if (qf === "under50") f = f.filter(x => x.price !== null && x.price <= 50);
        if (qf === "veg") f = f.filter(x => x.isVeg);
        if (qf === "nonveg") f = f.filter(x => !x.isVeg);
        if (qf === "avail") f = f.filter(x => isAvailNow(x));
        if (qf === "summer") f = f.filter(x => x.price !== null && x.price <= 80 && /juice|shake|ice|jigarthanda|mojito|falooda|cool/i.test(x.name));
        if (qf === "top") f = [...f].sort((a, b) => b.rating - a.rating);
        const userNASet = new Set(userNA);
        f.sort((a, b) => { const aN = userNASet.has(a.id) ? 1 : 0; const bN = userNASet.has(b.id) ? 1 : 0; if (aN !== bN) return aN - bN; const aA = a.adminStatus === "not_available" ? 1 : 0; const bA = b.adminStatus === "not_available" ? 1 : 0; return aA - bA; });
        return f;
      }, [foods, qf, search, userNA]);

      const trending  = sortedFoods.filter(f => f.isTrending && !userNA.includes(f.id));
      const others    = sortedFoods.filter(f => !f.isTrending && !userNA.includes(f.id)).slice(0, 20);
      const movedDown = sortedFoods.filter(f => userNA.includes(f.id));

      return (
        <div className="screen fi">
          {appSettings.maintenance && <div className="maint-banner" style={{ margin:"14px 20px 0" }}><p>🚧 Site is currently under maintenance. Admin access only.</p></div>}
          {appSettings.maintenanceBanner && !appSettings.maintenance && <div className="maint-banner" style={{ margin:"14px 20px 0", background:"rgba(255,107,53,.08)", borderColor:"var(--orange)" }}><p style={{ color:"var(--orange)" }}>{appSettings.maintenanceBannerText || "🚧 Minor updates in progress."}</p></div>}
          <div className="search-wrap"><div className="sbox"><span style={{ fontSize:16, color:"var(--text3)" }}>🔍</span><input placeholder={`Search '${appSettings.searchPlaceholder || "rolls, dosa, juice"}'`} value={search} onChange={e => setSearch(e.target.value)} />{search && <button style={{ fontSize:16, color:"var(--text3)" }} onClick={() => setSearch("")}>✕</button>}</div></div>
          {!search && <div className="tb-banner fi-2"><div className="tbb-emo">{cfg.e}</div><div className="tbb-body"><strong>{cfg.t}</strong><p>{cfg.s}</p><div className="tbb-chips">{cfg.chips.map(c => <div key={c} className="tbb-chip" onClick={() => setSearch(c)} style={{ cursor:'pointer' }}>{c}</div>)}</div></div></div>}
          {!search && !loading && <div className="stats-row fi-3"><div className="stat-card" onClick={() => setTab("explore")} style={{ cursor:'pointer' }}><span className="stat-val" style={{ color:'var(--cyan)' }}>{shops.length}</span><span className="stat-lbl">Shops</span></div><div className="stat-card" onClick={() => setTab("explore")} style={{ cursor:'pointer' }}><span className="stat-val" style={{ color:'var(--green)' }}>{shops.filter(s => s.queue === 'free').length}</span><span className="stat-lbl">Free Queue</span></div><div className="stat-card" onClick={() => setTab("explore")} style={{ cursor:'pointer' }}><span className="stat-val" style={{ color:'var(--orange)' }}>{foods.length}+</span><span className="stat-lbl">Items</span></div></div>}
          <div className="qfrow fi-4">{[["all","All"],["summer","☀️ Summer"],["under50","💸 Under ₹50"],["veg","🥦 Veg"],["nonveg","🍗 Non-Veg"],["avail","🟢 Available"],["top","⭐ Top Rated"]].map(([k,l]) => (<div key={k} className={`qfc${qf === k ? " on" : ""}`} onClick={() => setQf(qf === k ? "all" : k)}>{l}</div>))}</div>
          {!loading && (appSettings.showTrending !== false) && <><div className="sec-hdr" style={{ paddingBottom:4 }}><div className="sec-title">🔥 {search ? "Results" : qf === "top" ? "Top Rated" : appSettings.trendingTitle || "Recommended For You"}</div><button className="sec-more">See all</button></div><div style={{ padding:"0 20px 12px", fontSize:11, color:"var(--text3)", fontStyle:"italic" }}>{search ? "Here's what we found 😋" : "Hand-picked & fresh 🤤"}</div>{trending.length === 0 && others.length === 0 ? <div className="empty-state"><span className="es-ico">🍽️</span><h3>Nothing Found</h3><p>Try different filters or search terms</p></div> : <div className="food-scroll">{trending.map(f => <FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn} onAddToCart={onAddToCart} />)}</div>}</>}
          {loading && <div className="food-scroll">{[1,2,3].map(i => <div key={i} className="skel skel-card" />)}</div>}
          {!loading && !search && (appSettings.showMostOrdered !== false) && others.length > 0 && <><div className="sec-hdr" style={{ paddingBottom:4 }}><div className="sec-title">🍽️ {appSettings.mostOrderedTitle || "Most Ordered"}</div><button className="sec-more">See all</button></div><div className="food-scroll">{others.map(f => <FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn} onAddToCart={onAddToCart} />)}</div></>}
          {movedDown.length > 0 && <><div className="sec-hdr"><div className="sec-title" style={{ fontSize:14, color:"var(--text3)", fontWeight:600 }}>Moved to Bottom</div></div><div className="food-scroll">{movedDown.map(f => <FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={() => {}} userNA={true} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn} onAddToCart={onAddToCart} />)}</div></>}
          {!loading && !search && <><div style={{ height:1, background:"var(--border)", margin:"10px 20px 20px" }} /><div className="sec-hdr" style={{ paddingBottom:4 }}><div className="sec-title">🏪 Campus Shops</div></div><div className="shops-row">{shops.map(s => (<div key={s.id} className="shop-card" onClick={() => { if (setCurrentFilters) { setCurrentFilters(prev => ({ ...prev, shops:[s.id] })); setTab("explore"); } }}><div className="shop-img" style={{ background:s.gradient }}>{s.emoji}</div><div className="shop-info"><div className="shop-name">{s.name}</div><div className="shop-meta"><span className="shop-rat">★{s.rating}</span>{s.cuisine?.split("·")[0]}</div><div style={{ marginTop:8 }}>{s.isOpen === false ? <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700, padding:"4px 8px", borderRadius:10, background:"rgba(239,71,111,.1)", color:"var(--red)" }}>🔴 CLOSED</span> : <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700, padding:"4px 8px", borderRadius:10, background:s.queue === "free" ? "rgba(0,214,143,.12)" : "rgba(255,107,53,.1)", color:s.queue === "free" ? "var(--green)" : "var(--orange)" }}>{s.queue === "free" ? "🟢 FREE" : "🟡 BUSY"}</span>}</div></div></div>))}</div></>}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // EXPLORE SCREEN
    // ══════════════════════════════════════════════════
    function ExploreScreen({ foods, shops, wishlist, onOpenFood, onNA, userNA, onRequireLogin, isLoggedIn, recentlyViewed, filterOpen, setFilterOpen, currentFilters, setCurrentFilters, onAddToCart }) {
      const [search, setSearch] = useState("");
      const updateFilter = (key, val) => { setCurrentFilters(prev => { if (key === 'veg') return { ...prev, veg:!prev.veg, nonveg:false }; if (key === 'nonveg') return { ...prev, nonveg:!prev.nonveg, veg:false }; if (key === 'clear') return { veg:false, nonveg:false, avail:false, budget:[0,999], minStar:0, shops:[], sort:"relevance" }; return { ...prev, [key]:val }; }); };
      const removeShopFilter = shopIdOrName => setCurrentFilters(prev => ({ ...prev, shops:prev.shops.filter(s => s !== shopIdOrName) }));

      const results = useMemo(() => {
        let f = [...foods];
        if (search) f = f.filter(x => x.name?.toLowerCase().includes(search.toLowerCase()) || x.shop?.toLowerCase().includes(search.toLowerCase()) || x.category?.toLowerCase().includes(search.toLowerCase()));
        if (currentFilters.veg) f = f.filter(x => x.isVeg);
        if (currentFilters.nonveg) f = f.filter(x => !x.isVeg);
        if (currentFilters.avail) f = f.filter(x => isAvailNow(x) && !userNA.includes(x.id));
        if (currentFilters.budget[1] < 999) f = f.filter(x => x.price !== null && x.price <= currentFilters.budget[1]);
        if (currentFilters.minStar > 0) f = f.filter(x => x.rating >= currentFilters.minStar);
        if (currentFilters.shops.length > 0) f = f.filter(x => currentFilters.shops.includes(x.shop) || currentFilters.shops.includes(x.shopId));
        if (currentFilters.sort === "rating") f.sort((a, b) => b.rating - a.rating);
        else if (currentFilters.sort === "priceLow") f.sort((a, b) => (a.price || 999) - (b.price || 999));
        else if (currentFilters.sort === "priceHigh") f.sort((a, b) => (b.price || 0) - (a.price || 0));
        else if (currentFilters.sort === "trending") f.sort((a, b) => (b.isTrending === a.isTrending ? 0 : b.isTrending ? 1 : -1));
        else { const userNASet = new Set(userNA); f.sort((a, b) => { const aN = userNASet.has(a.id) ? 1 : 0; const bN = userNASet.has(b.id) ? 1 : 0; if (aN !== bN) return aN - bN; return b.rating - a.rating; }); }
        return f;
      }, [foods, search, currentFilters, userNA]);

      const rv = recentlyViewed.slice(0, 6).map(id => foods.find(f => f.id === id)).filter(Boolean);
      const activeCount = Object.values(currentFilters).filter(v => v === true || v > 0 || (Array.isArray(v) && v.length > 0 && v[1] !== 999)).length;

      return (
        <div className="screen fi">
          <div className="search-wrap"><div className="sbox"><span style={{ fontSize:16, color:"var(--text3)" }}>🔍</span><input placeholder="Search food, shop, category…" value={search} onChange={e => setSearch(e.target.value)} autoFocus />{search && <button style={{ fontSize:16, color:"var(--text3)" }} onClick={() => setSearch("")}>✕</button>}</div></div>
          <div className="qfrow" style={{ paddingTop:8 }}>
            <div className="qfc" onClick={() => setFilterOpen(true)} style={{ background:'var(--card2)', borderColor:'var(--border2)' }}>🎛 Filters {activeCount > 0 && <span style={{ color:'var(--cyan)', fontWeight:800 }}>({activeCount})</span>}</div>
            {currentFilters.budget[1] < 999 && <div className="qfc on" onClick={() => updateFilter('budget',[0,999])}>₹0 – ₹{currentFilters.budget[1]} ✕</div>}
            {currentFilters.veg && <div className="qfc on" onClick={() => updateFilter('veg',false)}>🥦 Veg ✕</div>}
            {currentFilters.nonveg && <div className="qfc on" onClick={() => updateFilter('nonveg',false)}>🍗 Non-Veg ✕</div>}
            {currentFilters.avail && <div className="qfc on" onClick={() => updateFilter('avail',false)}>🟢 Available Now ✕</div>}
            {currentFilters.minStar > 0 && <div className="qfc on" onClick={() => updateFilter('minStar',0)}>★ {currentFilters.minStar}+ ✕</div>}
            {currentFilters.shops.map(s => <div key={s} className="qfc on" onClick={() => removeShopFilter(s)}>🏪 {s} ✕</div>)}
            {activeCount > 0 && <div className="qfc" onClick={() => updateFilter('clear')} style={{ color:'var(--red)', borderColor:'var(--red)', background:'transparent' }}>✖ Clear All</div>}
          </div>
          {rv.length > 0 && !search && activeCount === 0 && <><div className="sec-hdr" style={{ paddingTop:20 }}><div className="sec-title">🕐 Recently Viewed</div></div><div className="rv-row">{rv.map(f => <div key={f.id} className="rv-chip" onClick={() => { if (!isLoggedIn) { onRequireLogin(); } else { onOpenFood(f); } }}><span className="rv-emo">{f.emoji}</span><div><div className="rv-cn">{f.name}</div><div className="rv-cp">₹{f.price || "?"}</div></div></div>)}</div></>}
          <div className="sec-hdr" style={{ paddingTop:20 }}><div className="sec-title">{search || activeCount > 0 ? "Results" : "All Items"} <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"var(--text3)", fontWeight:500 }}>({results.length})</span></div></div>
          {results.length === 0 ? <div className="empty-state fi"><span className="es-ico">😕</span><h3>No food found</h3><p>Try changing your filters or search terms.</p><button className="add-btn" style={{ marginTop:16, fontSize:14, padding:"10px 20px", width:"auto" }} onClick={() => updateFilter('clear')}>Clear Filters</button></div> : <div className="grid-wrap">{results.map(f => <FoodCard key={f.id} food={f} onOpen={onOpenFood} onNA={onNA} userNA={userNA.includes(f.id)} onRequireLogin={onRequireLogin} isLoggedIn={isLoggedIn} onAddToCart={onAddToCart} />)}</div>}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // WISHLIST SCREEN
    // ══════════════════════════════════════════════════
    function WishlistScreen({ foods, wishlist, onWish, onOpenFood, isLoggedIn, onRequireLogin }) {
      if (!isLoggedIn) return (<div className="screen fi"><div className="empty-state"><span className="es-ico">♡</span><h3>Login to see Wishlist</h3><p>Login with your college email to save and view your wishlist.</p><button className="login-btn" style={{ marginTop:20, width:"auto", padding:"14px 32px", display:"inline-block" }} onClick={onRequireLogin}>Login Now</button></div></div>);
      const items = wishlist.map(id => foods.find(f => f.id === id)).filter(Boolean);
      if (!items.length) return (<div className="screen fi"><div className="empty-state"><span className="es-ico">♡</span><h3>Nothing saved yet</h3><p>Open any food item and tap <strong>"Wishlist"</strong> to save it here.</p></div></div>);
      return (<div className="screen fi"><div className="sec-hdr" style={{ paddingTop:24 }}><div className="sec-title">♥ Saved Items <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"var(--text3)", fontWeight:500 }}>({items.length})</span></div></div>{items.map(f => { const av = isAvailNow(f); return (<div key={f.id} className="wl-item" onClick={() => onOpenFood(f)}><div className="wl-img" style={{ background:f.gradient }}>{f.image ? <img src={f.image} alt={f.name} /> : <span>{f.emoji}</span>}</div><div className="wl-info"><div className="wl-name">{f.name}</div><div className="wl-shop">🏪 {f.shop}</div><div style={{ display:"flex", alignItems:"center" }}><div className="wl-price">{f.price !== null ? `₹${f.price}` : "On visit"}</div><span className={`avail-badge ${av ? "ab-yes" : "ab-no"}`}>{av ? "● Now" : "○ Later"}</span></div></div><button className="wl-del" onClick={e => { e.stopPropagation(); onWish(f.id); }}>✕</button></div>); })}</div>);
    }

    // ══════════════════════════════════════════════════
    // CART SCREEN
    // ══════════════════════════════════════════════════
    function CartScreen({ foods, cart, setCart, onOpenFood, onRequireLogin, isLoggedIn }) {
      if (!isLoggedIn) return (<div className="screen fi"><div className="empty-state"><span className="es-ico">🛒</span><h3>Login to use Cart</h3><p>Login with your college email to add items.</p><button className="login-btn" style={{ marginTop:20, width:"auto", padding:"14px 32px", display:"inline-block" }} onClick={onRequireLogin}>Login Now</button></div></div>);
      const items = cart.map(c => ({ ...foods.find(f => f.id === c.foodId), qty:c.qty })).filter(f => f.id);
      const total = items.reduce((acc, obj) => acc + ((obj.price || 0) * obj.qty), 0);
      const updateQty = (id, delta) => { setCart(prev => { let np = [...prev]; const idx = np.findIndex(x => x.foodId === id); if (idx >= 0) { np[idx].qty += delta; if (np[idx].qty <= 0) np.splice(idx,1); } return np; }); };
      if (!items.length) return (<div className="screen fi"><div className="empty-state"><span className="es-ico">🛒</span><h3>Your cart is empty</h3><p>Explore shops and add items to your cart.</p></div></div>);
      return (
        <div className="screen fi" style={{ paddingBottom:150 }}>
          <div className="sec-hdr" style={{ paddingTop:24 }}><div className="sec-title">🛒 Your Cart <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color:"var(--text3)", fontWeight:500 }}>({items.length})</span></div></div>
          {items.map(f => (<div key={f.id} className="wl-item" style={{ cursor:"default" }}><div className="wl-img" style={{ background:f.gradient }} onClick={() => onOpenFood(f)}>{f.image ? <img src={f.image} alt={f.name} /> : <span>{f.emoji}</span>}</div><div className="wl-info"><div className="wl-name">{f.name}</div><div className="wl-shop">🏪 {f.shop}</div><div className="wl-price">{f.price !== null ? `₹${f.price}` : "On visit"}</div></div><div style={{ display:"flex", alignItems:"center", gap:10, background:"var(--card2)", borderRadius:12, padding:"4px 8px", border:"1px solid var(--border2)" }}><button onClick={() => updateQty(f.id,-1)} style={{ fontSize:16, width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--text2)", border:'none', background:'transparent' }}>-</button><div style={{ fontSize:13, fontWeight:800, width:16, textAlign:"center" }}>{f.qty}</div><button onClick={() => updateQty(f.id,1)} style={{ fontSize:15, width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--cyan)", border:'none', background:'transparent' }}>+</button></div></div>))}
          <div style={{ position:"fixed", bottom:85, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:1200, padding:"0 20px", zIndex:90 }}><div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:20, padding:16, boxShadow:"var(--shadow)" }}><div style={{ display:"flex", justifyContent:"space-between", marginBottom:12, fontSize:16, fontWeight:800 }}><span>Total Amount:</span><span style={{ color:"var(--cyan)" }}>₹{total}</span></div><button className="login-btn" onClick={() => alert("Checkout flow is a placeholder!")} style={{ width:"100%", padding:14 }}>Proceed to Checkout →</button></div></div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // AI SCREEN
    // ══════════════════════════════════════════════════
    function AIScreen({ foods, wishlist, onAddWish, isLoggedIn, onRequireLogin, currentUser }) {
      const [budget, setBudget] = useState("");
      const [mood, setMood] = useState("any");
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [ran, setRan] = useState(false);
      const slot = getSlot();

      if (!isLoggedIn) return (<div className="screen fi"><div className="empty-state"><span className="es-ico">🤖</span><h3>Login to use AI</h3><p>Login with your college email to get personalized food recommendations.</p><button className="login-btn" style={{ marginTop:20, width:"auto", padding:"14px 32px", display:"inline-block" }} onClick={onRequireLogin}>Login Now</button></div></div>);

      const SLOT_BOOST = { morning:["South Indian","Snacks","Drinks"], lunch:["North Indian","South Indian","Meals"], evening:["Drinks","Chaats","Desserts"], night:["Snacks","Fast Food"] };
      const MOOD_CATS  = { any:null, snacks:["Snacks","Fast Food"], meals:["North Indian","South Indian","Meals","Chinese"], drinks:["Drinks"], chaats:["Chaats"], desserts:["Desserts"], veg:null };

      async function run() {
        setLoading(true); setRan(true);
        const b = parseInt(budget) || 999;
        const moodCats  = MOOD_CATS[mood];
        const boostCats = SLOT_BOOST[slot] || [];
        let candidates  = [...foods].filter(f => f.adminStatus === "available");
        if (b < 999) candidates = candidates.filter(f => f.price !== null && f.price <= b);
        if (moodCats)  candidates = candidates.filter(f => moodCats.includes(f.category));
        if (mood === "veg") candidates = candidates.filter(f => f.isVeg);
        candidates = candidates.map(f => { let sc = f.rating * 2; if (boostCats.includes(f.category)) sc += 2; if (isAvailNow(f)) sc += 1; if (f.isTrending) sc += 1.5; if (f.notAvailableCount === 0) sc += 0.5; return { ...f, sc }; }).sort((a, b) => b.sc - a.sc).slice(0, 3);
        const reasons = {};
        try {
          const ctx = `CIT campus. Time: ${slot}. Student: ${currentUser?.name}. Budget: ₹${b}. Mood: ${mood}.\nCandidates:\n${candidates.map(f => `${f.name} ₹${f.price || "on visit"} from ${f.shop} (${f.category}, ${f.rating}★, ${isAvailNow(f) ? "available now" : "check timing"})`).join("\n")}`;
          const r = await fetch("https://api.anthropic.com/v1/messages", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400, system:'For each food item, write one very short friendly recommendation sentence (max 10 words). Be specific. Return only valid JSON: {"item name":"reason"}', messages:[{ role:"user", content:ctx }] }) });
          const d = await r.json();
          const txt = d.content?.[0]?.text || "{}";
          Object.assign(reasons, JSON.parse(txt.replace(/```json|```/g,"").trim()));
        } catch { const fb = { morning:"Perfect light morning pick — fresh and affordable", lunch:"Best value filling meal for lunch right now", evening:"Ideal evening special — don't miss it today", night:"One of few available options at this hour" }; candidates.forEach(f => { reasons[f.name] = fb[slot]; }); }
        setResults(candidates.map(f => ({ ...f, reason:reasons[f.name] || `Rated ${f.rating}★ · ${isAvailNow(f) ? "Available now" : "Check availability"}` })));
        setLoading(false);

          {loading && [1,2,3].map(i => <div key={i} className="skel" style={{ height:140, margin:"0 20px 14px", borderRadius:18 }} />)}
          {!loading && ran && results.length === 0 && <div className="empty-state"><span className="es-ico">😕</span><h3>No matches</h3><p>Try a higher budget or different mood</p></div>}

      function updateFeedbackStatus(id, status) { db.collection("feedback").doc(id).update({ status }).then(() => showNotif(`✓ Marked as ${status}`)); }
      function deleteFeedback(id) { db.collection("feedback").doc(id).delete().then(() => showNotif("✓ Feedback deleted")); }
      function deleteReview(foodId, reviewId) { if (confirm("Are you sure you want to delete this review?")) { const food = foods.find(f => f.id === foodId); if (food) { const rev = (food.reviews || []).find(r => r.id === reviewId); if (rev) { db.collection("foods").doc(foodId).update({ reviews:firebase.firestore.FieldValue.arrayRemove(rev) }).then(() => showNotif("🗑️ Review deleted")); } } } }

      const TABS = [["overview","📊 Overview"],["foods","🍔 Foods"],["shops","🏪 Shops"],["reviews","💬 Reviews"],["feedback","📝 Feedback"],["settings","⚙️ Settings"],["json","📦 JSON"]];

              {filteredFoods.slice(0,20).map(f => (<div key={f.id} className="ad-food-row"><div className="ad-food-emo" style={{ background:f.gradient, borderRadius:12 }}><span style={{ fontSize:24 }}>{f.emoji}</span></div><div className="ad-food-info"><div className="ad-food-name">{f.name}</div><div className="ad-food-meta">₹{f.price || "?"} · ★{f.rating} · {f.shop} · {f.notAvailableCount > 0 ? `⚠️${f.notAvailableCount}` : ""}</div><div className="avail-sel" style={{ marginTop:8 }}><div style={{ fontSize:8, color:"var(--text3)", width:"100%", marginBottom:2 }}>Force Override:</div>{[["available","✓ Force Avail","on-green"],["likely_unavailable","⚠️ Likely Out","on-yellow"],["not_available","✗ Force NA","on-red"]].map(([v,l,c]) => (<span key={v} className={`avs${f.adminStatus === v ? " "+c : ""}`} onClick={() => updateFoodAvailability(f.id,v)}>{l}</span>))}</div></div><div className="ad-food-actions" style={{ flexDirection:"column", gap:6 }}><button className="ad-btn primary" onClick={() => setEditFood(f)}>✏️ Edit</button>{f.notAvailableCount > 0 && <button className="ad-btn yellow" onClick={() => resetNACount(f.id)}>🔄 Reset User Flags</button>}<button className="ad-btn" style={{ color:"var(--red)" }} onClick={() => { if (confirm(`PERMANENTLY Delete ${f.name}?`)) { db.collection("foods").doc(f.id).delete().then(() => showNotif("✓ Food deleted from cloud")); } }}>🗑️ Del</button></div></div>))}

              <div className="ad-section-title">Localization / Text Customization</div>
              <div style={{ background:"var(--card)", border:"1px solid var(--border)", borderRadius:16, padding:"16px 20px", marginBottom:20 }}>

              <div style={{ height:24 }} />

          </div>

          {editFood && (<div className="overlay" onClick={e => { if (e.target.className === "overlay") setEditFood(null); }}><div className="sheet" style={{ maxHeight:"85vh", position:'relative' }} onClick={e => e.stopPropagation()}><button onClick={() => setEditFood(null)} style={{ position:'absolute', top:16, right:16, width:30, height:30, borderRadius:15, background:'var(--card)', color:'var(--text)', border:'1px solid var(--border)', fontSize:12, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', zIndex:100, fontWeight:'bold' }}>✕</button><div className="drag-handle" /><div style={{ padding:"20px 24px 30px" }}><div style={{ fontSize:20, fontWeight:800, marginBottom:20 }}>Edit: {editFood.name}</div><div style={{ marginBottom:14 }}><label style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", display:"block", marginBottom:6 }}>Food Image (URL)</label><input type="text" className="a-inp" style={{ marginBottom:0 }} placeholder="https://..." value={editFood.image || ""} onChange={e => setEditFood(p => ({ ...p, image:e.target.value }))} /></div>{[["name","Food Name","text"],["price","Price (₹)","number"],["category","Category","text"],["time","Available Time","text"],["desc","Description","text"],["emoji","Emoji Fallback","text"]].map(([k,label,type]) => (<div key={k} style={{ marginBottom:14 }}><label style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", display:"block", marginBottom:6 }}>{label}</label><input type={type} className="a-inp" style={{ marginBottom:0, fontSize:16 }} value={editFood[k] || ""} onChange={e => setEditFood(p => ({ ...p, [k]:type === "number" ? parseFloat(e.target.value) || 0 : e.target.value }))} /></div>))}<div style={{ marginBottom:14 }}><label style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", display:"block", marginBottom:6 }}>Dietary Type</label><div style={{ display:"flex", gap:10 }}><span className={`avs${editFood.isVeg ? " on-green" : ""}`} onClick={() => setEditFood(p => ({ ...p, isVeg:true }))}>🥦 Veg</span><span className={`avs${!editFood.isVeg ? " on-red" : ""}`} onClick={() => setEditFood(p => ({ ...p, isVeg:false }))}>🍗 Non-Veg</span></div></div><div style={{ marginBottom:14 }}><label style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:"var(--text3)", textTransform:"uppercase", display:"block", marginBottom:6 }}>App Placement</label><div style={{ display:"flex", gap:10 }}><span className={`avs${editFood.isTrending ? " on-green" : ""}`} onClick={() => setEditFood(p => ({ ...p, isTrending:true }))}>🔥 Trending</span><span className={`avs${!editFood.isTrending ? " on-red" : ""}`} onClick={() => setEditFood(p => ({ ...p, isTrending:false }))}>Normal List</span></div></div><div style={{ display:"flex", gap:12, marginTop:24 }}><button style={{ flex:1, padding:"14px", background:"none", border:"2px solid var(--border2)", borderRadius:14, color:"var(--text)", fontWeight:700 }} onClick={() => setEditFood(null)}>Discard</button><button style={{ flex:1, padding:"14px", background:"var(--cyan)", color:"#000", border:"none", borderRadius:14, fontWeight:800 }} onClick={() => { setFoods(prev => { const exist = prev.some(x => x.id === editFood.id); if (exist) return prev.map(x => x.id === editFood.id ? editFood : x); return [editFood,...prev]; }); db.collection("foods").doc(editFood.id).set(editFood).then(() => { setEditFood(null); showNotif("✓ Cloud Database updated!"); }).catch(() => { setEditFood(null); showNotif("✓ Saved locally"); }); }}>Commit Changes</button></div></div></div></div>)}
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    // APP ROOT
    // ══════════════════════════════════════════════════
    function App() {
      const [theme, setTheme] = useLS("cit_theme", "dark");
      const [tab, setTab]     = useState("home");

      const [foods, setFoods]   = useLS("cit_local_foods", INIT_FOODS);
      const [shops, setShops]   = useLS("cit_local_shops", INIT_SHOPS);
      const [feedback, setFeedback] = useState([]);

      const [appSettings, setAppSettings] = useState({
        maintenance:false, maintenanceBanner:false, maintenanceBannerText:"🚧 Minor updates in progress.",
        showTrending:true, showMostOrdered:true, appName:"CIT Food Finder",
        trendingTitle:"Recommended For You", mostOrderedTitle:"Most Ordered", searchPlaceholder:"rolls, dosa, juice"
      });

      const [wishlist, setWishlist]           = useLS("cit_wl", []);
      const [cart, setCart]                   = useLS("cit_cart", []);
      const [userNA, setUserNA]               = useLS("cit_na_v4", []);
      const [recentlyViewed, setRV]           = useLS("cit_rv", []);
      const [openFood, setOpenFood]           = useState(null);
      const [loginOpen, setLoginOpen]         = useState(false);
      const [filterOpen, setFilterOpen]       = useState(false);
      const [themeOpen, setThemeOpen]         = useState(false);
      const [supportOpen, setSupportOpen]     = useState(false);
      const [currentUser, setCurrentUser]     = useLS("cit_user", null);
      const [adminSession, setAdminSession]   = useLS("cit_admin_session", null);
      const [viewAdminDash, setViewAdminDash] = useState(!!adminSession);
      const [notif, setNotif]                 = useState("");
      const [showDropdown, setShowDropdown]   = useState(false);
      const [currentFilters, setCurrentFilters] = useLS("cit_filters_v2", { veg:false, nonveg:false, avail:false, budget:[0,999], minStar:0, shops:[], sort:"relevance" });

      // ── SUPABASE AUTH GATEKEEPER ──────────────────
      // Wires the session listener; runs INIT functions on verified login
      useSupabaseAuth(
        (user) => {
          setCurrentUser(user);
          setNotif(`Welcome ${user.name.split(" ")[0]} 👋`);
          // Firestore listeners already initialised in the useEffect below,
          // so init shop / food data syncs automatically on session restore.
        },
        () => {
          setCurrentUser(null);
        }
      );
      // ── END GATEKEEPER ────────────────────────────

      // Firestore realtime sync (unchanged)
      useEffect(() => {
        const unsubFoods = db.collection("foods").onSnapshot(snap => {
          if (snap.empty) { INIT_FOODS.forEach(f => db.collection("foods").doc(f.id).set(f)); }
          else { setFoods(snap.docs.map(doc => ({ id:doc.id, ...doc.data() }))); }
        }, err => console.log("Firebase Foods Sync Error:", err));
        const unsubShops = db.collection("shops").onSnapshot(snap => {
          if (snap.empty) { INIT_SHOPS.forEach(s => db.collection("shops").doc(s.id).set(s)); }
          else { setShops(snap.docs.map(doc => ({ id:doc.id, ...doc.data() }))); }
        }, err => console.log("Firebase Shops Sync Error:", err));
        const unsubFeedback = db.collection("feedback").onSnapshot(snap => {
          setFeedback(snap.docs.map(doc => ({ id:doc.id, ...doc.data() })));
        }, err => console.log("Firebase Feedback Sync Error:", err));
        const unsubSettings = db.collection("settings").doc("global").onSnapshot(doc => {
          if (doc.exists) { setAppSettings(doc.data()); }
          else { db.collection("settings").doc("global").set(appSettings); }
        }, err => console.log("Firebase Settings Sync Error:", err));
        return () => { unsubFoods(); unsubShops(); unsubFeedback(); unsubSettings(); };
      }, []);

      useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);

      useEffect(() => {
        const handlePopState = () => {
          if (openFood)   setOpenFood(null);
          if (loginOpen)  setLoginOpen(false);
          if (filterOpen) setFilterOpen(false);
          if (themeOpen)  setThemeOpen(false);
          if (supportOpen) setSupportOpen(false);
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, [openFood, loginOpen, filterOpen, themeOpen, supportOpen]);

      useEffect(() => {
        const closeDD = e => { if (showDropdown && !e.target.closest('.user-avatar-container')) setShowDropdown(false); };
        document.addEventListener('click', closeDD);
        return () => document.removeEventListener('click', closeDD);
      }, [showDropdown]);

      // Sync wishlist/cart to Firestore when user is logged in
      useEffect(() => {
        if (!currentUser?.uid) return;
        db.collection("userProfiles").doc(currentUser.uid).get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            if (data.wishlist) setWishlist(prev => [...new Set([...prev, ...data.wishlist])]);
            if (data.cart) { setCart(prev => { const m = [...prev]; data.cart.forEach(ci => { if (!m.some(x => x.foodId === ci.foodId)) m.push(ci); }); return m; }); }
          }
        }).catch(err => console.log("User Sync Fetch Error:", err));
      }, [currentUser?.uid]);

      useEffect(() => {
        if (!currentUser?.uid) return;
        db.collection("userProfiles").doc(currentUser.uid).set({ cart, wishlist, name:currentUser.name, updatedAt:new Date().toISOString() }, { merge:true }).catch(err => console.log("Firebase Sync Save Error:", err));
      }, [cart, wishlist, currentUser]);

      const handleRequireLogin = () => { window.history.pushState({ modal:'login' }, ''); setLoginOpen(true); };
      const handleAdminLogin   = user => { setAdminSession(user); setViewAdminDash(true); setLoginOpen(false); setNotif(`Admin Access Granted 🛡️`); };

      const handleLogout = async () => {
        if (confirm("Are you sure you want to logout?")) {
          await supabase.auth.signOut();          // Supabase session clear
          setCurrentUser(null);
          setAdminSession(null);
          setViewAdminDash(false);
          setWishlist([]); setCart([]); setUserNA([]);
          localStorage.removeItem('cit_user');
          localStorage.removeItem('cit_admin_session');
          setShowDropdown(false);
          setNotif("Logged out successfully 👋");
        }
      };

      const handleOpenFood = food => {
        setRV(rv => { const n = rv.filter(x => x !== food.id); return [food.id, ...n].slice(0, 10); });
        window.history.pushState({ modal:'food' }, '');
        setOpenFood(food);
      };

      const handleNA = (id, e) => {
        if (e) e.stopPropagation();
        setUserNA(prev => prev.includes(id) ? prev : [...prev, id]);
        setFoods(prev => prev.map(f => { if (f.id !== id) return f; const newCount = f.notAvailableCount + 1; return { ...f, notAvailableCount:newCount, adminStatus:f.adminStatus === "available" && newCount >= NA_THRESHOLD ? "likely_unavailable" : f.adminStatus }; }));
        setNotif("Noted! Item moved to bottom for you.");
      };

      const handleWish = (id, e) => {
        if (e) e.stopPropagation();
        if (!currentUser) { handleRequireLogin(); return; }
        setWishlist(prev => { const isSaved = prev.includes(id); const newList = isSaved ? prev.filter(x => x !== id) : [...prev, id]; setNotif(isSaved ? "Removed from wishlist" : "♥ Added to wishlist"); return newList; });
      };

      const handleAddToCart = id => {
        setCart(prev => { const exists = prev.find(x => x.foodId === id); if (exists) return prev.map(x => x.foodId === id ? { ...x, qty:x.qty+1 } : x); return [...prev, { foodId:id, qty:1 }]; });
        setNotif("🛒 Added to cart!");
      };

      const handleSubmitReview = (foodId, review) => {
        db.collection("foods").doc(foodId).update({ reviews:firebase.firestore.FieldValue.arrayUnion(review) });
      };

      const handleSupportSubmit = (msg, type) => {
        const now = new Date();
        const cleanTimestamp = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
        const sheetBestPayload = { ID:"cit_"+Date.now(), SiteName:"CIT Food Finder", Type:type, Name:currentUser?.name || "Guest Student", Email:currentUser?.email || "N/A", Rating:"N/A", Message:msg, Timestamp:cleanTimestamp, Status:"Pending" };
        setNotif("Sending to Central Hub...");
        fetch('https://api.sheetbest.com/sheets/7545ab4f-83a2-4105-9cdf-6d94ffe4ef27', { method:'POST', headers:{ 'Accept':'application/json', 'Content-Type':'application/json' }, body:JSON.stringify(sheetBestPayload) })
          .then(r => { if (!r.ok) throw new Error('SheetBest error'); return r.json(); })
          .then(() => {
            setNotif("✓ Feedback sent successfully!");
            const newFb = { id:Date.now().toString(), user:currentUser?.name || "Guest Student", text:`[${type}] ${msg}`, time:cleanTimestamp, status:"pending" };
            db.collection("feedback").doc(newFb.id).set(newFb);
          })
          .catch(err => { console.error('SheetBest Error:', err); setNotif("✖ Error sending feedback. Try again."); });
      };

      // Maintenance gate
      if (appSettings.maintenance && !viewAdminDash && !adminSession) return (
        <div style={{ height:"100dvh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, background:"var(--bg)", textAlign:"center" }}>
          <div style={{ fontSize:64, marginBottom:20 }}>🚧</div>
          <div style={{ fontSize:24, fontWeight:800, marginBottom:12 }}>Site Under Maintenance</div>
          <div style={{ fontSize:15, color:"var(--text2)", lineHeight:1.6, marginBottom:32 }}>We're making CIT Food Finder even better.<br/>Check back soon!</div>
          <button className="login-btn" style={{ padding:"14px 32px", width:"auto" }} onClick={handleRequireLogin}>Admin Login</button>
          {loginOpen && <LoginModal onClose={() => setLoginOpen(false)} onAdminLogin={handleAdminLogin} />}
        </div>
      );

      if (adminSession && viewAdminDash) {
        return <AdminDashboard foods={foods} setFoods={setFoods} shops={shops} setShops={setShops} feedback={feedback} setFeedback={setFeedback} appSettings={appSettings} setAppSettings={setAppSettings} onViewSite={() => setViewAdminDash(false)} onLogout={() => { setAdminSession(null); setViewAdminDash(false); localStorage.removeItem('cit_admin_session'); }} adminUser={adminSession} />;
      }

      const modalFood = openFood ? foods.find(f => f.id === openFood.id) || openFood : null;

      return (
        <div id="root" data-theme={theme}>
          {notif && <Notif msg={notif} onDone={() => setNotif("")} />}

          <div className="topbar">
            <div className="tb-brand">
              <div className="tb-logo-row">
                <span style={{ fontSize:22, alignSelf:'center' }}>🍽️</span>
                <div style={{ background:'linear-gradient(135deg,var(--cyan) 0%,var(--purple) 50%,var(--orange) 100%)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', fontWeight:900, lineHeight:1.1 }}>
                  <div>{appSettings.appName.split(" ")[0] || "CIT"} Food</div>
                  <div>{appSettings.appName.split(" ").slice(1).join(" ") || "Finder"}</div>
                </div>
              </div>
              <div className="tb-sub">CHENNAI INSTITUTE OF TECHNOLOGY ·<br/><a href="https://akdev-official.vercel.app/" target="_blank" style={{ color:'var(--orange)', fontWeight:800 }}>BY AKDEV LABS</a></div>
            </div>
            <div className="tb-right">
              {adminSession && (<button onClick={() => setViewAdminDash(true)} style={{ background:"var(--cyan)", color:"#000", border:"none", fontSize:11, fontWeight:800, padding:"6px 12px", borderRadius:"12px", marginRight:"4px" }}>Dashboard 🛡️</button>)}
              <button className="theme-btn" onClick={() => { window.history.pushState({ modal:'theme' },''); setThemeOpen(true); }}>
                {theme === 'dark' ? '🌙' : theme === 'light' ? '☀️' : theme === 'midnight' ? '🌌' : theme === 'forest' ? '🌲' : '🌇'}
              </button>
              {currentUser ? (
                <div className="user-avatar-container" style={{ position:'relative' }}>
                  <div className="user-avatar" title={currentUser.email} onClick={e => { e.stopPropagation(); setShowDropdown(!showDropdown); }}>{currentUser.name.charAt(0).toUpperCase()}</div>
                  {showDropdown && (
                    <div className="fi" style={{ position:'absolute', top:'120%', right:0, background:'var(--card)', border:'1px solid var(--border)', borderRadius:12, padding:8, minWidth:140, boxShadow:'var(--shadow)', zIndex:200 }}>
                      <div style={{ fontSize:12, fontWeight:700, padding:"8px 12px", borderBottom:"1px solid var(--border)", marginBottom:4 }}>{currentUser.name.split(" ")[0]}</div>
                      <button onClick={e => { e.preventDefault(); e.stopPropagation(); handleLogout(); }} style={{ width:'100%', textAlign:'left', padding:"8px 12px", fontSize:13, color:'var(--red)', borderRadius:8, transition:'background 0.2s', background:'transparent', border:'none', cursor:'pointer', fontWeight:600 }} onMouseOver={e => e.currentTarget.style.background='rgba(239,71,111,0.1)'} onMouseOut={e => e.currentTarget.style.background='transparent'}>Logout 👋</button>
                    </div>
                  )}
                </div>
              ) : (
                <button className="user-avatar" style={{ background:"var(--card)", color:"var(--text)", border:"1px solid var(--border2)", fontSize:12, fontWeight:700, width:"auto", padding:"0 12px", borderRadius:"18px" }} onClick={handleRequireLogin}>Login</button>
              )}
            </div>
          </div>

          {tab === "home"     && <HomeScreen    foods={foods} shops={shops} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} filterOpen={filterOpen} setFilterOpen={v => { if (v) window.history.pushState({modal:'filter'},''); setFilterOpen(v); }} appSettings={appSettings} setTab={setTab} setCurrentFilters={setCurrentFilters} onAddToCart={handleAddToCart} />}
          {tab === "explore"  && <ExploreScreen foods={foods} shops={shops} wishlist={wishlist} onOpenFood={handleOpenFood} onNA={handleNA} userNA={userNA} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} recentlyViewed={recentlyViewed} filterOpen={filterOpen} setFilterOpen={v => { if (v) window.history.pushState({modal:'filter'},''); setFilterOpen(v); }} currentFilters={currentFilters} setCurrentFilters={setCurrentFilters} onAddToCart={handleAddToCart} />}
          {tab === "wishlist" && <WishlistScreen foods={foods} wishlist={wishlist} onWish={handleWish} onOpenFood={handleOpenFood} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin} />}
          {tab === "cart"     && <CartScreen    foods={foods} cart={cart} setCart={setCart} onOpenFood={handleOpenFood} onRequireLogin={handleRequireLogin} isLoggedIn={!!currentUser} />}
          {tab === "ai"       && <AIScreen      foods={foods} wishlist={wishlist} onAddWish={handleWish} isLoggedIn={!!currentUser} onRequireLogin={handleRequireLogin} currentUser={currentUser} />}

          <div className="support-fab" onClick={() => { window.history.pushState({modal:'support'},''); setSupportOpen(true); }}>💬</div>

          <nav className="bnav">
            {[["home","🏠","Home"],["explore","🔍","Explore"],["wishlist","♡","Wishlist"],["cart","🛒","Cart"],["ai","✦","AI Pick"]].map(([t,ico,lbl]) => {
              const count = t === "cart" ? cart.reduce((a,c) => a+c.qty, 0) : 0;
              return (
                <button key={t} className={`bn${tab === t ? " on" : ""}`} onClick={() => setTab(t)} style={{ position:'relative' }}>
                  <div className="bn-ico">{t === "wishlist" && wishlist.length > 0 ? "♥" : t === "cart" && count > 0 ? "🛒" : ico}</div>
                  <div className="bn-lbl">{lbl}</div>
                  {t === 'cart' && count > 0 && <span style={{ position:'absolute', top:4, right:'calc(50% - 20px)', background:'var(--red)', color:'#fff', fontSize:10, fontWeight:800, padding:'1px 5px', borderRadius:10 }}>{count}</span>}
                </button>
              );
            })}
          </nav>

          {modalFood  && <FoodModal food={modalFood} onClose={() => setOpenFood(null)} wishlist={wishlist} onWish={handleWish} onSubmitReview={handleSubmitReview} currentUser={currentUser} foods={foods} onNA={handleNA} userNA={userNA} onAddToCart={handleAddToCart} />}
          {loginOpen  && <LoginModal onClose={() => setLoginOpen(false)} onAdminLogin={handleAdminLogin} />}
          {filterOpen && <FilterSheet onClose={() => setFilterOpen(false)} shops={shops} currentFilters={currentFilters} setCurrentFilters={setCurrentFilters} />}
          {themeOpen  && <ThemePicker onClose={() => setThemeOpen(false)} currentTheme={theme} onSelectTheme={setTheme} />}
          {supportOpen && <SupportModal onClose={() => setSupportOpen(false)} onSubmitFeedback={handleSupportSubmit} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
