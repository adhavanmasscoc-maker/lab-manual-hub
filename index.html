<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lab Manual Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        input,
        textarea {
            padding: 10px;
            width: 60%;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            width: 250px;
            padding: 25px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .footer {
            margin-top: 50px;
            color: #888;
            font-size: 14px;
        }

        .footer a {
            text-decoration: none;
            color: #2575fc;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>📚 Lab Manual Hub</h1>
    <p>Select your subject</p>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search..." onkeyup="searchFunc()">

    <!-- CARDS CONTAINER -->
    <div class="container" id="cardContainer"></div>

    <!-- FEEDBACK -->
    <div style="margin-top:50px;">
        <h2>💬 Feedback</h2>

        <input type="text" id="name" placeholder="Your Name"><br>
        <textarea id="feedback" placeholder="Your Feedback"></textarea><br>

        <button onclick="submitFeedback()">Submit</button>

        <p id="msg"></p>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <a href="https://akdev-official.vercel.app" target="_blank">
            Built by AKDEV ⚡
        </a>
    </div>

    <script>
        // =========================
        // 🔥 ADD SUBJECTS HERE (UNLIMITED)
        // =========================
        const subjects = [
            { name: "AI Lab", link: "AI/", color: "linear-gradient(135deg,#6a11cb,#2575fc)" },
            { name: "DBMS Lab", link: "DBMS/", color: "linear-gradient(135deg,#ff416c,#ff4b2b)" },
            { name: "WEB_FW Lab", link: "WEB_FW/", color: "linear-gradient(135deg,#11998e,#38ef7d)" },
            { name: "C++ CSE Lab", link: "C++_CSE/", color: "linear-gradient(135deg,#fc4a1a,#f7b733)" },
            { name: "C++ EEE Lab", link: "C++_EEE/", color: "linear-gradient(135deg,#00c6ff,#0072ff)" },
            { name: "AI_CIVIL", link: "AI_CIVIL/", color: "linear-gradient(135deg,#000,#333)" },
{ name: "DLC_EEE", link: "DLC_EEE/", color: "linear-gradient(135deg,#050,#333)" },
{ name: "AIML_EEE", link: "AIML_EEE/", color: "linear-gradient(135deg,#500,#333)" },
{ name: "C_BME", link: "C_BME/", color: "linear-gradient(135deg,#043,#333)" },
{ name: "EC_ECE", link: "EC_ECE/", color: "linear-gradient(135deg,#1e3c72,#2a5298)" },

{ name: "C++_ECE", link: "C++_ECE/", color: "linear-gradient(135deg,#11998e,#38ef7d)" },

{ name: "DE_ECE", link: "DE_ECE/", color: "linear-gradient(135deg,#fc4a1a,#f7b733)" },

{ name: "OS_ECE", link: "OS_ECE/", color: "linear-gradient(135deg,#42275a,#734b6d)" },

            // 👉 ADD MORE HERE (NO LIMIT)
            // { name: "AI_CIVIL", link: "AI_CIVIL/", color: "linear-gradient(135deg,#000,#333)" },
        ];

        // =========================
        // AUTO GENERATE CARDS
        // =========================
        const container = document.getElementById("cardContainer");

        function renderCards(list) {
            container.innerHTML = "";

            list.forEach(sub => {
                const a = document.createElement("a");
                a.href = sub.link;
                a.className = "card";
                a.style.background = sub.color;
                a.innerHTML = `📘 ${sub.name}<br><br>View All Experiments`;
                container.appendChild(a);
            });
        }

        renderCards(subjects);

        // =========================
        // FIXED SEARCH (NO BUG)
        // =========================
        function searchFunc() {
            let input = document.getElementById("search").value.toLowerCase();

            let filtered = subjects.filter(sub =>
                sub.name.toLowerCase().includes(input)
            );

            renderCards(filtered);
        }

        // =========================
        // FEEDBACK SYSTEM
        // =========================
        // =========================
        // FEEDBACK SYSTEM (Centralized Schema)
        // =========================
function submitFeedback() {
    let name = document.getElementById("name").value.trim();
    let feedback = document.getElementById("feedback").value.trim();
    let msg = document.getElementById("msg");
    let btn = document.querySelector("button[onclick='submitFeedback()']");

    if (!name || !feedback) {
        msg.style.color = "red";
        msg.innerText = "Please fill all fields";
        return;
    }

    // Create clean timestamp (YYYY-MM-DD HH:MM:SS)
    const now = new Date();
    const cleanTimestamp = 
        now.getFullYear() + '-' + 
        String(now.getMonth() + 1).padStart(2, '0') + '-' + 
        String(now.getDate()).padStart(2, '0') + ' ' + 
        String(now.getHours()).padStart(2, '0') + ':' + 
        String(now.getMinutes()).padStart(2, '0') + ':' + 
        String(now.getSeconds()).padStart(2, '0');

    // Loading state
    msg.style.color = "#333";
    msg.innerText = "Sending to server...";
    btn.disabled = true;
    btn.innerText = "Sending...";

    // ✅ FIXED PAYLOAD
    const payload = {
        ID: "lab_" + Date.now(),
        SiteName: "Lab Manual Hub",
        Type: "Feedback",
        Name: "",            // keep empty or remove if not needed
        Email: name,         // ✅ NAME stored in EMAIL column
        Rating: "N/A",
        Message: feedback,
        Timestamp: cleanTimestamp,
        Status: "Pending"
    };

    const API_URL = "https://api.sheetbest.com/sheets/7545ab4f-83a2-4105-9cdf-6d94ffe4ef27";

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    })
    .then(res => {
        if (!res.ok) throw new Error('Network response was not ok');
        return res.json();
    })
    .then(() => {
        msg.style.color = "green";
        msg.innerText = "✅ Feedback saved successfully!";
        document.getElementById("name").value = "";
        document.getElementById("feedback").value = "";
    })
    .catch((err) => {
        console.error(err);
        msg.style.color = "red";
        msg.innerText = "❌ Error saving feedback";
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerText = "Submit";
    });
}
  </script>

</body>

</html>
